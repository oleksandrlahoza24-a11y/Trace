<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Fixed Physics Water & Boat</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { 
    width:100%; height:100%; overflow:hidden; 
    background:#010a10; position: fixed; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { display:block; width:100vw; height:100vh; touch-action: none; }
  
  #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  
  #wheel-container {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px; pointer-events: auto;
    background: rgba(20,30,40,0.85); border: 4px solid rgba(255,255,255,0.2);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  #wheel {
    width: 160px; height: 160px; border: 12px solid #444;
    border-radius: 50%; position: relative; transition: transform 0.05s ease-out;
  }
  
  #wheel::after {
    content: ''; position: absolute; top: -15px; left: 50%;
    transform: translateX(-50%); width: 20px; height: 30px;
    background: #ff3e3e; border-radius: 4px;
  }

  #btn-spawn {
    position: absolute; top: 50px; right: 30px;
    padding: 15px 30px; background: #007aff; color: white;
    border: none; border-radius: 30px; pointer-events: auto;
    font-weight: bold; box-shadow: 0 5px 15px rgba(0,122,255,0.4);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-layer">
  <button id="btn-spawn">RESET BOAT</button>
  <div id="wheel-container"><div id="wheel"></div></div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false, preserveDrawingBuffer: false });

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let CW, CH, W, H;
function resize() {
    CW = window.innerWidth; CH = window.innerHeight;
    W = Math.round(CW * DPR); H = Math.round(CH * DPR);
    canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

const S = 512;
const ext = gl.getExtension('OES_texture_half_float') || gl.getExtension('OES_texture_float');
const FTYPE = ext ? (ext.HALF_FLOAT_OES || gl.FLOAT) : gl.UNSIGNED_BYTE;
gl.getExtension('OES_texture_half_float_linear');
gl.getExtension('OES_texture_float_linear');

const VERT = `attribute vec2 aPos; varying vec2 vUV; void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0.,1.); }`;
const SIM_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec4 uBoat; // x, y, angle, speed

void main() {
    vec4 s = texture2D(uState, vUV);
    float h = s.r * 2.0 - 1.0;
    float hp = s.g * 2.0 - 1.0;

    float n = texture2D(uState, vUV + vec2(0., uTexel.y)).r * 2. - 1.;
    float so = texture2D(uState, vUV - vec2(0., uTexel.y)).r * 2. - 1.;
    float e = texture2D(uState, vUV + vec2(uTexel.x, 0.)).r * 2. - 1.;
    float w = texture2D(uState, vUV - vec2(uTexel.x, 0.)).r * 2. - 1.;

    float nextH = (n + so + e + w) * 0.5 - hp;
    nextH *= 0.992;

    // Wake Injection
    float dist = length(vUV - uBoat.xy);
    if(uBoat.w > 0.0) {
        nextH += smoothstep(0.04, 0.0, dist) * uBoat.w * 5.0;
    }

    gl_FragColor = vec4(nextH * 0.5 + 0.5, s.r, 0., 1.);
}`;

const REN_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uWater;
uniform vec4 uBoat;
uniform float uAspect;

void main() {
    vec2 texel = vec2(1.0/512.0);
    float h = texture2D(uWater, vUV).r * 2.0 - 1.0;
    float hR = texture2D(uWater, vUV + vec2(texel.x, 0.)).r * 2.0 - 1.0;
    float hU = texture2D(uWater, vUV + vec2(0., texel.y)).r * 2.0 - 1.0;
    
    vec3 normal = normalize(vec3(h - hR, h - hU, 0.1));
    
    // Water Color
    float fresnel = pow(1.0 - normal.z, 4.0);
    vec3 col = mix(vec3(0.02, 0.15, 0.25), vec3(0.5, 0.7, 0.9), fresnel + 0.1);
    
    // 3D Boat
    vec2 bP = vUV - uBoat.xy;
    float cosA = cos(-uBoat.z), sinA = sin(-uBoat.z);
    vec2 rUV = vec2(bP.x * cosA - bP.y * sinA, bP.x * sinA + bP.y * cosA);
    rUV.x *= uAspect;
    
    // Hull shape
    float hull = max(abs(rUV.x) - 0.015, abs(rUV.y) - 0.04 + abs(rUV.x));
    if(hull < 0.0) {
        vec3 hullCol = mix(vec3(0.8, 0.8, 0.8), vec3(0.1, 0.1, 0.15), smoothstep(-0.015, 0.0, hull));
        col = mix(col, hullCol, 1.0);
    }

    gl_FragColor = vec4(col, 1.0);
}`;

function createProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.attachShader(p, s1); gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const simP = createProg(VERT, SIM_FRAG);
const renP = createProg(VERT, REN_FRAG);

function createFBO() {
    const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, null);
    gl.texParameteri(gl.TEXTURE_2D, 10240, 9729); gl.texParameteri(gl.TEXTURE_2D, 10241, 9729);
    gl.texParameteri(gl.TEXTURE_2D, 10242, 33071); gl.texParameteri(gl.TEXTURE_2D, 10243, 33071);
    const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
    return { t, f };
}

let fbo1 = createFBO(), fbo2 = createFBO();
const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

// Boat State
let boat = { x: 0.5, y: 0.5, angle: 1.57, targetAngle: 1.57, speed: 0, active: false };
const wheel = document.getElementById('wheel');

document.getElementById('wheel-container').addEventListener('touchstart', (e) => {
    boat.active = true;
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    if(!boat.active) return;
    const t = e.touches[0];
    const rect = document.getElementById('wheel-container').getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    boat.targetAngle = Math.atan2(cy - t.clientY, t.clientX - cx);
    wheel.style.transform = `rotate(${-boat.targetAngle + 1.57}rad)`;
    boat.speed = 0.004;
}, {passive: false});

window.addEventListener('touchend', () => { boat.speed = 0; });
document.getElementById('btn-spawn').onclick = () => { boat.x = 0.5; boat.y = 0.5; };

function loop() {
    // Smooth angle movement to stop the "tweaking"
    let diff = boat.targetAngle - boat.angle;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    boat.angle += diff * 0.1;

    if(boat.speed > 0) {
        boat.x += Math.cos(boat.angle) * boat.speed;
        boat.y -= Math.sin(boat.angle) * boat.speed;
        // Wrap
        if(boat.x < 0) boat.x = 1; if(boat.x > 1) boat.x = 0;
        if(boat.y < 0) boat.y = 1; if(boat.y > 1) boat.y = 0;
    }

    // Physics
    gl.useProgram(simP);
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo2.f);
    gl.viewport(0,0,S,S);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    const loc = gl.getAttribLocation(simP, "aPos");
    gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(gl.getUniformLocation(simP, "uTexel"), 1/S, 1/S);
    gl.uniform4f(gl.getUniformLocation(simP, "uBoat"), boat.x, boat.y, boat.angle, boat.speed);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    let tmp = fbo1; fbo1 = fbo2; fbo2 = tmp;

    // Render
    gl.useProgram(renP);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, W, H);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform4f(gl.getUniformLocation(renP, "uBoat"), boat.x, boat.y, boat.angle, boat.speed);
    gl.uniform1f(gl.getUniformLocation(renP, "uAspect"), CW/CH);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
