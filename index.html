<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pro Realistic Boat & Wake - iPad</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { 
    width:100%; height:100%; overflow:hidden; 
    background:#020508; position: fixed; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { display:block; width:100vw; height:100vh; }
  
  #ui-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  
  #wheel-container {
    position: absolute; bottom: 50px; left: 50px;
    width: 220px; height: 220px;
    pointer-events: auto;
    background: radial-gradient(circle, rgba(40,45,55,0.8) 0%, rgba(10,15,20,0.9) 100%);
    border: 4px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  }

  #wheel {
    width: 180px; height: 180px;
    border: 14px solid #3a3a3a;
    border-radius: 50%;
    position: relative;
    box-shadow: inset 0 0 15px #000;
  }
  
  #wheel::after {
    content: ''; position: absolute; top: -18px; left: 50%;
    transform: translateX(-50%); width: 24px; height: 35px;
    background: #e63946; border-radius: 4px; box-shadow: 0 0 10px rgba(230, 57, 70, 0.5);
  }

  #btn-spawn {
    position: absolute; top: 60px; right: 50px;
    padding: 20px 40px; background: linear-gradient(135deg, #0077b6 0%, #023e8a 100%);
    color: white; border: none;
    border-radius: 40px; pointer-events: auto;
    font-weight: 800; font-size: 18px; letter-spacing: 1px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    -webkit-appearance: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-layer">
  <button id="btn-spawn">RELAUNCH BOAT</button>
  <div id="wheel-container">
    <div id="wheel"></div>
  </div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
const wheelEl = document.getElementById('wheel');
const btnSpawn = document.getElementById('btn-spawn');

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, CW, CH;
function resize() {
  CW = window.innerWidth; CH = window.innerHeight;
  W = Math.round(CW * DPR); H = Math.round(CH * DPR);
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// ─── BOAT PHYSICS ───────────────────────────────────────────
let boat = { active: false, x: 0.5, y: 0.5, angle: 0, speed: 0, targetSpeed: 0, turn: 0 };
btnSpawn.addEventListener('touchstart', (e) => { 
    e.preventDefault(); boat.active = true; boat.x = 0.5; boat.y = 0.5; boat.speed = 0; 
});

let steering = false;
document.getElementById('wheel-container').addEventListener('touchstart', (e) => {
    e.preventDefault(); steering = true;
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    if(!steering) return;
    e.preventDefault();
    const t = e.touches[0];
    const rect = document.getElementById('wheel-container').getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const ang = Math.atan2(t.clientY - cy, t.clientX - cx);
    wheelEl.style.transform = `rotate(${ang + Math.PI/2}rad)`;
    boat.angle = ang;
    boat.targetSpeed = 0.0035;
}, {passive: false});

window.addEventListener('touchend', () => { steering = false; boat.targetSpeed = 0; });

// ─── SHADER SOURCES ────────────────────────────────────────
const S = 512;
const extHalf = gl.getExtension('OES_texture_half_float');
const FTYPE = extHalf ? extHalf.HALF_FLOAT_OES : gl.UNSIGNED_BYTE;

const VERT = `attribute vec2 aPos; varying vec2 vUV; void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0.,1.); }`;

const SIM_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec4 uBoat; // x, y, angle, speed

void main() {
    vec4 state = texture2D(uState, vUV);
    float h = state.r * 2.0 - 1.0;
    float hp = state.g * 2.0 - 1.0;

    float n = texture2D(uState, vUV + vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    float s = texture2D(uState, vUV - vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    float e = texture2D(uState, vUV + vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;
    float w = texture2D(uState, vUV - vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;

    float nextH = (n + s + e + w) * 0.5 - hp;
    nextH *= 0.993;

    // Proportional Wake Physics
    if(uBoat.w > 0.0001) {
        vec2 bDir = vec2(cos(uBoat.z), sin(uBoat.z));
        vec2 bowPos = uBoat.xy + bDir * 0.035;
        float d = length(vUV - bowPos);
        // Wake size is now tied to speed squared for realism
        float force = uBoat.w * 12.0; 
        nextH += smoothstep(0.03, 0.0, d) * force;
    }

    gl_FragColor = vec4(nextH * 0.5 + 0.5, state.r, 0.0, 1.0);
}`;

const REN_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uWater;
uniform vec2 uTexel;
uniform float uAspect;
uniform vec4 uBoat;

float sdCapsule(vec2 p, vec2 a, vec2 b, float r) {
    vec2 pa = p - a, ba = b - a;
    float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
    return length(pa - ba * h) - r;
}

void main() {
    float h = texture2D(uWater, vUV).r * 2.0 - 1.0;
    float hR = texture2D(uWater, vUV + vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;
    float hU = texture2D(uWater, vUV + vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    
    vec3 normal = normalize(vec3(h - hR, h - hU, 0.12));
    vec3 light = normalize(vec3(0.4, 0.6, 1.0));
    vec3 view = vec3(0.0, 0.0, 1.0);
    
    // Ocean Visuals
    float fresnel = pow(1.0 - normal.z, 4.0);
    vec3 seabed = vec3(0.02, 0.1, 0.18);
    vec3 sky = mix(vec3(0.1, 0.3, 0.6), vec3(0.8, 0.9, 1.0), fresnel);
    vec3 col = mix(seabed, sky, fresnel + 0.15);
    col += pow(max(0.0, dot(reflect(-light, normal), view)), 60.0) * 0.5;

    // Realistic 3D Boat Rendering
    if(uBoat.w > -1.0) {
        vec2 bPos = vUV - uBoat.xy;
        float c = cos(-uBoat.z), s = sin(-uBoat.z);
        vec2 rUV = vec2(bPos.x * c - bPos.y * s, bPos.x * s + bPos.y * c);
        
        // Hull SDF
        float d = sdCapsule(rUV, vec2(0, -0.025), vec2(0, 0.015), 0.012);
        if(rUV.y > 0.01) d += (rUV.y - 0.01) * 0.8; // Pointy bow

        if(d < 0.0) {
            // 3D Shading for hull
            vec3 hNorm = normalize(vec3(rUV.x * 5.0, rUV.y * 1.5, 0.1));
            float diff = max(0.0, dot(hNorm, light));
            vec3 hullCol = mix(vec3(0.1, 0.12, 0.15), vec3(0.9, 0.9, 1.0), diff);
            hullCol = mix(hullCol, vec3(0.6, 0.0, 0.0), step(rUV.y, -0.015)); // Red stern detail
            col = hullCol;
            // Ambient occlusion where hull meets water
            col *= 0.6 + 0.4 * smoothstep(-0.02, 0.0, d);
        }
    }

    gl_FragColor = vec4(pow(col, vec3(0.85)), 1.0);
}`;

// ─── ENGINE ────────────────────────────────────────────────
function mkProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.attachShader(p, s1); gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const simProg = mkProg(VERT, SIM_FRAG);
const renProg = mkProg(VERT, REN_FRAG);
const uSim = { boat: gl.getUniformLocation(simProg, 'uBoat') };
const uRen = { boat: gl.getUniformLocation(renProg, 'uBoat'), aspect: gl.getUniformLocation(renProg, 'uAspect') };

function mkFBO() {
    const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, null);
    gl.texParameteri(gl.TEXTURE_2D, 9729, 9729); // LINEAR
    const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, 36160, gl.TEXTURE_2D, t, 0);
    return { t, f };
}
let f1 = mkFBO(), f2 = mkFBO();

const b = gl.createBuffer(); gl.bindBuffer(34962, b);
gl.bufferData(34962, new Float32Array([-1,-1,1,-1,-1,1,1,1]), 35044);

function loop() {
    if(boat.active) {
        boat.speed = boat.speed * 0.96 + boat.targetSpeed * 0.04;
        boat.x += Math.cos(boat.angle) * boat.speed * (CH/CW);
        boat.y += Math.sin(boat.angle) * boat.speed;
        boat.x = (boat.x + 1.1) % 1.2 - 0.1; // Soft wrap
        boat.y = (boat.y + 1.1) % 1.2 - 0.1;
    }

    gl.useProgram(simProg);
    gl.viewport(0, 0, S, S);
    const a = gl.getAttribLocation(simProg, 'aPos');
    gl.enableVertexAttribArray(a); gl.vertexAttribPointer(a, 2, 5126, 0, 0, 0);
    gl.bindFramebuffer(36160, f2.f);
    gl.bindTexture(3553, f1.t);
    gl.uniform2f(gl.getUniformLocation(simProg, 'uTexel'), 1/S, 1/S);
    gl.uniform4f(uSim.boat, boat.x, boat.y, boat.angle, boat.speed);
    gl.drawArrays(5, 0, 4);
    let t = f1; f1 = f2; f2 = t;

    gl.bindFramebuffer(36160, null);
    gl.viewport(0, 0, W, H);
    gl.useProgram(renProg);
    gl.bindTexture(3553, f1.t);
    gl.uniform2f(gl.getUniformLocation(renProg, 'uTexel'), 1/S, 1/S);
    gl.uniform1f(uRen.aspect, CW/CH);
    gl.uniform4f(uRen.boat, boat.x, boat.y, boat.angle, boat.active ? 1.0 : -1.0);
    gl.drawArrays(5, 0, 4);

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
