<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moody Midnight Sea</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2/build/three.module.js';
    import { Water } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Water.js';
    import { Sky } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Sky.js';
    import { EffectComposer } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/UnrealBloomPass.js';

    // --- Scene & Renderer ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000204, 0.008);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.4; // Darker exposure for realism
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 20000);
    camera.position.set(0, 12, 90);

    // --- Sky (Deep Night) ---
    const sky = new Sky();
    sky.scale.setScalar(10000);
    scene.add(sky);
    sky.material.uniforms['sunPosition'].value.setFromSphericalCoords(1, Math.PI / 2 + 0.1, Math.PI);

    // --- Water (Dark & Deep) ---
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    const water = new Water(waterGeometry, {
        textureWidth: 512,
        textureHeight: 512,
        waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => {
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
        }),
        sunDirection: new THREE.Vector3(),
        sunColor: 0xffffff,
        waterColor: 0x000103,
        distortionScale: 3.0,
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // --- Elegant Boat ---
    const boat = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x050302, roughness: 1 });
    
    // Hull via Lathe for a smoother shape
    const points = [];
    for ( let i = 0; i < 10; i ++ ) {
        points.push( new THREE.Vector2( Math.sin( i * 0.2 ) * 4 + 1, ( i - 5 ) * 2 ) );
    }
    const hullGeo = new THREE.LatheGeometry( points, 20, 0, Math.PI );
    const hullMesh = new THREE.Mesh(hullGeo, woodMat);
    hullMesh.rotation.set(Math.PI / 2, 0, Math.PI / 2);
    hullMesh.scale.set(1, 2.5, 0.8);
    boat.add(hullMesh);

    // --- Lantern (Soft Glow) ---
    const lantern = new THREE.Group();
    const lanternGlass = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.4, 1, 8), 
        new THREE.MeshBasicMaterial({ color: 0xff9900 })
    );
    const lanternLight = new THREE.PointLight(0xff5500, 1.5, 50, 2); // Lower intensity
    lantern.add(lanternGlass, lanternLight);
    lantern.position.set(0, 3.5, 10);
    boat.add(lantern);
    scene.add(boat);

    // --- Fine Rain ---
    const rainCount = 10000;
    const rainGeo = new THREE.BufferGeometry();
    const rainPos = new Float32Array(rainCount * 3);
    for (let i = 0; i < rainCount * 3; i += 3) {
        rainPos[i] = (Math.random() - 0.5) * 600;
        rainPos[i+1] = Math.random() * 300;
        rainPos[i+2] = (Math.random() - 0.5) * 600;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
    const rainMat = new THREE.PointsMaterial({
        color: 0x666677,
        size: 0.15,
        transparent: true,
        opacity: 0.4
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // --- Balanced Post-Processing ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    // Parameters: res, strength, radius, threshold
    const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.8, 0.3);
    composer.addPass(bloom);

    // --- Render Loop ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        water.material.uniforms['time'].value += 0.5 / 60.0;
        
        // Gentle Rocking
        boat.position.y = Math.sin(t * 0.7) * 0.4;
        boat.rotation.z = Math.sin(t * 0.4) * 0.04;

        // Subtle Lantern Flicker
        lanternLight.intensity = 1.2 + Math.sin(t * 15) * 0.3;

        // Rain
        const attr = rain.geometry.attributes.position;
        for (let i = 1; i < attr.array.length; i += 3) {
            attr.array[i] -= 6;
            if (attr.array[i] < 0) attr.array[i] = 300;
        }
        attr.needsUpdate = true;

        composer.render();
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
