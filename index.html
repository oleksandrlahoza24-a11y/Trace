<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELLDIVERS MOBILE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', monospace; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; color: #fbff00; }
        
        /* Mobile Joysticks */
        .joystick-container { position: absolute; bottom: 40px; width: 120px; height: 120px; background: rgba(251, 255, 0, 0.1); border: 2px solid #fbff00; border-radius: 50%; pointer-events: auto; }
        #move-stick { left: 40px; }
        #aim-stick { right: 40px; }
        .knob { position: absolute; width: 50px; height: 50px; background: #fbff00; border-radius: 50%; top: 35px; left: 35px; }

        /* Stratagem HUD */
        #stratagem-pad { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #fbff00; pointer-events: auto; }
        .s-btn { width: 45px; height: 45px; background: none; border: 1px solid #fbff00; color: #fbff00; margin: 2px; font-size: 20px; }
        
        #stats { position: absolute; top: 20px; right: 20px; text-align: right; }
        #msg-log { position: absolute; bottom: 180px; width: 100%; text-align: center; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="stratagem-pad">
        <div>STRATAGEM INPUT</div>
        <button class="s-btn" onclick="inputCode('U')">⬆️</button><br>
        <button class="s-btn" onclick="inputCode('L')">⬅️</button>
        <button class="s-btn" onclick="inputCode('D')">⬇️</button>
        <button class="s-btn" onclick="inputCode('R')">➡️</button>
        <div id="code-buffer" style="margin-top:5px; letter-spacing: 3px;">----</div>
    </div>

    <div id="stats">
        REINFORCEMENTS: <span id="lives">5</span><br>
        SAMPLES: <span id="samples">0</span>
    </div>

    <div id="msg-log">ESTABLISHING DEMOCRACY...</div>

    <div id="move-stick" class="joystick-container"><div id="move-knob" class="knob"></div></div>
    <div id="aim-stick" class="joystick-container"><div id="aim-knob" class="knob"></div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- ENGINE SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x1a1a1a, 0.05);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTS ---
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x222244));

    // --- WORLD ---
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x332211 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- PLAYER & ENEMIES ---
    const player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 4, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
    const cape = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.05), new THREE.MeshStandardMaterial({ color: 0xffee00 }));
    cape.position.set(0, 0.2, -0.3);
    player.add(body, cape);
    player.position.y = 0.8;
    scene.add(player);

    const enemies = [];
    function spawnBug() {
        const bug = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff4400 }));
        bug.position.set(Math.random()*40-20, 0.5, Math.random()*40-20);
        scene.add(bug);
        enemies.push(bug);
    }
    for(let i=0; i<15; i++) spawnBug();

    // --- MOBILE INPUT LOGIC ---
    let moveData = { x: 0, y: 0 };
    let aimData = { x: 0, y: 0 };
    let sequence = "";
    const COMBO = "UDRL"; // Example Stratagem: Up, Down, Right, Left

    function setupJoystick(id, dataObj) {
        const container = document.getElementById(id);
        const knob = container.querySelector('.knob');
        const limit = 40;

        container.addEventListener('touchstart', (e) => handleMove(e), {passive: false});
        container.addEventListener('touchmove', (e) => handleMove(e), {passive: false});
        container.addEventListener('touchend', () => {
            knob.style.transform = `translate(0px, 0px)`;
            dataObj.x = 0; dataObj.y = 0;
        });

        function handleMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > limit) { dx *= limit/dist; dy *= limit/dist; }
            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            dataObj.x = dx/limit; dataObj.y = dy/limit;
        }
    }
    setupJoystick('move-stick', moveData);
    setupJoystick('aim-stick', aimData);

    window.inputCode = (dir) => {
        sequence += dir;
        document.getElementById('code-buffer').innerText = sequence;
        if(sequence === COMBO) {
            orbitalStrike();
            sequence = "";
            document.getElementById('code-buffer').innerText = "----";
        } else if(sequence.length >= 4) {
            sequence = "";
            document.getElementById('code-buffer').innerText = "FAIL";
        }
    };

    function orbitalStrike() {
        document.getElementById('msg-log').innerText = "ORBITAL PRECISION STRIKE INCOMING!";
        const beam = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 100), new THREE.MeshBasicMaterial({color:0x00ffff, transparent: true, opacity: 0.6}));
        beam.position.set(player.position.x + (aimData.x*10), 50, player.position.z + (aimData.y*10));
        scene.add(beam);
        
        setTimeout(() => {
            // Kill enemies in radius
            enemies.forEach((bug, index) => {
                if(bug.position.distanceTo(beam.position) < 5) {
                    bug.position.set(Math.random()*40-20, 0.5, Math.random()*40-20);
                }
            });
            scene.remove(beam);
            document.getElementById('msg-log').innerText = "DEMOCRACY DELIVERED.";
        }, 1000);
    }

    // --- GAME LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // Player Movement
        player.position.x += moveData.x * 0.15;
        player.position.z += moveData.y * 0.15;
        
        // Rotation
        if(Math.abs(aimData.x) > 0.1) player.rotation.y = -Math.atan2(aimData.y, aimData.x) + Math.PI/2;

        // Enemy AI (Simulated)
        enemies.forEach(bug => {
            const dir = new THREE.Vector3().subVectors(player.position, bug.position).normalize();
            bug.position.addScaledVector(dir, 0.03);
            if(bug.position.distanceTo(player.position) < 0.8) {
                document.getElementById('msg-log').innerText = "SWEET LIBERTY, MY LEG!";
            }
        });

        // Camera Follow
        camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 12, player.position.z + 10), 0.1);
        camera.lookAt(player.position);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
