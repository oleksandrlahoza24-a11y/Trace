<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultra-Realistic Water Renderer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; overflow:hidden; background:#000; position: fixed; touch-action: none; }
  canvas { display:block; width:100vw; height:100vh; }
  #ui { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .ctrl { position: absolute; pointer-events:auto; }
  
  #wheel-zone {
    bottom: 40px; left: 40px; width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(40,45,55,0.7) 0%, rgba(10,15,20,0.8) 100%);
    border: 3px solid rgba(255,255,255,0.15);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  #wheel { width: 160px; height: 160px; border: 12px solid #3a3a3a; border-radius: 50%; position: relative; box-shadow: inset 0 0 15px #000; }
  #wheel::after { content:''; position:absolute; top:-18px; left:50%; transform:translateX(-50%); width:20px; height:30px; background:#e63946; border-radius:4px; }

  #throttle-zone { 
    bottom: 40px; right: 40px; width: 70px; height: 200px; 
    background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); 
    border-radius: 35px; overflow: hidden; backdrop-filter: blur(10px);
  }
  #throttle-bar { position:absolute; bottom:0; width:100%; background: linear-gradient(to top, #00d4ff, #00ff88); transition: height 0.05s ease-out; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
    <div id="wheel-zone" class="ctrl"><div id="wheel"></div></div>
    <div id="throttle-zone" class="ctrl"><div id="throttle-bar" style="height:0%"></div></div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false, preserveDrawingBuffer: false });

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let CW, CH, W, H;
function resize() {
    CW = window.innerWidth; CH = window.innerHeight;
    W = Math.round(CW * DPR); H = Math.round(CH * DPR);
    canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// ─── Simulation Config (UNTOUCHED) ───
const S = 512;
const ext = gl.getExtension('OES_texture_half_float') || gl.getExtension('OES_texture_float');
const FTYPE = ext ? (ext.HALF_FLOAT_OES || gl.FLOAT) : gl.UNSIGNED_BYTE;
gl.getExtension('OES_texture_half_float_linear');
gl.getExtension('OES_texture_float_linear');

const VERT = `attribute vec2 aPos; varying vec2 vUV; void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0.,1.); }`;

// ─── Simulation Shader (PHYSICS UNTOUCHED) ───
const SIM_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec4 uBoat; 

void main() {
    vec4 data = texture2D(uState, vUV);
    float h = data.r * 2.0 - 1.0;
    float hp = data.g * 2.0 - 1.0;
    float foam = data.b;

    float n = texture2D(uState, vUV + vec2(0., uTexel.y)).r * 2. - 1.;
    float s = texture2D(uState, vUV - vec2(0., uTexel.y)).r * 2. - 1.;
    float e = texture2D(uState, vUV + vec2(uTexel.x, 0.)).r * 2. - 1.;
    float w = texture2D(uState, vUV - vec2(uTexel.x, 0.)).r * 2. - 1.;

    float nextH = (n + s + e + w) * 0.5 - hp;
    nextH *= 0.995;

    float dist = length(vUV - uBoat.xy);
    float wake = smoothstep(0.06, 0.0, dist) * uBoat.w * 10.0;
    nextH += wake;

    gl_FragColor = vec4(nextH * 0.5 + 0.5, data.r, clamp(foam * 0.97 + wake * 1.5, 0.0, 1.0), 1.0);
}`;

// ─── Render Shader (OVERHAULED FOR REALISM) ───
const REN_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uWater;
uniform vec4 uBoat;
uniform float uAspect;
uniform float uTime;

// ── Noise ─────────────────────────────────────────────────────────────────
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }
float vnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f*f*(3.0 - 2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
    float v=0.0, a=0.5;
    for(int i=0;i<4;i++){ v+=vnoise(p)*a; p*=2.1; a*=0.5; }
    return v;
}

// ── Seabed (Sand) ───────────────────────────────────────────────────────────
vec3 getSeabed(vec2 uv) {
    float r1 = sin(uv.x*30.0 + fbm(uv*3.0)*2.0)*0.5+0.5;
    float r2 = sin(uv.y*20.0 + fbm(uv*3.5+1.7)*2.0)*0.5+0.5;
    float det = fbm(uv*10.0);
    vec3 base = mix(vec3(0.6,0.5,0.3), vec3(0.7,0.6,0.45), r1*r2*fbm(uv*5.0+1.1));
    // Rocks
    float rf = smoothstep(0.6,0.8, fbm(uv*4.0+2.3));
    base = mix(base, vec3(0.3,0.3,0.3)*(0.8+0.2*fbm(uv*15.0)), rf*0.8);
    return base;
}

// ── Sky ────────────────────────────────────────────────────────────────────
vec3 getSky(vec2 dir) {
    float t = clamp(dir.y * 1.5, 0.0, 1.0);
    vec3 skyCol = mix(vec3(0.3, 0.6, 0.9), vec3(0.01, 0.1, 0.2), t);
    skyCol += fbm(dir*5.0 + vec2(uTime*0.01)) * vec3(0.3, 0.4, 0.5) * (1.0-t); // clouds
    // Sun
    vec3 sunD = normalize(vec3(0.4, 0.5, 1.0));
    float sd = max(dot(normalize(dir), sunD), 0.0);
    skyCol += vec3(1.0, 0.9, 0.7) * pow(sd, 100.0) * 2.0;
    return skyCol;
}

void main() {
    vec2 texel = vec2(1.0/512.0);
    vec4 data = texture2D(uWater, vUV);
    float h = data.r * 2.0 - 1.0;
    float hp = data.g * 2.0 - 1.0;
    float foam = data.b;
    
    // Sobel Normal
    float hL = texture2D(uWater, vUV - vec2(texel.x, 0.0)).r * 2.0 - 1.0;
    float hR = texture2D(uWater, vUV + vec2(texel.x, 0.0)).r * 2.0 - 1.0;
    float hU = texture2D(uWater, vUV + vec2(0.0, texel.y)).r * 2.0 - 1.0;
    float hD = texture2D(uWater, vUV - vec2(0.0, texel.y)).r * 2.0 - 1.0;
    vec3 normal = normalize(vec3(hL - hR, hD - hU, 0.08));

    vec3 view = vec3(0.0, 0.0, 1.0);
    float cosI = normal.z;

    // ── 3D Boat Structure (Raymarched silhouette) ───────────────────────────
    vec2 bPos = vUV - uBoat.xy;
    float ca = cos(-uBoat.z), sa = sin(-uBoat.z);
    vec2 rUV = vec2(bPos.x * ca - bPos.y * sa, bPos.x * sa + bPos.y * ca);
    rUV.x *= uAspect;
    
    // Hull SDF
    float hull = max(abs(rUV.x) - 0.013, abs(rUV.y) - 0.045 + abs(rUV.x));
    
    // ── Seabed, Refraction & Shadow ─────────────────────────────────────────
    // Warped refraction based on wave slope
    vec2 refUV = vUV + normal.xy * 0.07;
    vec3 seabedCol = getSeabed(refUV * vec2(uAspect, 1.0));
    
    // Boat Shadow on Seabed
    float shadow = 1.0;
    if(uBoat.w > 0.001) {
        vec2 shadowRel = refUV - uBoat.xy - vec2(0.02, -0.01); // Shadow offset
        vec2 sRot = vec2(shadowRel.x * ca - shadowRel.y * sa, shadowRel.x * sa + shadowRel.y * cosA);
        float sHull = max(abs(sRot.x) - 0.018, abs(sRot.y) - 0.05 + abs(sRot.x));
        shadow = smoothstep(-0.02, 0.0, sHull);
    }
    
    // ── Composition ──────────────────────────────────────────────────────────
    // Water Color / Fresnel
    float fresnel = pow(1.0 - cosI, 4.0);
    vec3 deepCol = vec3(0.02, 0.15, 0.3);
    vec3 shallowCol = vec3(0.2, 0.6, 0.7);
    vec3 waterCol = mix(deepCol, shallowCol, fresnel);
    
    // Compose Refracted Seabed
    seabedCol = mix(waterCol * 1.5, seabedCol, exp(-vec3(0.2, 0.05, 0.01) * 3.0)); // Beer-Lambert absorption
    seabedCol *= shadow;
    
    // Reflections
    vec3 R = reflect(-view, normal);
    vec3 reflectionCol = getSky(R);
    
    // Combine base vs. reflection
    vec3 finalCol = mix(seabedCol, reflectionCol, fresnel + 0.1);
    
    // Dynamic Foam (Wakes)
    float foamVis = smoothstep(0.1, 0.3, foam + h * 0.1);
    finalCol = mix(finalCol, vec3(0.95, 0.98, 1.0), foamVis * 0.8);
    
    // SSS (Light through wave crests)
    float sss = smoothstep(0.0, 0.3, h) * dot(normal, vec3(0,0,1));
    finalCol += sss * vec3(0.0, 0.3, 0.4) * 0.5;

    // Composite Boat
    if(hull < 0.0) {
        // Simple 3D shading for hull
        vec3 hNorm = normalize(vec3(rUV.x * 4.0, rUV.y * 1.0, 0.1));
        float diff = max(0.0, dot(hNorm, normalize(vec3(0.4, 0.5, 1.0))));
        vec3 hullCol = mix(vec3(0.2), vec3(0.9), diff);
        finalCol = hullCol;
    }

    gl_FragColor = vec4(clamp(pow(finalCol, vec3(0.9)), 0.0, 1.0), 1.0);
}`;

// ─── Engine (PHYSICS & CONTROL UNTOUCHED) ───
function createProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.attachShader(p, s1); gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const simP = createProg(VERT, SIM_FRAG);
const renP = createProg(VERT, REN_FRAG);

function createFBO() {
    const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, null);
    gl.texParameteri(gl.TEXTURE_2D, 10240, 9729); gl.texParameteri(gl.TEXTURE_2D, 10241, 9729);
    gl.texParameteri(gl.TEXTURE_2D, 10242, 33071); gl.texParameteri(gl.TEXTURE_2D, 10243, 33071);
    const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
    return { t, f };
}

let fbo1 = createFBO(), fbo2 = createFBO();
const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

// Boat State (UNTOUCHED)
let boat = { x: 0.5, y: 0.5, angle: 1.57, tAngle: 1.57, speed: 0, power: 0, time: 0 };
const wheel = document.getElementById('wheel');
const tBar = document.getElementById('throttle-bar');

window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for(let t of e.touches) {
        if(t.clientX < CW * 0.5) {
            const r = document.getElementById('wheel-zone').getBoundingClientRect();
            boat.tAngle = Math.atan2((r.top + 100) - t.clientY, t.clientX - (r.left + 100));
            wheel.style.transform = `rotate(${-boat.tAngle + 1.57}rad)`;
        } else {
            let p = 1.0 - (t.clientY - (CH - 240)) / 200;
            boat.power = Math.max(0, Math.min(1, p));
            tBar.style.height = (boat.power * 100) + "%";
        }
    }
}, {passive: false});

document.getElementById('btn-reset').onclick = () => { boat.x = 0.5; boat.y = 0.5; boat.power = 0; boat.speed = 0; tBar.style.height = "0%"; };

function loop(t) {
    // Smoothed movement (UNTOUCHED)
    let d = boat.tAngle - boat.angle;
    while(d < -Math.PI) d += Math.PI*2;
    while(d > Math.PI) d -= Math.PI*2;
    boat.angle += d * 0.1; // Smooth rotation

    boat.speed = boat.speed * 0.98 + (boat.power * 0.005) * 0.02;
    boat.x += Math.cos(boat.angle) * boat.speed;
    boat.y -= Math.sin(boat.angle) * boat.speed;
    
    // Wrap
    boat.x = (boat.x + 1.0) % 1.0; boat.y = (boat.y + 1.0) % 1.0;

    // Physics (UNTOUCHED)
    gl.useProgram(simP);
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo2.f);
    gl.viewport(0,0,S,S);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    const l = gl.getAttribLocation(simP, "aPos");
    gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(gl.getUniformLocation(simP, "uTexel"), 1/S, 1/S);
    gl.uniform4f(gl.getUniformLocation(simP, "uBoat"), boat.x, boat.y, boat.angle, boat.speed);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    let tmp = fbo1; fbo1 = fbo2; fbo2 = tmp;

    // Render (GRAPHICS OVERHAUL)
    gl.useProgram(renP);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, W, H);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform4f(gl.getUniformLocation(renP, "uBoat"), boat.x, boat.y, boat.angle, boat.speed);
    gl.uniform1f(gl.getUniformLocation(renP, "uAspect"), CW/CH);
    gl.uniform1f(gl.getUniformLocation(renP, "uTime"), t * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(loop);
}
loop(0);
</script>
</body>
</html>
