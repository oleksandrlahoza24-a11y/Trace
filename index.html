<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Midnight Sea</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #00050a; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2/build/three.module.js';
    import { Water } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Water.js';
    import { Sky } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Sky.js';
    import { EffectComposer } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/UnrealBloomPass.js';

    // --- Scene & Renderer ---
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.physicallyCorrectLights = true;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 2000);
    camera.position.set(-40, 20, 90);

    // --- Post-Processing ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.8, 0.1);
    composer.addPass(bloomPass);

    // --- The Sky (Atmospheric Scattering) ---
    const sky = new Sky();
    sky.scale.setScalar(10000);
    scene.add(sky);

    const sun = new THREE.Vector3();
    const uniforms = sky.material.uniforms;
    uniforms['turbidity'].value = 10;
    uniforms['rayleigh'].value = 0.3; // Low rayleigh for deep night
    uniforms['mieCoefficient'].value = 0.005;
    uniforms['mieDirectionalG'].value = 0.8;

    const phi = THREE.MathUtils.degToRad(92); // Just below horizon
    const theta = THREE.MathUtils.degToRad(180);
    sun.setFromSphericalCoords(1, phi, theta);
    uniforms['sunPosition'].value.copy(sun);

    // --- Better Water ---
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    const water = new Water(waterGeometry, {
        textureWidth: 1024,
        textureHeight: 1024,
        waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => {
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
        }),
        sunDirection: sun,
        sunColor: 0xffffff,
        waterColor: 0x000810,
        distortionScale: 4.0,
        fog: true
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // --- Upgraded Boat & Lantern ---
    const boatGroup = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x0a0500, roughness: 1, metalness: 0 });
    
    // Hull
    const hullCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, 0, 15), new THREE.Vector3(6, 4, 0),
        new THREE.Vector3(0, 0, -15), new THREE.Vector3(-6, 4, 0)
    ], true);
    const hullGeo = new THREE.TubeGeometry(hullCurve, 64, 4, 12, true);
    const hull = new THREE.Mesh(hullGeo, woodMat);
    hull.scale.set(1, 0.6, 1);
    boatGroup.add(hull);

    // Lantern & Volumetric Glow
    const lantern = new THREE.Group();
    const light = new THREE.PointLight(0xffaa33, 50, 100, 1.7);
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffcc44}));
    lantern.add(light, bulb);
    lantern.position.set(0, 5, 10);
    boatGroup.add(lantern);
    scene.add(boatGroup);

    // --- Better Rain (Motion Blurred Streaks) ---
    const rainCount = 15000;
    const rainGeo = new THREE.BufferGeometry();
    const rainPos = new Float32Array(rainCount * 3);
    for (let i = 0; i < rainCount * 3; i += 3) {
        rainPos[i] = (Math.random() - 0.5) * 600;
        rainPos[i+1] = Math.random() * 300;
        rainPos[i+2] = (Math.random() - 0.5) * 600;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
    const rainMat = new THREE.PointsMaterial({
        color: 0xaaaaaa,
        size: 0.7,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // --- Animation ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Water texture animation
        water.material.uniforms['time'].value += 1.0 / 60.0;

        // "Handheld" Camera feel
        camera.position.y = 20 + Math.sin(t * 0.5) * 2;
        camera.lookAt(boatGroup.position);

        // Boat Physics
        boatGroup.position.y = Math.sin(t * 1.2) * 1.2;
        boatGroup.rotation.z = Math.sin(t * 0.7) * 0.15;
        boatGroup.rotation.x = Math.cos(t * 0.5) * 0.08;

        // Rain
        const pos = rain.geometry.attributes.position.array;
        for (let i = 1; i < pos.length; i += 3) {
            pos[i] -= 5;
            if (pos[i] < -10) pos[i] = 300;
        }
        rain.geometry.attributes.position.needsUpdate = true;

        composer.render();
    }

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });

    animate();
</script>
</body>
</html>
