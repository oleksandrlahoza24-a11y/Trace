<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Realistic Midnight Ocean</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2/build/three.module.js';
    import { Water } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Water.js';
    import { EffectComposer } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/postprocessing/UnrealBloomPass.js';

    // --- Core Setup ---
    const scene = new THREE.Scene();
    // Deep midnight blue fog for depth
    scene.fog = new THREE.FogExp2(0x000509, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(-40, 20, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;
    document.body.appendChild(renderer.domElement);

    // --- Stars & Sky ---
    const starCount = 2000;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) {
        starPos[i] = (Math.random() - 0.5) * 1500;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.8 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // --- Water (The Master Shader) ---
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    const water = new Water(waterGeometry, {
        textureWidth: 512,
        textureHeight: 512,
        waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => {
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
        }),
        sunDirection: new THREE.Vector3(),
        sunColor: 0xffffff,
        waterColor: 0x000305,
        distortionScale: 6.0,
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // --- High-Detail Boat ---
    const boatGroup = new THREE.Group();
    
    // Hull
    const hullPoints = [];
    for (let i = 0; i < 10; i++) {
        hullPoints.push(new THREE.Vector2(Math.sin(i * 0.3) * 5 + 1, (i - 5) * 2));
    }
    const hullGeo = new THREE.LatheGeometry(hullPoints, 32, 0, Math.PI);
    const boatMat = new THREE.MeshStandardMaterial({ 
        color: 0x080402, 
        roughness: 0.9, 
        metalness: 0.1,
        side: THREE.DoubleSide 
    });
    const hull = new THREE.Mesh(hullGeo, boatMat);
    hull.rotation.set(Math.PI / 2, 0, Math.PI / 2);
    hull.scale.set(1, 3, 1);
    boatGroup.add(hull);

    // Interior Bench
    const benchGeo = new THREE.BoxGeometry(7, 0.5, 4);
    const bench = new THREE.Mesh(benchGeo, boatMat);
    bench.position.set(0, 0, 0);
    boatGroup.add(bench);

    // --- Lantern & Dynamic Glow ---
    const lantern = new THREE.Group();
    const lanternFrame = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x000000 }));
    const lanternCore = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffcc33 }));
    
    const pointLight = new THREE.PointLight(0xff7700, 2.5, 80, 1.5);
    pointLight.position.set(0, 0, 0);
    
    lantern.add(lanternFrame, lanternCore, pointLight);
    lantern.position.set(0, 5, 12);
    boatGroup.add(lantern);
    scene.add(boatGroup);

    // --- Advanced Rain System ---
    const rainCount = 12000;
    const rainGeo = new THREE.BufferGeometry();
    const rainPos = new Float32Array(rainCount * 3);
    for (let i = 0; i < rainCount * 3; i += 3) {
        rainPos[i] = (Math.random() - 0.5) * 800;
        rainPos[i+1] = Math.random() * 400;
        rainPos[i+2] = (Math.random() - 0.5) * 800;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
    const rainMat = new THREE.PointsMaterial({
        color: 0x8899aa,
        size: 0.3,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // --- Post-Processing (Bloom) ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
    composer.addPass(bloom);

    // --- Animation Loop ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Animate Ocean
        water.material.uniforms['time'].value += 0.01;

        // Realistic Rocking
        boatGroup.position.y = Math.sin(t * 1.2) * 0.6;
        boatGroup.rotation.z = Math.sin(t * 0.8) * 0.08;
        boatGroup.rotation.x = Math.cos(t * 0.5) * 0.04;

        // Flickering Light
        pointLight.intensity = 2.5 + Math.sin(t * 20) * 0.5;

        // Falling Rain
        const positions = rain.geometry.attributes.position.array;
        for (let i = 1; i < positions.length; i += 3) {
            positions[i] -= 8; // Heavy rain speed
            if (positions[i] < -5) positions[i] = 400;
        }
        rain.geometry.attributes.position.needsUpdate = true;

        // Slow rotate stars
        stars.rotation.y += 0.0001;

        composer.render();
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
