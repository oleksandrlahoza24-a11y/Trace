<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Midnight Sea</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2/build/three.module.js';
    import { Water } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Water.js';

    // --- Core Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x00050a, 0.015); // Add thick night fog

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.set(0, 15, 60);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // --- Lights ---
    const moonLight = new THREE.DirectionalLight(0x556677, 0.2);
    moonLight.position.set(100, 100, -100);
    scene.add(moonLight);

    // --- Realistic Water ---
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    const water = new Water(waterGeometry, {
        textureWidth: 512,
        textureHeight: 512,
        waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => {
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
        }),
        sunDirection: new THREE.Vector3(),
        sunColor: 0xffffff,
        waterColor: 0x00050a,
        distortionScale: 8.0, // Rougher seas
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // --- Complex Boat Shape ---
    const boatGroup = new THREE.Group();
    
    // Hull - Using Lathe for a curved wooden boat look
    const points = [];
    for ( let i = 0; i < 10; i ++ ) {
        points.push( new THREE.Vector2( Math.sin( i * 0.2 ) * 5 + 1, ( i - 5 ) * 1.5 ) );
    }
    const hullGeo = new THREE.LatheGeometry( points, 12, 0, Math.PI );
    const boatMat = new THREE.MeshStandardMaterial({ color: 0x1a0f00, roughness: 0.9, side: THREE.DoubleSide });
    const hull = new THREE.Mesh(hullGeo, boatMat);
    hull.rotation.x = Math.PI / 2;
    hull.rotation.z = Math.PI / 2;
    hull.scale.set(1, 2.5, 0.8);
    boatGroup.add(hull);

    // Benches / Interior
    const bench = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 2), boatMat);
    bench.position.y = 0.5;
    boatGroup.add(bench);

    // --- Lantern ---
    const lanternGroup = new THREE.Group();
    const frame = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.5, 6), new THREE.MeshStandardMaterial({color: 0x111111}));
    const glass = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({color: 0xffcc33}));
    
    const lanternLight = new THREE.PointLight(0xffaa00, 3, 60);
    lanternLight.castShadow = true;
    
    lanternGroup.add(frame, glass, lanternLight);
    lanternGroup.position.set(0, 4, 8);
    boatGroup.add(lanternGroup);
    scene.add(boatGroup);

    // --- Rain with "Motion Blur" (Streaks) ---
    const rainCount = 8000;
    const rainGeo = new THREE.BufferGeometry();
    const rainPos = new Float32Array(rainCount * 3);
    for (let i = 0; i < rainCount * 3; i += 3) {
        rainPos[i] = (Math.random() - 0.5) * 400;
        rainPos[i+1] = Math.random() * 200;
        rainPos[i+2] = (Math.random() - 0.5) * 400;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
    
    // Custom material for rain streaks (long and thin)
    const rainMat = new THREE.PointsMaterial({
        color: 0x8888aa,
        size: 0.4, 
        transparent: true,
        opacity: 0.4
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // --- Animation Logic ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Wave movement
        water.material.uniforms['time'].value += 0.5 / 60.0;

        // Boat Physics (Rocking + Bobbing)
        boatGroup.position.y = Math.sin(t * 0.8) * 0.7;
        boatGroup.rotation.z = Math.sin(t * 0.5) * 0.1;
        boatGroup.rotation.x = Math.cos(t * 0.3) * 0.05;

        // Lantern Flicker
        lanternLight.intensity = 2 + Math.random() * 1.5;

        // Rain motion
        const positions = rain.geometry.attributes.position.array;
        for (let i = 1; i < positions.length; i += 3) {
            positions[i] -= 4.5; // Faster fall = streak effect
            if (positions[i] < -10) positions[i] = 200;
        }
        rain.geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
