<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Stand: Remastered</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; filter: contrast(1.2) saturate(1.1); }
        #overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 100; transition: opacity 2s;
        }
        button {
            background: none; border: 1px solid #fff; color: #fff; padding: 15px 50px;
            font-size: 1.2rem; cursor: pointer; letter-spacing: 10px; transition: 0.5s;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 30px rgba(255,255,255,0.5); }
        #subtitles {
            position: absolute; bottom: 8%; width: 100%; text-align: center;
            color: #ddd; font-style: italic; font-size: 20px; text-shadow: 2px 2px 4px #000;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="overlay"><button onclick="play()">INITIATE</button></div>
    <div id="subtitles" id="subs"></div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const subs = document.getElementById('subtitles');
        
        let w, h, t = 0, playing = false;
        let particles = [];
        let camera = { x: 0, y: 0, zoom: 1, targetZoom: 1, shake: 0 };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function play() {
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                playing = true;
                subs.style.opacity = 1;
                loop();
            }, 2000);
        }

        class Particle {
            constructor(x, y, color, type = 'blood') {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * (type === 'shell' ? 5 : 12);
                this.vy = Math.random() * -8;
                this.life = 1;
                this.color = color;
                this.type = type;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.25; // Gravity
                this.life -= 0.015;
                if(this.y > 0) { this.y = 0; this.vx *= 0.5; this.vy *= -0.3; } // Floor bounce
            }
        }

        function drawStick(x, y, scale, angle, pose, color = "#fff") {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';

            const walk = Math.sin(t * 0.15) * 15;
            
            // Head (Shadow effect)
            ctx.beginPath();
            ctx.arc(0, -60, 12, 0, Math.PI * 2);
            ctx.stroke();

            // Spine
            ctx.beginPath();
            ctx.moveTo(0, -48);
            ctx.lineTo(0, -20);

            if(pose === 'walk') {
                // Legs
                ctx.moveTo(0, -20); ctx.lineTo(walk, 0);
                ctx.moveTo(0, -20); ctx.lineTo(-walk, 0);
                // Arms
                ctx.moveTo(0, -40); ctx.lineTo(-walk * 0.8, -25);
                ctx.moveTo(0, -40); ctx.lineTo(walk * 0.8, -25);
            } else if(pose === 'aim') {
                ctx.moveTo(0, -20); ctx.lineTo(-10, 0);
                ctx.moveTo(0, -20); ctx.lineTo(10, 0);
                // Aiming Arm
                ctx.moveTo(0, -40); ctx.lineTo(35, -45);
                // Gun Detail
                ctx.fillStyle = "#333";
                ctx.fillRect(30, -52, 18, 10);
            } else if(pose === 'recoil') {
                ctx.moveTo(0, -20); ctx.lineTo(-15, 0);
                ctx.moveTo(0, -20); ctx.lineTo(5, 0);
                ctx.moveTo(0, -40); ctx.lineTo(30, -60);
                ctx.fillRect(25, -67, 18, 10);
            }

            ctx.stroke();
            ctx.restore();
        }

        function loop() {
            if(!playing) return;
            t++;
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, w, h);

            // Camera Logic
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;
            ctx.save();
            if(camera.shake > 0) {
                ctx.translate(Math.random()*camera.shake, Math.random()*camera.shake);
                camera.shake *= 0.9;
            }
            ctx.translate(w/2, h/2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(camera.x, camera.y);

            // --- SCENE LAYERS ---
            
            // 1. Distant Background (Parallax Mountains)
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.moveTo(-1000, 0);
            for(let i=-1000; i<1000; i+=100) ctx.lineTo(i, -100 - Math.random()*50);
            ctx.lineTo(1000, 0);
            ctx.fill();

            // 2. Floor
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-2000, 0); ctx.lineTo(2000, 0); ctx.stroke();

            // 3. Scripted Animation Logic
            const sec = t / 60;
            
            if(sec < 4) {
                camera.x -= 0.5;
                drawStick(camera.x * -1 - 200, 0, 1.5, 0, 'walk');
                subs.innerText = "They said it would be easy.";
            } else if (sec < 7) {
                camera.targetZoom = 1.5;
                drawStick(-100, 0, 1.5, 0, 'aim');
                subs.innerText = "But nothing ever is.";
            } else if (sec < 12) {
                const isFiring = Math.floor(sec * 10) % 10 === 0;
                drawStick(-100, 0, 1.5, 0, isFiring ? 'recoil' : 'aim');
                
                if(isFiring) {
                    camera.shake = 8;
                    // Flash
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.fillRect(-2000, -2000, 4000, 4000);
                    // Particles
                    particles.push(new Particle(-55, -45, '#ffd700', 'shell'));
                    for(let i=0; i<5; i++) particles.push(new Particle(150, -40, '#ff0000'));
                }
                
                // Enemy Silhouette
                drawStick(200, 0, 1.5, 0, 'aim', '#ff4444');
                subs.innerText = "* Gunshots echoing in the valley *";
            } else {
                camera.targetZoom = 0.8;
                camera.y = -50;
                drawStick(-100, 0, 1.5, 0, 'walk');
                subs.innerText = "Memory is a heavy burden.";
            }

            // 4. Particles
            particles.forEach((p, i) => {
                p.update();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.type === 'shell' ? 2 : 3, 0, 7);
                ctx.fill();
                if(p.life < 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            ctx.restore();

            // Cinematic Grain & Bars
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for(let i=0; i<100; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
            
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h * 0.15);
            ctx.fillRect(0, h * 0.85, w, h * 0.15);

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
