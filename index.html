<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Infinite Ocean</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            touch-action: none; /* Prevents iPad "bounce" scrolling */
        }
        canvas { 
            display: block; width: 100vw; height: 100vh; 
        }
        /* HUD for help */
        #hud {
            position: fixed; top: 20px; left: 20px;
            color: rgba(255,255,255,0.4);
            font-family: sans-serif; font-size: 12px;
            pointer-events: none; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="hud">LEFT: WALK | RIGHT: LOOK</div>
    <canvas id="glCanvas"></canvas>

    <script src="water.js"></script>
    <script src="character.js"></script>
    <script src="main.js"></script>

    <script>
        // Emergency Error Handler
        window.onerror = function(msg, url, line) {
            const div = document.createElement('div');
            div.style.cssText = "position:fixed;top:0;background:red;color:white;padding:10px;font-size:10px;";
            div.innerHTML = "Error: " + msg + " line: " + line;
            document.body.appendChild(div);
        };
    </script>
</body>
</html>
