<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lush Island Explorer - Modular</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; 
            touch-action: none; /* Crucial for iPad: stops page zooming/scrolling */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 0; font-size: 16px; opacity: 0.9; }
        
        .zone-hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            width: 50%;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 5;
        }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Ultra Lush Island</h1>
        <p>Touch & Drag Left: Move | Touch & Drag Right: Look</p>
    </div>
    <div id="left-zone" class="zone-hint">Movement Zone</div>
    <div id="right-zone" class="zone-hint">Look Zone</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="models.js"></script>
    
    <script src="graphics.js"></script>

</body>
</html>
