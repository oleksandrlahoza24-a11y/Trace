<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Low-Poly Drive Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* Joystick Styles */
        #joystick-container {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: #ff4d6d;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">
        <strong>Low Poly Drifter</strong><br>
        <small>WASD or Virtual Joystick</small>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa2d2ff); 
        scene.fog = new THREE.Fog(0xa2d2ff, 10, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- Low Poly Terrain ---
        const groundGeo = new THREE.PlaneGeometry(200, 200, 30, 30);
        groundGeo.rotateX(-Math.PI / 2);
        const posAttr = groundGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            posAttr.setY(i, Math.random() * 0.4);
        }
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x72efdd, flatShading: true });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = true;
        scene.add(ground);

        // Add some "rocks"
        for(let i=0; i<30; i++) {
            const rock = new THREE.Mesh(
                new THREE.DodecahedronGeometry(Math.random() * 2),
                new THREE.MeshStandardMaterial({ color: 0x6c757d, flatShading: true })
            );
            rock.position.set(Math.random()*100-50, 0, Math.random()*100-50);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            scene.add(rock);
        }

        // --- Stylized Car ---
        const car = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 0.7, 3.5),
            new THREE.MeshStandardMaterial({ color: 0xff4d6d, flatShading: true })
        );
        body.position.y = 0.6;
        body.castShadow = true;
        car.add(body);

        const roof = new THREE.Mesh(
            new THREE.BoxGeometry(1.4, 0.7, 1.8),
            new THREE.MeshStandardMaterial({ color: 0x2b2d42, flatShading: true })
        );
        roof.position.set(0, 1.3, -0.2);
        car.add(roof);

        scene.add(car);

        // --- Input Logic (Hybrid) ---
        let inputX = 0; // Steering
        let inputY = 0; // Speed
        const keys = {};

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- Joystick Logic ---
        const knob = document.getElementById('joystick-knob');
        const container = document.getElementById('joystick-container');
        let dragging = false;

        const handleMove = (clientX, clientY) => {
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 50;

            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }

            knob.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // Normalize inputs to -1 to 1
            inputX = -dx / maxDist; // Horizontal
            inputY = -dy / maxDist; // Vertical
        };

        const resetJoystick = () => {
            dragging = false;
            knob.style.transform = `translate(0, 0)`;
            inputX = 0;
            inputY = 0;
        };

        container.addEventListener('touchstart', (e) => { dragging = true; handleMove(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchmove', (e) => { if(dragging) handleMove(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', resetJoystick);

        // --- Animation ---
        let speed = 0;
        const vel = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // Merge Keyboard and Joystick
            let moveY = inputY;
            let moveX = -inputX;

            if (keys['KeyW'] || keys['ArrowUp']) moveY = 1;
            if (keys['KeyS'] || keys['ArrowDown']) moveY = -1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX = 1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX = -1;

            // Physics
            speed += moveY * 0.01;
            speed *= 0.95; // Friction

            car.rotation.y += moveX * (speed * 0.2);
            car.position.x += Math.sin(car.rotation.y) * speed;
            car.position.z += Math.cos(car.rotation.y) * speed;

            // Follow Camera
            const offset = new THREE.Vector3(0, 4, -8).applyQuaternion(car.quaternion);
            camera.position.lerp(car.position.clone().add(offset), 0.1);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
