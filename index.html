<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra High-Res Anime Spirit Tree</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d); }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

<div id="ui"><h1>The Eternal Bloom</h1></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // --- MAGICAL LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const sun = new THREE.DirectionalLight(0xffeebb, 2);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    const pointLight = new THREE.PointLight(0x00ff88, 5, 50);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    // --- SHADERS (The "Secret Sauce") ---
    // Custom shader to make leaves flutter in the wind
    const leafShaderMaterial = new THREE.MeshToonMaterial({
        color: 0xff69b4, // Cherry Blossom Pink
        side: THREE.DoubleSide,
    });

    leafShaderMaterial.onBeforeCompile = (shader) => {
        shader.uniforms.uTime = { value: 0 };
        shader.vertexShader = `
            uniform float uTime;
        ` + shader.vertexShader;
        shader.vertexShader = shader.vertexShader.replace(
            '#include <begin_vertex>',
            `
            vec3 transformed = vec3(position);
            float spread = 0.5;
            transformed.x += sin(uTime * 2.0 + position.y * spread) * 0.2;
            transformed.z += cos(uTime * 1.5 + position.x * spread) * 0.2;
            `
        );
        leafShaderMaterial.userData.shader = shader;
    };

    // --- TREE CONSTRUCTION ---
    const trunkMat = new THREE.MeshToonMaterial({ color: 0x2d1b0d });
    const masterGroup = new THREE.Group();
    scene.add(masterGroup);

    function createDetailedBranch(parent, startPos, dir, length, radius, depth) {
        if (depth > 8) return;

        // Tapered geometry for "realistic" feel
        const segments = Math.max(3, 10 - depth);
        const geo = new THREE.CylinderGeometry(radius * 0.65, radius, length, segments);
        geo.translate(0, length / 2, 0);
        
        const branch = new THREE.Mesh(geo, trunkMat);
        branch.position.copy(startPos);
        
        // Direction alignment
        const axis = new THREE.Vector3(0, 1, 0);
        branch.quaternion.setFromUnitVectors(axis, dir.clone().normalize());
        
        branch.scale.set(0, 0, 0); // Start tiny for growth animation
        parent.add(branch);

        // Recursive spawning
        const subBranches = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < subBranches; i++) {
            const nextDir = dir.clone()
                .applyAxisAngle(new THREE.Vector3(1, 0, 0), (Math.random() - 0.5) * 1.8)
                .applyAxisAngle(new THREE.Vector3(0, 1, 0), Math.random() * Math.PI * 2)
                .lerp(new THREE.Vector3(0, 1, 0), 0.3); // Encourage upward growth
            
            setTimeout(() => {
                createDetailedBranch(branch, new THREE.Vector3(0, length, 0), nextDir, length * 0.78, radius * 0.6, depth + 1);
            }, 400 + (depth * 150));
        }

        // Bloom/Leaves - High Density
        if (depth > 5) {
            const leafCount = 5;
            for(let j=0; j<leafCount; j++) {
                const leafGeo = new THREE.IcosahedronGeometry(0.4, 0);
                const leaf = new THREE.Mesh(leafGeo, leafShaderMaterial);
                leaf.position.set(
                    (Math.random()-0.5) * 1,
                    length + (Math.random()*0.5),
                    (Math.random()-0.5) * 1
                );
                leaf.scale.set(0,0,0);
                branch.add(leaf);
                
                // Animate leaf growth
                setTimeout(() => { leaf.userData.growing = true; }, 2000 + (depth * 200));
            }
        }

        branch.userData.growing = true;
    }

    // Initialize Growth
    createDetailedBranch(masterGroup, new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), 5, 0.6, 0);

    // --- GROUND & PARTICLES ---
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshToonMaterial({ color: 0x112211 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Floating Ember/Petal Particles
    const pCount = 200;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random()-0.5) * 40;
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.6 });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    // --- ANIMATION LOOP ---
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        if (leafShaderMaterial.userData.shader) {
            leafShaderMaterial.userData.shader.uniforms.uTime.value = time;
        }

        // Update growth for all meshes
        scene.traverse((obj) => {
            if (obj.userData.growing && obj.scale.x < 1) {
                obj.scale.x += 0.005;
                obj.scale.y += 0.005;
                obj.scale.z += 0.005;
            }
            // Gentle trunk sway
            if (obj.isMesh && obj !== ground) {
                obj.rotation.z += Math.sin(time + obj.position.y) * 0.0002;
            }
        });

        // Rotate camera slightly for "Cinematic" feel
        masterGroup.rotation.y += 0.001;
        particles.position.y -= 0.02;
        if (particles.position.y < -10) particles.position.y = 10;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
