<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultra Real WebGL Fire Solver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#010000; touch-action:none;
    -webkit-user-select:none; user-select:none; }
  canvas { display:block; position:fixed; top:0; left:0; touch-action:none; cursor:crosshair; }
  #ui {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    color:rgba(255, 70, 20, 0.7); font-family:'Share Tech Mono',monospace; font-size:11px;
    letter-spacing:5px; text-transform:uppercase; pointer-events:none;
    transition:opacity 2.5s; white-space:nowrap;
    text-shadow:0 0 18px rgba(255, 30, 0, 0.9);
  }
  #ui.fade { opacity:0; }
  #badge {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    color:rgba(255, 70, 20, 0.5); font-family:'Share Tech Mono',monospace;
    font-size:10px; letter-spacing:7px; pointer-events:none; white-space:nowrap;
    text-shadow:0 0 12px rgba(255, 30, 0, 0.6);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="badge">FULL NAVIER-STOKES · COMBUSTION SIMULATION</div>
<div id="ui">drag to interact</div>
<script>
'use strict';

const canvas = document.getElementById('c');
const ui     = document.getElementById('ui');
const DPR    = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0, CW = 0, CH = 0;

function resize() {
  CW = window.innerWidth; CH = window.innerHeight;
  W  = Math.round(CW * DPR); H = Math.round(CH * DPR);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
}
resize(); window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl', {antialias:false, alpha:false, powerPreference:'high-performance'})
        || canvas.getContext('experimental-webgl', {antialias:false, alpha:false});
if(!gl) { document.body.innerHTML = '<p style="color:#f44;font-family:monospace;padding:40px">WebGL unavailable</p>'; throw 0; }

// Enable float extensions for high-precision simulation and HDR
const extHalfFloat = gl.getExtension('OES_texture_half_float');
const extHalfFloatLinear = gl.getExtension('OES_texture_half_float_linear');
gl.getExtension('EXT_color_buffer_half_float');
const extFloat = gl.getExtension('OES_texture_float');
const extFloatLinear = gl.getExtension('OES_texture_float_linear');
gl.getExtension('WEBGL_color_buffer_float');

function canRT(type){
  const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 4, 4, 0, gl.RGBA, type, null);
  const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.deleteFramebuffer(f); gl.deleteTexture(t); gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return ok;
}

let FTYPE, ULIN;
if(extHalfFloat && canRT(extHalfFloat.HALF_FLOAT_OES)) {
    FTYPE = extHalfFloat.HALF_FLOAT_OES; ULIN = !!extHalfFloatLinear;
} else if(extFloat && canRT(gl.FLOAT)) {
    FTYPE = gl.FLOAT; ULIN = !!extFloatLinear;
} else {
    FTYPE = gl.UNSIGNED_BYTE; ULIN = true;
}

const S = 512; // Simulation resolution
const DISSIPATION_SPEED = 0.992; // How fast density dissipates

const VERT = `attribute vec2 aPos; varying vec2 vUV;
void main(){ vUV = aPos*.5+.5; gl_Position = vec4(aPos,0.,1.); }`;

// ─── SHADER SOURCES ─────────────────────────────────────────────────────────

// ADVECTION SHADER: Moves fields along velocity (Eulerian method)
const ADV_SRC = `precision highp float; varying vec2 vUV;
uniform sampler2D uS; // Field to advect (e.g., density or velocity)
uniform sampler2D uV; // Velocity field
uniform vec2 uTx; uniform float uDt; uniform float uDiss;
void main() {
    vec2 vel = texture2D(uV, vUV).xy;
    vec2 coord = vUV - uDt * uTx * vel;
    gl_FragColor = texture2D(uS, coord) * uDiss;
}`;

// DIVERGENCE SHADER: Calculates divergence of velocity field (prerequisite for pressure solver)
const DIV_SRC = `precision highp float; varying vec2 vUV;
uniform sampler2D uV; uniform vec2 uTx;
void main() {
    float vL = texture2D(uV, vUV - vec2(uTx.x, 0.0)).x;
    float vR = texture2D(uV, vUV + vec2(uTx.x, 0.0)).x;
    float vT = texture2D(uV, vUV + vec2(0.0, uTx.y)).y;
    float vB = texture2D(uV, vUV - vec2(0.0, uTx.y)).y;
    float div = 0.5 * ((vR - vL) + (vT - vB));
    gl_FragColor = vec4(div, 0.0, 0.0, 1.0);
}`;

// JACOBI SHADER: Solves pressure Poisson equation iteratively
const JAC_SRC = `precision highp float; varying vec2 vUV;
uniform sampler2D uP; // Pressure field
uniform sampler2D uD; // Divergence field
uniform vec2 uTx;
void main() {
    float pL = texture2D(uP, vUV - vec2(uTx.x, 0.0)).x;
    float pR = texture2D(uP, vUV + vec2(uTx.x, 0.0)).x;
    float pT = texture2D(uP, vUV + vec2(0.0, uTx.y)).y;
    float pB = texture2D(uP, vUV - vec2(0.0, uTx.y)).y;
    float div = texture2D(uD, vUV).x;
    float p = (pL + pR + pT + pB - div) * 0.25;
    gl_FragColor = vec4(p, 0.0, 0.0, 1.0);
}`;

// SUBTRACT SHADER: Subtracts pressure gradient from velocity to make it divergence-free
const SUB_SRC = `precision highp float; varying vec2 vUV;
uniform sampler2D uV; uniform sampler2D uP; uniform vec2 uTx;
void main() {
    float pL = texture2D(uP, vUV - vec2(uTx.x, 0.0)).x;
    float pR = texture2D(uP, vUV + vec2(uTx.x, 0.0)).x;
    float pT = texture2D(uP, vUV + vec2(0.0, uTx.y)).y;
    float pB = texture2D(uP, vUV - vec2(0.0, uTx.y)).y;
    vec2 vel = texture2D(uV, vUV).xy;
    vel -= 0.5 * vec2(pR - pL, pT - pB);
    gl_FragColor = vec4(vel, 0.0, 1.0);
}`;

// INJECT/BUOYANCY SHADER: Adds physical forces (buoyancy) and combustion fields
const FORCE_SRC = `precision highp float; varying vec2 vUV;
uniform sampler2D uS; uniform float uTime; uniform vec2 uM; uniform float uMActive;
uniform vec2 uMv; uniform float uAspect; uniform vec2 uTx;
float snoise(vec3 v) { return abs(fract(sin(v.x * 123.456 + v.y * 345.678 + v.z * 567.890) * 45678.9123) * 2.0 - 1.0); }
void main() {
    vec4 state = texture2D(uS, vUV);
    vec2 vel = state.xy; float density = state.z; float heat = state.w;
    // Thermodynamics: Heat induces upward force
    vel.y += heat * 0.0035; 
    
    // Inject fuel/density at bottom (procedural emitter)
    float baseEmitter = smoothstep(0.12, 0.0, vUV.y) * smoothstep(0.35, 0.0, abs(vUV.x - 0.5));
    float ignitionNoise = snoise(vec3(vUV.x * 10.0, uTime * 3.0, 0.0)) * 0.5 + 0.5;
    if(vUV.y < 0.04) {
        density += baseEmitter * ignitionNoise * 1.5;
        heat += baseEmitter * ignitionNoise * 1.5;
    }
    
    // Dissipation/Fuel Burn
    density *= 0.990; heat *= 0.975; 

    // Mouse Interaction
    float dist = length((vUV - uM) * vec2(uAspect, 1.0));
    float mouseStrength = exp(-dist * 35.0) * uMActive;
    density += mouseStrength * 2.0; heat += mouseStrength * 2.0;
    vel += uMv * mouseStrength * 20.0;
    
    // Vorticity confinement approximation (simple high-frequency noise insertion)
    float vortexNoise = snoise(vec3(vUV * 100.0, uTime)) * density;
    vel.x += vortexNoise * 0.005 * (smoothstep(0.0,0.3,vUV.y)-smoothstep(0.6,0.9,vUV.y));

    gl_FragColor = clamp(vec4(vel, density, heat), vec4(-10.0), vec4(10.0));
}`;

// RENDER SHADER: HDR Blackbody mapping + Post-processing
const REN_SRC = `precision highp float; varying vec2 vUV;
uniform sampler2D uW; uniform float uAspect; uniform vec2 uTx;
// Color mapping based on blackbody radiation approximation
vec3 blackbody(float t) {
    vec3 col = vec3(0.0);
    // Darker areas -> Black/Brown/Red
    col += mix(vec3(0.0), vec3(0.1, 0.01, 0.0), smoothstep(0.0, 0.1, t));
    col += mix(vec3(0.0), vec3(0.9, 0.1, 0.0), smoothstep(0.1, 0.25, t));
    // Medium intensity -> Orange/Yellow
    col += mix(vec3(0.0), vec3(1.0, 0.6, 0.15), smoothstep(0.25, 0.5, t));
    col += mix(vec3(0.0), vec3(1.0, 0.9, 0.6), smoothstep(0.5, 0.75, t));
    // Blinding core -> White
    col += mix(vec3(0.0), vec3(0.8, 0.9, 1.0), smoothstep(0.75, 1.2, t));
    return col;
}
void main() {
    float heat = texture2D(uW, vUV).w;
    
    // HDR color mapping (boosting visual scale)
    vec3 fire = blackbody(heat * 1.4);

    // Apply bloom contribution
    heat += texture2D(uW, vUV + vec2(uTx.x*1.5,0.0)).w*0.08;
    heat += texture2D(uW, vUV - vec2(uTx.x*1.5,0.0)).w*0.08;
    heat += texture2D(uW, vUV + vec2(0.0,uTx.y*1.5)).w*0.08;
    heat += texture2D(uW, vUV - vec2(0.0,uTx.y*1.5)).w*0.08;
    fire = mix(fire, vec3(1.0, 0.5, 0.1), heat * 0.1);

    // Subtle background gradient and tone mapping
    vec3 col = fire + mix(vec3(0.02, 0.01, 0.005), vec3(0.0), vUV.y);
    col *= clamp(1.0 - length((vUV-0.5)*vec2(uAspect,1.0)*0.7), 0.0, 1.0);
    col = (col*(2.51*col+0.03))/(col*(2.43*col+0.59)+0.14); // ACES approximation
    gl_FragColor = vec4(col, 1.0);
}`;

// ─── WebGL Initialization ──────────────────────────────────────────────────
function mkSh(type, src){
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(fsrc){
  const p = gl.createProgram(); gl.attachShader(p, mkSh(gl.VERTEX_SHADER, VERT)); gl.attachShader(p, mkSh(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p); if(!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  const u = {}, n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){ const x=gl.getActiveUniform(p,i); u[x.name]=gl.getUniformLocation(p,x.name); } return {p, u};
}

let advP, divP, jacP, subP, srcP, renP;
try {
  advP = mkProg(ADV_SRC); divP = mkProg(DIV_SRC); jacP = mkProg(JAC_SRC); subP = mkProg(SUB_SRC); srcP = mkProg(FORCE_SRC); renP = mkProg(REN_SRC);
} catch(e) { document.body.innerHTML = `<pre style="color:#f44;padding:20px">${e.message}</pre>`; throw e; }

const qb = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, qb); gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
function bindQ(prog){ gl.bindBuffer(gl.ARRAY_BUFFER, qb); const loc = gl.getAttribLocation(prog.p, 'aPos'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0); }

function mkFBO(resX = S, resY = S){
  const n = resX * resY * 4; const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
  const data = (FTYPE === gl.FLOAT ? new Float32Array(n) : null);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, resX, resY, 0, gl.RGBA, FTYPE, data);
  const filt = ULIN ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filt); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, fbo); gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0); gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {tex, fbo};
}
// Double buffers for iterative solving
let wFBO = mkFBO(), wFBOBack = mkFBO(); // R=VelX, G=VelY, B=Density, A=Heat
let pFBO = mkFBO(), pFBOBack = mkFBO(); // R=Pressure
let dFBO = mkFBO(); // R=Divergence

// ─── Input Handling ───────────────────────────────────────────────────────
const ptr = {x:-1, y:-1, vx:0, vy:0, active:0};
function dismiss(){ ui.classList.add('fade'); setTimeout(()=>ui.style.display='none',3000); }
function toUV(cx,cy){ return {x:cx/CW, y:1.-cy/CH}; }
function onDown(e){ const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY); ptr.x=uv.x; ptr.y=uv.y; ptr.active=1; dismiss(); }
function onMove(e){ if(!ptr.active)return; const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY); ptr.vx=uv.x-ptr.x; ptr.vy=uv.y-ptr.y; ptr.x=uv.x; ptr.y=uv.y; }
canvas.addEventListener('mousedown', onDown); canvas.addEventListener('mousemove', onMove); window.addEventListener('mouseup', ()=>ptr.active=0);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);},{passive:false}); canvas.addEventListener('touchmove', e=>{e.preventDefault();onMove(e);},{passive:false}); canvas.addEventListener('touchend', ()=>ptr.active=0,{passive:false});

// ─── Physics Loop ─────────────────────────────────────────────────────────
function pass(prog, dst, srcU, backP, jacD){
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo); gl.useProgram(prog.p); bindQ(prog);
  gl.viewport(0, 0, S, S); const u = prog.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, srcU); gl.uniform1i(u.uV, 0); // Primary texture unit
  if(u.uS){ gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, backP); gl.uniform1i(u.uS, 1); } // Backpressure for Jacobi
  if(u.uD){ gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, jacD); gl.uniform1i(u.uD, 2); } // Divergence texture for Jacobi
  if(u.uTx) gl.uniform2f(u.uTx, 1/S, 1/S); if(u.uAspect) gl.uniform1f(u.uAspect, W/H); if(u.uTime) gl.uniform1f(u.uTime, time);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

function advectPass(src, vel, dst, diss = 1.0){
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo); gl.useProgram(advP.p); bindQ(advP);
  gl.viewport(0, 0, S, S); const u = advP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex); gl.uniform1i(u.uS, 0); // Source (to advect)
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, vel.tex); gl.uniform1i(u.uV, 1); // Velocity
  gl.uniform1f(u.uDiss, diss); gl.uniform1f(u.uDt, 0.016); gl.uniform2f(u.uTx, 1/S, 1/S);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

// Full Navier-Stokes solver sequence
function stepPhysics(){
  // 1. Advection (Self-Advection: velocity advects itself and density field)
  advectPass(wFBO, wFBO, wFBOBack); 
  // 2. Combustion Emitter & Thermodynamics
  pass(srcP, wFBO, wFBOBack.tex); 
  
  // 3. Pressure Solve (Jacobi iteration)
  // Calculate divergence
  pass(divP, dFBO, wFBO.tex); 
  // Iteratively solve pressure (multiple passes create tighter vortexes)
  for(let i=0; i<18; i++){ 
    pass(jacP, pFBO, dFBO.tex, pFBOBack.tex); // Source divergence into U2 for Jac solver
    const tmp = pFBO; pFBO = pFBOBack; pFBOBack = tmp; // Swap pFBO
  }
  // 4. Subtract pressure gradient to make velocity incompressable
  pass(subP, wFBOBack, wFBO.tex, pFBO.tex); // Use pFBOBack for subtraction (last written pressure)
  const tmp = wFBO; wFBO = wFBOBack; wFBOBack = tmp; // Swap wFBO
  
  ptr.vx*=0.3; ptr.vy*=0.3;
}

let time = 0;
function frame(now){
  requestAnimationFrame(frame); time=now*0.001;
  
  stepPhysics(); // Run solver

  // Render to screen
  gl.viewport(0, 0, W, H); gl.useProgram(renP.p); bindQ(renP);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, wFBO.tex);
  gl.uniform1i(renP.u.uW, 0); gl.uniform1f(renP.u.uAspect, W/H); gl.uniform2f(renP.u.uTx, 1/S, 1/S);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
requestAnimationFrame(frame);
</script>
</body>
