<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Optimized Realistic Water</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; overflow:hidden; background:#001; position: fixed; touch-action: none; }
  canvas { display:block; width:100vw; height:100vh; }
  #ui { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .ctrl { position: absolute; pointer-events:auto; }
  
  #wheel-zone {
    bottom: 40px; left: 40px; width: 180px; height: 180px;
    background: rgba(20,25,30,0.8); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
  }
  #wheel { width: 140px; height: 140px; border: 10px solid #333; border-radius: 50%; position: relative; }
  #wheel::after { content:''; position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:12px; height:22px; background:#ff4400; border-radius:2px; }

  #throttle-zone { 
    bottom: 40px; right: 40px; width: 60px; height: 180px; 
    background: rgba(20,25,30,0.8); border: 2px solid rgba(255,255,255,0.1); 
    border-radius: 30px; overflow: hidden; 
  }
  #throttle-bar { position:absolute; bottom:0; width:100%; background: #00d4ff; transition: height 0.1s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
    <div id="wheel-zone" class="ctrl"><div id="wheel"></div></div>
    <div id="throttle-zone" class="ctrl"><div id="throttle-bar" style="height:0%"></div></div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, CW, CH;
function resize() {
    CW = window.innerWidth; CH = window.innerHeight;
    W = Math.round(CW * DPR); H = Math.round(CH * DPR);
    canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

const S = 512;
const ext = gl.getExtension('OES_texture_half_float') || gl.getExtension('OES_texture_float');
const FTYPE = ext ? (ext.HALF_FLOAT_OES || gl.FLOAT) : gl.UNSIGNED_BYTE;

const VERT = `attribute vec2 aPos; varying vec2 vUV; void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0.,1.); }`;

const SIM_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec4 uBoat; 
void main() {
    vec4 data = texture2D(uState, vUV);
    float h = data.r * 2.0 - 1.0;
    float hp = data.g * 2.0 - 1.0;
    float foam = data.b;
    float n = texture2D(uState, vUV + vec2(0., uTexel.y)).r * 2. - 1.;
    float s = texture2D(uState, vUV - vec2(0., uTexel.y)).r * 2. - 1.;
    float e = texture2D(uState, vUV + vec2(uTexel.x, 0.)).r * 2. - 1.;
    float w = texture2D(uState, vUV - vec2(uTexel.x, 0.)).r * 2. - 1.;
    float nextH = (n + s + e + w) * 0.5 - hp;
    nextH *= 0.994;
    float wake = smoothstep(0.06, 0.0, length(vUV - uBoat.xy)) * uBoat.w * 12.0;
    gl_FragColor = vec4((nextH + wake) * 0.5 + 0.5, data.r, clamp(foam * 0.97 + wake * 1.2, 0.0, 1.0), 1.0);
}`;

const REN_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uWater;
uniform vec4 uBoat;
uniform float uAspect;
uniform float uTime;

void main() {
    vec2 tx = vec2(1.0/512.0);
    vec4 data = texture2D(uWater, vUV);
    float h = data.r * 2.0 - 1.0;
    
    // Smooth Normals
    float hL = texture2D(uWater, vUV - vec2(tx.x, 0.0)).r * 2.0 - 1.0;
    float hR = texture2D(uWater, vUV + vec2(tx.x, 0.0)).r * 2.0 - 1.0;
    float hU = texture2D(uWater, vUV + vec2(0.0, tx.y)).r * 2.0 - 1.0;
    float hD = texture2D(uWater, vUV - vec2(0.0, tx.y)).r * 2.0 - 1.0;
    vec3 n = normalize(vec3(hL - hR, hD - hU, 0.1));

    // Ground & Refraction
    vec2 refUV = vUV + n.xy * 0.05;
    vec3 sand = vec3(0.7, 0.6, 0.4) * (0.9 + 0.1 * sin(refUV.x * 50.0) * cos(refUV.y * 50.0));
    
    // Boat Shadow
    float shadow = 1.0 - smoothstep(0.0, 0.06, length(refUV - uBoat.xy - vec2(0.02)));
    sand *= (1.0 - shadow * 0.4);

    // Fresnel Reflections
    float fresnel = pow(1.0 - n.z, 3.5);
    vec3 sky = mix(vec3(0.1, 0.4, 0.8), vec3(0.8, 0.9, 1.0), max(0.0, n.y * 0.5 + 0.5));
    
    // Final Composition
    vec3 waterBase = mix(sand * vec3(0.2, 0.5, 0.6), sky, fresnel + 0.1);
    waterBase += data.b * 0.5; // Foam

    // Boat Hull
    vec2 bP = vUV - uBoat.xy;
    float ca = cos(-uBoat.z), sa = sin(-uBoat.z);
    vec2 rUV = vec2(bP.x * ca - bP.y * sa, bP.x * sa + bP.y * ca);
    rUV.x *= uAspect;
    float hull = max(abs(rUV.x) - 0.015, abs(rUV.y) - 0.04 + abs(rUV.x));
    
    vec3 color = (hull < 0.0) ? vec3(0.1, 0.1, 0.15) : waterBase;
    gl_FragColor = vec4(pow(color, vec3(0.9)), 1.0);
}`;

function createProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    gl.attachShader(p, s1); 
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const simP = createProg(VERT, SIM_FRAG);
const renP = createProg(VERT, REN_FRAG);

function createFBO() {
    const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, null);
    gl.texParameteri(gl.TEXTURE_2D, 10240, 9729); gl.texParameteri(gl.TEXTURE_2D, 10241, 9729);
    gl.texParameteri(gl.TEXTURE_2D, 10242, 33071); gl.texParameteri(gl.TEXTURE_2D, 10243, 33071);
    const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
    return { t, f };
}

let fbo1 = createFBO(), fbo2 = createFBO();
const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

let boat = { x: 0.5, y: 0.5, angle: 1.57, tAngle: 1.57, speed: 0, power: 0 };
const wheel = document.getElementById('wheel');
const tBar = document.getElementById('throttle-bar');

window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for(let t of e.touches) {
        if(t.clientX < CW * 0.5) {
            const r = document.getElementById('wheel-zone').getBoundingClientRect();
            boat.tAngle = Math.atan2((r.top + 90) - t.clientY, t.clientX - (r.left + 90));
            wheel.style.transform = `rotate(${-boat.tAngle + 1.57}rad)`;
        } else {
            let p = 1.0 - (t.clientY - (CH - 220)) / 180;
            boat.power = Math.max(0, Math.min(1, p));
            tBar.style.height = (boat.power * 100) + "%";
        }
    }
}, {passive: false});

function loop(t) {
    let d = boat.tAngle - boat.angle;
    while(d < -Math.PI) d += Math.PI*2;
    while(d > Math.PI) d -= Math.PI*2;
    boat.angle += d * 0.1;
    boat.speed = boat.speed * 0.98 + (boat.power * 0.005) * 0.02;
    boat.x = (boat.x + Math.cos(boat.angle) * boat.speed + 1.0) % 1.0;
    boat.y = (boat.y - Math.sin(boat.angle) * boat.speed + 1.0) % 1.0;

    gl.useProgram(simP);
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo2.f);
    gl.viewport(0,0,S,S);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    const l = gl.getAttribLocation(simP, "aPos");
    gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(gl.getUniformLocation(simP, "uTexel"), 1/S, 1/S);
    gl.uniform4f(gl.getUniformLocation(simP, "uBoat"), boat.x, boat.y, boat.angle, boat.speed);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    let tmp = fbo1; fbo1 = fbo2; fbo2 = tmp;

    gl.useProgram(renP);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, W, H);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform4f(gl.getUniformLocation(renP, "uBoat"), boat.x, boat.y, boat.angle, boat.speed);
    gl.uniform1f(gl.getUniformLocation(renP, "uAspect"), CW/CH);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
}
loop(0);
</script>
</body>
</html>
