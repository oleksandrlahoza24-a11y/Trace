<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Midnight Ocean</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2/build/three.module.js';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';
    import { Water } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/objects/Water.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(30, 30, 100);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0x111122, 0.5); // Deep blue night tint
    scene.add(ambientLight);

    // --- Water ---
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    const water = new Water(waterGeometry, {
        textureWidth: 512,
        textureHeight: 512,
        waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', function(texture) {
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        }),
        sunDirection: new THREE.Vector3(),
        sunColor: 0xffffff,
        waterColor: 0x001e0f,
        distortionScale: 3.7,
        fog: scene.fog !== undefined
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    // --- The Boat Group ---
    const boat = new THREE.Group();
    
    // Simple Hull
    const hullGeometry = new THREE.BoxGeometry(10, 4, 20);
    const hullMaterial = new THREE.MeshStandardMaterial({ color: 0x221100, roughness: 0.8 });
    const hull = new THREE.Mesh(hullGeometry, hullMaterial);
    boat.add(hull);

    // The Lantern
    const lantern = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8),
        new THREE.MeshBasicMaterial({ color: 0xffaa00 })
    );
    lantern.position.set(0, 5, 5);
    boat.add(lantern);

    // Lantern Glow
    const light = new THREE.PointLight(0xffaa00, 2, 50);
    light.position.set(0, 5, 5);
    boat.add(light);

    scene.add(boat);

    // --- Rain ---
    const rainCount = 10000;
    const rainGeometry = new THREE.BufferGeometry();
    const rainPositions = new Float32Array(rainCount * 3);
    for (let i = 0; i < rainCount * 3; i += 3) {
        rainPositions[i] = (Math.random() - 0.5) * 400;
        rainPositions[i + 1] = Math.random() * 200;
        rainPositions[i + 2] = (Math.random() - 0.5) * 400;
    }
    rainGeometry.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
    const rainMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.1, transparent: true });
    const rain = new THREE.Points(rainGeometry, rainMaterial);
    scene.add(rain);

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // Animate water
        water.material.uniforms['time'].value += 1.0 / 60.0;

        // Animate boat (rocking motion)
        boat.position.y = Math.sin(elapsed * 1.5) * 0.5;
        boat.rotation.x = Math.sin(elapsed * 1.2) * 0.05;
        boat.rotation.z = Math.cos(elapsed * 0.8) * 0.05;

        // Animate rain
        const positions = rain.geometry.attributes.position.array;
        for (let i = 1; i < positions.length; i += 3) {
            positions[i] -= 2; // Falling speed
            if (positions[i] < 0) positions[i] = 200;
        }
        rain.geometry.attributes.position.needsUpdate = true;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
