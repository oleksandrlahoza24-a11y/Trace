<style>
    /* This stops the iPad from trying to "save" or "zoom" the joystick */
    body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        touch-action: none; /* Prevents all browser gestures */
        -webkit-user-select: none; /* Prevents text selection popups */
        user-select: none;
    }

    #joystick-zone { 
        position: absolute; 
        bottom: 60px; 
        left: 60px; 
        width: 120px; 
        height: 120px; 
        z-index: 999;
        touch-action: none; /* Specifically lock the joystick area */
    }
</style>
