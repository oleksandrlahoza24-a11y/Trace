<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultra Real Water - iPad Edition</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { 
    width:100%; height:100%; overflow:hidden; 
    background:#000; position: fixed;
  }
  canvas { 
    display:block; width:100vw; height:100vh; 
    touch-action:none; -webkit-user-select:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false, depth: false });

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, CW, CH;

function resize() {
  CW = window.innerWidth; CH = window.innerHeight;
  W = Math.round(CW * DPR); H = Math.round(CH * DPR);
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// iPad specific float texture support
const extHalf = gl.getExtension('OES_texture_half_float');
const extHalfLin = gl.getExtension('OES_texture_half_float_linear');
const FTYPE = (extHalf) ? extHalf.HALF_FLOAT_OES : gl.UNSIGNED_BYTE;

const S = 512;
const VERT = `attribute vec2 aPos; varying vec2 vUV; void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0.,1.); }`;

const SIM_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec3 uMouse; 

void main() {
    vec4 state = texture2D(uState, vUV);
    float curr = state.r * 2.0 - 1.0;
    float prev = state.g * 2.0 - 1.0;

    float n = texture2D(uState, vUV + vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    float s = texture2D(uState, vUV - vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    float e = texture2D(uState, vUV + vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;
    float w = texture2D(uState, vUV - vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;

    float next = (n + s + e + w) * 0.5 - prev;
    next *= 0.992;

    float d = length(vUV - uMouse.xy);
    next -= smoothstep(0.06, 0.0, d) * uMouse.z;

    gl_FragColor = vec4(clamp(next * 0.5 + 0.5, 0.0, 1.0), state.r, 0.0, 1.0);
}`;

const REN_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uWater;
uniform vec2 uTexel;
uniform float uAspect;

float hash(vec2 p) { return fract(sin(dot(p, vec2(12.7, 31.1))) * 43758.5); }
float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}

void main() {
    float h = texture2D(uWater, vUV).r * 2.0 - 1.0;
    float hR = texture2D(uWater, vUV + vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;
    float hU = texture2D(uWater, vUV + vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    
    vec3 normal = normalize(vec3(h - hR, h - hU, 0.1));
    vec2 refrUV = vUV + normal.xy * 0.04;
    
    // Seabed Texture
    float n = noise(refrUV * 10.0 * vec2(uAspect, 1.0));
    vec3 seabed = mix(vec3(0.3, 0.25, 0.1), vec3(0.5, 0.45, 0.3), n);
    
    // Lighting
    float fresnel = pow(1.0 - normal.z, 3.0);
    vec3 skyCol = mix(vec3(0.02, 0.1, 0.2), vec3(0.5, 0.8, 1.0), fresnel);
    
    vec3 col = mix(seabed * vec3(0.4, 0.8, 0.9), skyCol, fresnel + 0.2);
    
    // Caustics shimmer
    float caust = pow(max(0.0, 1.0 - abs(h)*8.0), 3.0);
    col += caust * 0.2;

    gl_FragColor = vec4(col, 1.0);
}`;

function mkProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.attachShader(p, s1); gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const simProg = mkProg(VERT, SIM_FRAG);
const renProg = mkProg(VERT, REN_FRAG);

const uSim = { state: gl.getUniformLocation(simProg, 'uState'), texel: gl.getUniformLocation(simProg, 'uTexel'), mouse: gl.getUniformLocation(simProg, 'uMouse') };
const uRen = { water: gl.getUniformLocation(renProg, 'uWater'), texel: gl.getUniformLocation(renProg, 'uTexel'), aspect: gl.getUniformLocation(renProg, 'uAspect') };

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function mkFBO() {
    const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
    return { t, f };
}

let fbo1 = mkFBO(), fbo2 = mkFBO();
const ptr = { x: 0.5, y: 0.5, active: 0 };

const handleTouch = (e) => {
    e.preventDefault();
    const t = e.touches[0];
    ptr.x = t.clientX / CW;
    ptr.y = 1.0 - t.clientY / CH;
    ptr.active = 1;
};

canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', () => { ptr.active = 0; }, { passive: false });

// Mouse support just in case
canvas.addEventListener('mousedown', (e) => { ptr.active = 1; ptr.x = e.clientX/CW; ptr.y = 1.0-e.clientY/CH; });
canvas.addEventListener('mousemove', (e) => { if(ptr.active) { ptr.x = e.clientX/CW; ptr.y = 1.0-e.clientY/CH; }});
window.addEventListener('mouseup', () => ptr.active = 0);

function frame() {
    gl.useProgram(simProg);
    gl.viewport(0, 0, S, S);
    const loc = gl.getAttribLocation(simProg, 'aPos');
    gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo2.f);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform1i(uSim.state, 0);
    gl.uniform2f(uSim.texel, 1/S, 1/S);
    gl.uniform3f(uSim.mouse, ptr.x, ptr.y, ptr.active ? 0.3 : 0.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    
    let tmp = fbo1; fbo1 = fbo2; fbo2 = tmp;

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, W, H);
    gl.useProgram(renProg);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform1i(uRen.water, 0);
    gl.uniform2f(uRen.texel, 1/S, 1/S);
    gl.uniform1f(uRen.aspect, CW/CH);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
