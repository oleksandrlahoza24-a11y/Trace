<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Realistic Dunes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#090502; touch-action:none;
    -webkit-user-select:none; user-select:none; }
  canvas { display:block; position:fixed; top:0; left:0; touch-action:none; cursor:crosshair; }
  #ui {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    color:rgba(220,170,80,0.52); font-family:'Share Tech Mono',monospace; font-size:11px;
    letter-spacing:5px; text-transform:uppercase; pointer-events:none;
    transition:opacity 2.5s; white-space:nowrap;
    text-shadow:0 0 18px rgba(200,130,30,0.55);
  }
  #ui.fade { opacity:0; }
  #badge {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    color:rgba(220,170,80,0.28); font-family:'Share Tech Mono',monospace;
    font-size:10px; letter-spacing:7px; pointer-events:none; white-space:nowrap;
    text-shadow:0 0 12px rgba(200,130,30,0.35);
  }
  .corner { position:fixed; width:40px; height:40px; pointer-events:none; }
  #c1{top:0;   left:0;  border-top:1px solid rgba(200,155,60,0.26);border-left:1px solid rgba(200,155,60,0.26);}
  #c2{top:0;   right:0; border-top:1px solid rgba(200,155,60,0.26);border-right:1px solid rgba(200,155,60,0.26);}
  #c3{bottom:0;left:0;  border-bottom:1px solid rgba(200,155,60,0.26);border-left:1px solid rgba(200,155,60,0.26);}
  #c4{bottom:0;right:0; border-bottom:1px solid rgba(200,155,60,0.26);border-right:1px solid rgba(200,155,60,0.26);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="corner" id="c1"></div><div class="corner" id="c2"></div>
<div class="corner" id="c3"></div><div class="corner" id="c4"></div>
<div id="badge">SiO₂ · REALISTIC GRANULAR</div>
<div id="ui">sculpt the dunes</div>
<script>
'use strict';

const canvas = document.getElementById('c');
const ui     = document.getElementById('ui');
const DPR    = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0, CW = 0, CH = 0;
function resize(){
  CW = window.innerWidth; CH = window.innerHeight;
  W  = Math.round(CW * DPR); H = Math.round(CH * DPR);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
}
resize(); window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl', {antialias:false, alpha:false, powerPreference:'high-performance'})
        || canvas.getContext('experimental-webgl', {antialias:false, alpha:false});
if(!gl){ document.body.innerHTML = '<p style="color:#ca8;font-family:monospace;padding:40px">WebGL unavailable</p>'; throw 0; }

const extFloat = gl.getExtension('OES_texture_float');
const extHalfF = gl.getExtension('OES_texture_half_float');
const extFL    = gl.getExtension('OES_texture_float_linear');
const extHL    = gl.getExtension('OES_texture_half_float_linear');
gl.getExtension('WEBGL_color_buffer_float');
gl.getExtension('EXT_color_buffer_half_float');

function canRT(type){
  const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 4, 4, 0, gl.RGBA, type, null);
  const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.deleteFramebuffer(f); gl.deleteTexture(t); gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return ok;
}
let FTYPE, ULIN, UINT8;
if(extFloat && canRT(gl.FLOAT))                       { FTYPE=gl.FLOAT;                ULIN=!!extFL; UINT8=false; }
else if(extHalfF && canRT(extHalfF.HALF_FLOAT_OES))   { FTYPE=extHalfF.HALF_FLOAT_OES; ULIN=!!extHL; UINT8=false; }
else                                                  { FTYPE=gl.UNSIGNED_BYTE;        ULIN=true;    UINT8=true;  }

const S = 512; // Resolution

const VERT = `attribute vec2 aPos; varying vec2 vUV;
void main(){ vUV = aPos*.5+.5; gl_Position = vec4(aPos,0.,1.); }`;

const INIT_SRC = (UINT8 ? '#define U8\n' : '') + `
precision highp float;
varying vec2 vUV;

float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float vn(vec2 p){
  vec2 i=floor(p),f=p-i; f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){ float v=0.,a=.5; for(int i=0;i<4;i++){v+=vn(p)*a;p*=2.1;a*=.5;} return v; }

void main(){
  vec2 uv = vUV;
  float h = 0.34;
  h += 0.27 * exp(-(pow((uv.x-0.27)*3.1,2.)+pow((uv.y-0.43)*1.9,2.)));
  h += 0.24 * exp(-(pow((uv.x-0.71)*3.6,2.)+pow((uv.y-0.27)*2.2,2.)));
  h += 0.21 * exp(-(pow((uv.x-0.53)*2.9,2.)+pow((uv.y-0.75)*1.8,2.)));
  h += 0.17 * exp(-(pow((uv.x-0.13)*4.2,2.)+pow((uv.y-0.66)*2.4,2.)));
  h += 0.15 * exp(-(pow((uv.x-0.84)*3.5,2.)+pow((uv.y-0.56)*2.1,2.)));
  h += 0.12 * exp(-(pow((uv.x-0.42)*5.0,2.)+pow((uv.y-0.12)*3.0,2.)));
  h -= 0.07 * exp(-(pow((uv.x-0.50)*3.8,2.)+pow((uv.y-0.50)*3.8,2.)));
  h -= 0.05 * exp(-(pow((uv.x-0.88)*5.0,2.)+pow((uv.y-0.15)*5.0,2.)));
  h += 0.020 * sin(uv.x*21.+uv.y*4.2+1.1);
  h += 0.015 * sin(uv.y*16.-uv.x*2.8+0.7);
  h += 0.012 * fbm(uv*15.+2.1);
  h = clamp(h, 0.02, 0.97);
  #ifdef U8
    float t2 = h*255.; gl_FragColor = vec4(floor(t2)/255., fract(t2), 0., 1.);
  #else
    gl_FragColor = vec4(h, 0., 0., 1.);
  #endif
}`;

const SIM_SRC = (UINT8 ? '#define U8\n' : '') + `
precision highp float;
varying vec2 vUV;
uniform sampler2D uS;
uniform vec2  uTx;
uniform vec2  uM;
uniform vec2  uMv;
uniform float uR;
uniform float uStr;
uniform float uWind;

#ifdef U8
  float dec(vec2 v){ return v.x + v.y/255.; }
  float H(vec2 u){ return dec(texture2D(uS,u).rg); }
  vec2 enc(float v){ float t=clamp(v,0.,.99999)*255.; return vec2(floor(t)/255.,fract(t)); }
#else
  float H(vec2 u){ return texture2D(uS,u).r; }
#endif

// Random noise to vary the angle of repose slightly (simulates varying compaction)
float hash(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }

void main(){
  float h  = H(vUV);
  float tx = uTx.x, ty = uTx.y;

  float hN  = H(vUV+vec2( 0., ty));
  float hS  = H(vUV+vec2( 0.,-ty));
  float hE  = H(vUV+vec2( tx, 0.));
  float hW  = H(vUV+vec2(-tx, 0.));
  float hNE = H(vUV+vec2( tx, ty));
  float hNW = H(vUV+vec2(-tx, ty));
  float hSE = H(vUV+vec2( tx,-ty));
  float hSW = H(vUV+vec2(-tx,-ty));

  // Tighter AOR and slightly lower flow rate for more dry, granular behavior
  float localAorMod = (hash(vUV * 100.0) * 0.004) - 0.002;
  float AOR  = 0.026 + localAorMod;  
  float AOR2 = 0.036 + localAorMod;  
  const float FR   = 0.11; 

  float flow = 0.;
  float dN=hN-h; flow+=sign(dN)*max(0.,abs(dN)-AOR )*FR;
  float dS=hS-h; flow+=sign(dS)*max(0.,abs(dS)-AOR )*FR;
  float dE=hE-h; flow+=sign(dE)*max(0.,abs(dE)-AOR )*FR;
  float dW=hW-h; flow+=sign(dW)*max(0.,abs(dW)-AOR )*FR;

  float dNE=hNE-h; flow+=sign(dNE)*max(0.,abs(dNE)-AOR2)*FR*0.5;
  float dNW=hNW-h; flow+=sign(dNW)*max(0.,abs(dNW)-AOR2)*FR*0.5;
  float dSE=hSE-h; flow+=sign(dSE)*max(0.,abs(dSE)-AOR2)*FR*0.5;
  float dSW=hSW-h; flow+=sign(dSW)*max(0.,abs(dSW)-AOR2)*FR*0.5;

  float newH = h + flow;

  float wSrc = H(vUV - vec2(tx*1.8, ty*0.15)); 
  float wDst = H(vUV + vec2(tx*1.8, ty*0.15)); 
  float wDiff = wSrc - wDst;
  newH += max(0., wDiff - AOR*0.5) * 0.05 * uWind;

  float dist  = length(vUV - uM);
  float touch = smoothstep(uR, 0., dist);
  newH -= touch * uStr;

  float mvSpd = length(uMv);
  float hasMv = step(0.0012, mvSpd);
  vec2 mvDir  = uMv / max(mvSpd, 0.0001);
  vec2 toP    = vUV - uM;
  float along = dot(toP, mvDir);
  float aside = length(toP - along*mvDir);
  float pushZ = smoothstep(uR*2.5, 0., aside) * smoothstep(uR*0.3, uR*2.0, along);
  newH += pushZ * uStr * min(mvSpd*25., 1.) * 0.45 * hasMv;

  newH = clamp(newH, 0., 1.);

  #ifdef U8
    gl_FragColor = vec4(enc(newH), 0., 1.);
  #else
    gl_FragColor = vec4(newH, 0., 0., 1.);
  #endif
}`;

const RENDER_SRC = (UINT8 ? '#define U8\n' : '') + `
precision highp float;
varying vec2 vUV;
uniform sampler2D uW;
uniform vec2  uTx;
uniform float uTime, uAspect;

// --- HIGH-PERFORMANCE HASHING ---
float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

// --- MICRO-DETAIL NOISE ---
float grain(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

#ifdef U8
  float H(vec2 uv){ vec4 s=texture2D(uW,uv); return s.r+s.g/255.; }
#else
  float H(vec2 uv){ return texture2D(uW,uv).r; }
#endif

// --- PHYSICALLY BASED RENDERING (PBR) ---
float D_GGX(float NoH, float roughness) {
    float a = roughness * roughness;
    float a2 = a * a;
    float d = (NoH * a2 - NoH) * NoH + 1.0;
    return a2 / (3.14159 * d * d + 1e-7);
}

void main() {
    vec2 uv = vUV;
    float t = uTime;
    
    // 1. ITERATIVE PARALLAX OCCLUSION (3-Step Search)
    // Simulates true 3D depth by shifting textures based on view angle
    vec3 V = normalize(vec3((uv - 0.5) * 2.0, 1.0));
    float h = H(uv);
    for(int i=0; i<3; i++) {
        uv -= V.xy * (1.0 - h) * 0.015;
        h = H(uv);
    }
    
    // 2. HIGH-DEFINITION NORMAL RECONSTRUCTION
    vec2 tx = uTx * 1.2;
    float hL = H(uv - vec2(tx.x, 0.0)), hR = H(uv + vec2(tx.x, 0.0));
    float hD = H(uv - vec2(0.0, tx.y)), hU = H(uv + vec2(0.0, tx.y));
    
    // Inject microscopic "grain" into the normals
    float gN = (grain(uv * 1200.0) - 0.5) * 0.15;
    vec3 N = normalize(vec3(hL - hR + gN, hD - hU + gN, 0.1));

    // 3. COLOR & WETNESS GRADIENTS
    vec3 L = normalize(vec3(0.5, 0.5, 0.8)); // Light dir
    vec3 Hv = normalize(V + L);
    float NoL = max(dot(N, L), 0.0);
    float NoV = max(dot(N, V), 0.0);
    float NoH = max(dot(N, Hv), 0.0);
    
    // Deep parts look wetter and richer
    float wet = smoothstep(0.7, 0.2, h);
    vec3 drySand = vec3(0.88, 0.76, 0.62);
    vec3 wetSand = vec3(0.45, 0.32, 0.20);
    vec3 albedo = mix(drySand, wetSand, wet);
    albedo *= 0.9 + 0.15 * grain(uv * 400.0); // Macro variation

    // 4. ADVANCED LIGHTING LOBES
    // Self-shadowing approximation
    float shadow = clamp(NoL * 2.5, 0.0, 1.0);
    
    // Specular 1: Broad "Quartz" sheen
    float specBroad = D_GGX(NoH, 0.3) * NoL * 0.15;
    // Specular 2: Sharp Micro-glints
    float glint = pow(NoH, 600.0) * step(0.994, hash(uv * 1800.0 + t * 0.01));
    
    // 5. SUBSURFACE SCATTERING & RIM LIGHT
    float rim = pow(1.0 - NoV, 4.0) * h * 0.4;
    vec3 scattering = vec3(1.0, 0.5, 0.2) * pow(max(0.0, dot(V, -L)), 3.0) * h;

    // 6. CAUSTIC FOCUSING
    float lap = (hL + hR + hU + hD) - 4.0 * h;
    float focus = pow(max(0.0, -lap * 18.0), 1.6) * shadow;

    // Final Integration
    vec3 ambient = vec3(0.12, 0.15, 0.22) * (h + 0.5);
    vec3 final = albedo * (NoL * shadow * vec3(1.0, 0.95, 0.8) + ambient);
    final += (specBroad + glint * 12.0) * shadow;
    final += scattering * 0.3 + vec3(0.6, 0.9, 1.0) * focus * 0.4;
    final += vec3(0.9, 0.8, 0.7) * rim * NoL;

    // 7. CINEMATIC POST
    // Tone mapping (Reinhard modified)
    final = final / (final + 1.0);
    // Color balance: Warm highlights, cool shadows
    final = mix(final, final * vec3(1.05, 1.0, 0.9), NoL);
    
    gl_FragColor = vec4(pow(final, vec3(1.0/2.2)), 1.0);
}`;

function mkSh(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(fsrc){
  const p = gl.createProgram();
  gl.attachShader(p, mkSh(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, mkSh(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  const u = {}, n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){ const x=gl.getActiveUniform(p,i); u[x.name]=gl.getUniformLocation(p,x.name); }
  return {p, u};
}

let initP, simP, renP;
try {
  initP = mkProg(INIT_SRC);
  simP  = mkProg(SIM_SRC);
  renP  = mkProg(RENDER_SRC);
} catch(e) {
  document.body.innerHTML = `<pre style="color:#ca8;padding:20px;font-size:11px;white-space:pre-wrap">${e.message}</pre>`;
  throw e;
}

const qb = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
function bindQ(prog){
  gl.bindBuffer(gl.ARRAY_BUFFER, qb);
  const loc = gl.getAttribLocation(prog.p, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

function mkFBO(){
  const n   = S * S * 4;
  const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
  const emptyData = UINT8 ? new Uint8Array(n)
                  : (FTYPE === gl.FLOAT ? new Float32Array(n) : new Uint16Array(n));
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, emptyData);
  const filt = ULIN ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {tex, fbo};
}
let fboA = mkFBO(), fboB = mkFBO();

(function initDunes(){
  gl.bindFramebuffer(gl.FRAMEBUFFER, fboA.fbo);
  gl.viewport(0, 0, S, S);
  gl.useProgram(initP.p);
  bindQ(initP);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
})();

const ptr = {x:.5, y:.5, px:.5, py:.5, vx:0, vy:0, active:false};
let gone = false;
function toUV(cx,cy){ return {x:cx/CW, y:1.-cy/CH}; }
function dismiss(){ if(gone)return; gone=true; ui.classList.add('fade'); setTimeout(()=>ui.style.display='none',3000); }
function onDown(e){
  const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY);
  ptr.px=uv.x; ptr.py=uv.y; ptr.x=uv.x; ptr.y=uv.y;
  ptr.vx=0; ptr.vy=0; ptr.active=true; dismiss();
}
function onMove(e){
  if(!ptr.active) return;
  const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY);
  ptr.px=ptr.x; ptr.py=ptr.y;
  ptr.vx=uv.x-ptr.x; ptr.vy=uv.y-ptr.y;
  ptr.x=uv.x; ptr.y=uv.y;
}
function onUp(){ ptr.active=false; ptr.vx=0; ptr.vy=0; }
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();onUp();  },{passive:false});

function simulate(src, dst, applyMouse){
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.viewport(0, 0, S, S);
  gl.useProgram(simP.p);
  bindQ(simP);
  const u = simP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(u.uS,   0);
  gl.uniform2f(u.uTx,  1./S, 1./S);
  gl.uniform2f(u.uM,   ptr.x, ptr.y);
  gl.uniform2f(u.uMv,  ptr.vx, ptr.vy);
  gl.uniform1f(u.uR,   0.046);
  const spd = Math.hypot(ptr.vx, ptr.vy);
  const str = (applyMouse && ptr.active) ? Math.min(0.09 + spd*17., 0.55) : 0.;
  gl.uniform1f(u.uStr,  str);
  gl.uniform1f(u.uWind, Math.max(0., Math.sin(time * 0.16)*0.65 + 0.12));
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

let time = 0;
function render(src){
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(renP.p);
  bindQ(renP);
  const u = renP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(u.uW,      0);
  gl.uniform2f(u.uTx,     1./S, 1./S);
  gl.uniform1f(u.uTime,   time);
  gl.uniform1f(u.uAspect, W/H);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function frame(now){
  requestAnimationFrame(frame);
  time = now * 0.001;
  for(let i = 0; i < 5; i++){
    simulate(fboA, fboB, i === 0);
    const tmp = fboA; fboA = fboB; fboB = tmp;
  }
  render(fboA);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
