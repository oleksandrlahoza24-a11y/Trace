<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PixelQuest 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Courier New', monospace; }

    /* Pixel canvas - rendered at low res, upscaled via CSS */
    #gameCanvas {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* HUD overlay */
    #hud {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* Level title banner */
    #levelBanner {
      position: absolute; top: 40px; left: 50%;
      transform: translateX(-50%);
      color: #FFD700; font-size: 22px; font-weight: bold;
      text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
      letter-spacing: 4px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.5s;
      pointer-events: none;
    }

    /* Health bar */
    #healthBar {
      position: absolute; top: 16px; left: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    #healthLabel { color: #ff4444; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
    #healthTrack {
      width: 140px; height: 16px;
      background: #222; border: 2px solid #555;
      image-rendering: pixelated;
    }
    #healthFill { height: 100%; width: 100%; background: #e03030; transition: width 0.3s; }

    /* Torch counter (level 1 specific) */
    #torchCount {
      position: absolute; top: 16px; right: 20px;
      color: #FFD700; font-size: 16px; font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      display: none;
    }

    /* Message box */
    #msgBox {
      position: absolute; bottom: 180px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.82); border: 2px solid #FFD700;
      color: #fff; padding: 10px 22px; font-size: 15px;
      text-align: center; max-width: 320px;
      display: none; pointer-events: none;
      text-shadow: 1px 1px 0 #000;
    }

    /* ── CONTROLS ── */
    #controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 160px; pointer-events: none; }

    /* Joystick */
    #joystickZone {
      position: absolute; bottom: 24px; left: 32px;
      width: 110px; height: 110px;
      pointer-events: all; touch-action: none;
    }
    #joystickBase {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 3px solid rgba(255,255,255,0.25);
      position: absolute;
    }
    #joystickKnob {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      border: 3px solid rgba(255,255,255,0.9);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: none;
    }

    /* Buttons right side */
    #btnZone {
      position: absolute; bottom: 24px; right: 28px;
      display: flex; flex-direction: column; gap: 14px;
      align-items: flex-end;
      pointer-events: all;
    }
    .gameBtn {
      width: 68px; height: 68px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.6);
      font-size: 13px; font-weight: bold; color: #fff;
      font-family: 'Courier New', monospace;
      cursor: pointer; touch-action: none;
      user-select: none; -webkit-user-select: none;
      text-shadow: 1px 1px 0 #000;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.08s, opacity 0.08s;
      letter-spacing: 1px;
    }
    .gameBtn:active, .gameBtn.pressed { transform: scale(0.88); opacity: 0.75; }
    #btnAttack { background: rgba(200, 40, 40, 0.7); }
    #btnUse    { background: rgba(40, 120, 200, 0.7); }

    /* Screen flash */
    #flash {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
    }

    /* Loading screen */
    #loadScreen {
      position: absolute; inset: 0;
      background: #0a0a0a; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }
    #loadTitle { color: #FFD700; font-size: 36px; font-weight: bold; letter-spacing: 6px; margin-bottom: 18px; text-shadow: 4px 4px 0 #000; }
    #loadSub   { color: #aaa; font-size: 14px; letter-spacing: 3px; }
    #loadDot   { color: #FFD700; animation: blink 0.9s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="levelBanner">LEVEL 1 — THE DUNGEON</div>
  <div id="healthBar">
    <span id="healthLabel">HP</span>
    <div id="healthTrack"><div id="healthFill"></div></div>
  </div>
  <div id="torchCount">🔥 Torches: <span id="torchNum">3</span></div>
  <div id="msgBox"></div>
  <div id="flash"></div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="joystickZone">
    <div id="joystickBase"></div>
    <div id="joystickKnob"></div>
  </div>
  <div id="btnZone">
    <button class="gameBtn" id="btnAttack">ATK</button>
    <button class="gameBtn" id="btnUse">USE</button>
  </div>
</div>

<!-- Loading -->
<div id="loadScreen">
  <div id="loadTitle">PIXELQUEST</div>
  <div id="loadSub">LOADING<span id="loadDot">...</span></div>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Engine -->
<script src="engine.js"></script>
<!-- Levels -->
<script src="Level/level1.js"></script>
<script src="Level/level2.js"></script>

<script>
  // Boot once DOM + scripts ready
  window.addEventListener('load', () => {
    PixelEngine.init();
    setTimeout(() => {
      document.getElementById('loadScreen').style.display = 'none';
      PixelEngine.loadLevel(1);
    }, 1200);
  });
</script>
</body>
</html>
