<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Stand - Cinematic</title>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); transition: opacity 1s; z-index: 10;
        }
        button {
            padding: 20px 40px; font-size: 24px; background: transparent;
            color: #ff4444; border: 2px solid #ff4444; cursor: pointer;
            text-transform: uppercase; letter-spacing: 5px; transition: 0.3s;
        }
        button:hover { background: #ff4444; color: black; box-shadow: 0 0 20px #ff4444; }
        #subtitles {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            font-size: 18px; color: rgba(255,255,255,0.7); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="startMovie()">Play Movie</button>
    </div>
    <div id="subtitles"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const subtitleEl = document.getElementById('subtitles');
        let width, height, startTime;
        let isPlaying = false;
        let frame = 0;

        // Cinematic State
        let camera = { x: 0, y: 0, zoom: 1, shake: 0 };
        let particles = [];
        let actors = {
            hero: { x: -100, y: 0, health: 100, pose: 'idle', direction: 1 },
            enemies: []
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startMovie() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                isPlaying = true;
                startTime = Date.now();
                requestAnimationFrame(update);
            }, 1000);
        }

        function createBlood(x, y, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * 10, 
                    vy: (Math.random() - 0.5) * 10,
                    life: 1, color: '#ff0000'
                });
            }
        }

        function drawStickman(x, y, scale, color, pose, dir) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3 * scale;
            ctx.lineCap = 'round';

            // Head
            ctx.beginPath();
            ctx.arc(x, y - 50*scale, 10*scale, 0, Math.PI*2);
            ctx.stroke();

            // Body
            ctx.beginPath();
            ctx.moveTo(x, y - 40*scale);
            ctx.lineTo(x, y - 10*scale);
            
            // Legs (dynamic based on pose)
            let legOffset = Math.sin(frame * 0.1) * 10;
            if(pose === 'dead') {
                ctx.moveTo(x, y-10*scale); ctx.lineTo(x + 20*scale, y);
                ctx.moveTo(x, y-10*scale); ctx.lineTo(x + 25*scale, y - 5*scale);
            } else {
                ctx.moveTo(x, y - 10*scale); ctx.lineTo(x - 15*scale, y + 10*scale);
                ctx.moveTo(x, y - 10*scale); ctx.lineTo(x + 15*scale, y + 10*scale);
            }

            // Arms / Gun
            ctx.moveTo(x, y - 30*scale);
            if(pose === 'aim') {
                ctx.lineTo(x + 30*scale * dir, y - 30*scale); // Arm pointing
                // Gun
                ctx.fillStyle = '#444';
                ctx.fillRect(x + 25*scale * dir, y - 35*scale, 15*scale * dir, 8*scale);
            } else {
                ctx.lineTo(x - 15*scale, y - 15*scale);
                ctx.lineTo(x + 15*scale, y - 15*scale);
            }
            ctx.stroke();
        }

        function update() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, width, height);
            frame++;

            let elapsed = (Date.now() - startTime) / 1000;

            // --- THE DIRECTOR (Scripted Events) ---
            ctx.save();
            // Apply Camera
            if(camera.shake > 0) {
                ctx.translate(Math.random()*camera.shake, Math.random()*camera.shake);
                camera.shake *= 0.9;
            }
            ctx.translate(width/2 + camera.x, height/2 + camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            // Ground
            ctx.strokeStyle = '#222';
            ctx.beginPath();
            ctx.moveTo(-2000, 10); ctx.lineTo(2000, 10);
            ctx.stroke();

            // Sequence 1: The Entrance (0-5s)
            if(elapsed < 5) {
                actors.hero.x += 1;
                subtitleEl.innerText = "I didn't want this...";
            } 
            // Sequence 2: The Ambush (5-10s)
            else if (elapsed < 10) {
                if(actors.enemies.length === 0) {
                    actors.enemies.push({x: 300, y: 0, status: 'alive'});
                    camera.shake = 10;
                }
                subtitleEl.innerText = "They gave me no choice.";
                actors.hero.pose = 'aim';
            }
            // Sequence 3: The Gunfight (10s+)
            else {
                if(frame % 60 === 0 && elapsed < 15) {
                    camera.shake = 15;
                    createBlood(300, -30, 20);
                    actors.enemies[0].status = 'dead';
                    subtitleEl.innerText = "BANG.";
                }
                if(elapsed > 16) {
                    subtitleEl.innerText = "It's a long way down for us stickmen.";
                    camera.zoom += 0.001; // Dramatic slow zoom
                }
            }

            // Draw Actors
            drawStickman(actors.hero.x, actors.hero.y, 1.5, '#fff', actors.hero.pose, 1);
            actors.enemies.forEach(en => {
                drawStickman(en.x, en.y, 1.5, '#ff4444', en.status === 'dead' ? 'dead' : 'aim', -1);
            });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.2; // Gravity
                p.life -= 0.01;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 3, 3);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            ctx.restore();

            // Cinematic Bars
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, 100);
            ctx.fillRect(0, height - 100, width, 100);

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
