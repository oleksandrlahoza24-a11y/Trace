<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tree Zen - Watch it Grow</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        canvas { display: block; }
        .instructions { font-size: 1.2rem; font-weight: bold; opacity: 0.8; }
    </style>
</head>
<body>

<div id="ui">
    <div class="instructions">Watching the Spirit Tree flourish...</div>
    <p>Refresh to plant a new one</p>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa3d5ff); // Soft Anime Sky
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING ---
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 10, 7);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // --- ANIME SHADER (TOON) ---
    const trunkMaterial = new THREE.MeshToonMaterial({ color: 0x5D4037 });
    const leafMaterial = new THREE.MeshToonMaterial({ color: 0x7cfc00 });

    // --- TREE GROWTH LOGIC ---
    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    function createBranch(parent, position, direction, length, thickness, depth) {
        if (depth > 6) return;

        // Create the Mesh
        const geometry = new THREE.CylinderGeometry(thickness * 0.7, thickness, length, 8);
        geometry.translate(0, length / 2, 0); // Move pivot to base
        const branch = new THREE.Mesh(geometry, trunkMaterial);
        
        // Position and orient
        branch.position.copy(position);
        branch.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
        
        // Growth Animation Data
        branch.scale.set(0, 0, 0);
        parent.add(branch);

        const endPoint = position.clone().add(direction.clone().multiplyScalar(length));

        // Create children branches
        const numBranches = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < numBranches; i++) {
            const newDir = direction.clone()
                .applyAxisAngle(new THREE.Vector3(1, 0, 0), (Math.random() - 0.5) * 1.5)
                .applyAxisAngle(new THREE.Vector3(0, 0, 1), (Math.random() - 0.5) * 1.5);
            
            setTimeout(() => {
                createBranch(branch, new THREE.Vector3(0, length, 0), newDir, length * 0.75, thickness * 0.7, depth + 1);
            }, 600 + (depth * 200));
        }

        // Add leaves at the tips
        if (depth > 4) {
            const leafGeo = new THREE.IcosahedronGeometry(0.5, 1);
            const leaf = new THREE.Mesh(leafGeo, leafMaterial);
            leaf.position.set(0, length, 0);
            leaf.scale.set(0, 0, 0);
            branch.add(leaf);
        }

        // Animation Loop for this specific branch
        function grow() {
            if (branch.scale.y < 1) {
                branch.scale.y += 0.005;
                branch.scale.x += 0.005;
                branch.scale.z += 0.005;
                requestAnimationFrame(grow);
            }
        }
        grow();
    }

    // Start the growth
    createBranch(treeGroup, new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), 4, 0.4, 0);

    // --- GROUND ---
    const groundGeo = new THREE.CircleGeometry(20, 32);
    const groundMat = new THREE.MeshToonMaterial({ color: 0x91bd59 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // --- ANIMATION ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Gentle sway (Wind effect)
        treeGroup.rotation.y += 0.002;
        treeGroup.children.forEach(child => {
            child.rotation.z = Math.sin(Date.now() * 0.001) * 0.02;
        });

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
