<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Low-Poly Pro Physics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffbe0b; touch-action: none; }
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(0,0,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        #joystick-knob { width: 50px; height: 50px; background: #fb5607; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="ui"><strong>Low-Poly Physics Rig</strong><br>Physics-based Wheels & Suspension</div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        // --- PHYSICS WORLD SETUP ---
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.defaultContactMaterial.friction = 0.4;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffe066);
        scene.fog = new THREE.Fog(0xffe066, 20, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
        scene.add(sun);

        // --- TERRAIN ---
        const groundSize = 100;
        const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, 40, 40);
        groundGeo.rotateX(-Math.PI / 2);
        
        const vertices = groundGeo.attributes.position.array;
        const matrix = [];
        for (let i = 0; i <= 40; i++) {
            matrix[i] = [];
            for (let j = 0; j <= 40; j++) {
                const index = (i * 41 + j) * 3;
                const height = Math.sin(i * 0.3) * Math.cos(j * 0.3) * 1.5;
                vertices[index + 1] = height;
                matrix[i][j] = height;
            }
        }
        groundGeo.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x8338ec, flatShading: true });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Heightfield(matrix, { elementSize: groundSize / 40 }) });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        groundBody.position.set(-groundSize/2, 0, groundSize/2);
        world.addBody(groundBody);

        // --- VEHICLE PHYSICS ---
        const chassisShape = new CANNON.Box(new CANNON.Vec3(1, 0.4, 2));
        const chassisBody = new CANNON.Body({ mass: 150 });
        chassisBody.addShape(chassisShape);
        chassisBody.position.set(0, 5, 0);
        
        const vehicle = new CANNON.RaycastVehicle({ chassisBody });

        // Wheel Settings
        const wheelOptions = {
            radius: 0.5,
            directionLocal: new CANNON.Vec3(0, -1, 0),
            suspensionStiffness: 30,
            suspensionRestLength: 0.3,
            frictionSlip: 1.4,
            dampingRelaxation: 2.3,
            dampingCompression: 4.4,
            axleLocal: new CANNON.Vec3(-1, 0, 0),
            chassisConnectionPointLocal: new CANNON.Vec3()
        };

        // Front Left
        wheelOptions.chassisConnectionPointLocal.set(-1, 0, 1.5);
        vehicle.addWheel(wheelOptions);
        // Front Right
        wheelOptions.chassisConnectionPointLocal.set(1, 0, 1.5);
        vehicle.addWheel(wheelOptions);
        // Rear Left
        wheelOptions.chassisConnectionPointLocal.set(-1, 0, -1.5);
        vehicle.addWheel(wheelOptions);
        // Rear Right
        wheelOptions.chassisConnectionPointLocal.set(1, 0, -1.5);
        vehicle.addWheel(wheelOptions);

        vehicle.addToWorld(world);

        // --- VISUAL CAR ---
        const carGroup = new THREE.Group();
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({color: 0x3a86ff, flatShading: true}));
        bodyMesh.castShadow = true;
        carGroup.add(bodyMesh);
        scene.add(carGroup);

        const wheelMeshes = [];
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 12);
        wheelGeo.rotateZ(Math.PI / 2);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333 });

        vehicle.wheelInfos.forEach(() => {
            const mesh = new THREE.Mesh(wheelGeo, wheelMat);
            wheelMeshes.push(mesh);
            scene.add(mesh);
        });

        // --- CONTROLS ---
        let inputX = 0, inputY = 0;
        const knob = document.getElementById('joystick-knob');
        const container = document.getElementById('joystick-container');

        const updateInput = (clientX, clientY) => {
            const rect = container.getBoundingClientRect();
            const dx = clientX - (rect.left + 60);
            const dy = clientY - (rect.top + 60);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            inputX = (Math.cos(angle)*dist) / 50;
            inputY = -(Math.sin(angle)*dist) / 50;
        };

        container.addEventListener('touchstart', e => updateInput(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => updateInput(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', () => { inputX = 0; inputY = 0; knob.style.transform = `translate(0,0)`; });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);

            // Apply Engine & Steering
            const engineForce = inputY * 1000;
            const steerVal = -inputX * 0.5;

            vehicle.applyEngineForce(engineForce, 2);
            vehicle.applyEngineForce(engineForce, 3);
            vehicle.setSteeringValue(steerVal, 0);
            vehicle.setSteeringValue(steerVal, 1);

            // Sync Visuals
            carGroup.position.copy(chassisBody.position);
            carGroup.quaternion.copy(chassisBody.quaternion);

            for (let i = 0; i < vehicle.wheelInfos.length; i++) {
                vehicle.updateWheelTransform(i);
                const t = vehicle.wheelInfos[i].worldTransform;
                wheelMeshes[i].position.copy(t.position);
                wheelMeshes[i].quaternion.copy(t.quaternion);
            }

            // Smooth Follow Camera
            const camOffset = new THREE.Vector3(0, 5, -10).applyQuaternion(carGroup.quaternion);
            camera.position.lerp(carGroup.position.clone().add(camOffset), 0.1);
            camera.lookAt(carGroup.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
