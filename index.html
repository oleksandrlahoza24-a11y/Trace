<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Realistic Island - iPad Optimized</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; overflow:hidden; background:#000; position: fixed; touch-action: none; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H;
function resize() {
    W = Math.round(window.innerWidth * DPR);
    H = Math.round(window.innerHeight * DPR);
    canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

const VERT = `attribute vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }`;

const FRAG = `
precision highp float;
uniform float uTime;
uniform vec2 uRes;

// Optimized Noise for iPad
float hash(vec2 p) { return fract(sin(dot(p, vec2(12.7, 31.1))) * 43758.54); }
float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}

// Realistic Water Waves
float getWaves(vec2 p) {
    float v = noise(p + uTime * 0.5) * 0.5;
    v += noise(p * 2.1 - uTime * 0.8) * 0.25;
    return v;
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / min(uRes.x, uRes.y);
    vec3 ro = vec3(0.0, 4.0, 8.0); // Camera position
    vec3 rd = normalize(vec3(uv, -1.5)); // Ray direction

    // 1. Sky Rendering
    vec3 sunDir = normalize(vec3(0.5, 0.4, 1.0));
    vec3 sky = mix(vec3(0.4, 0.6, 0.9), vec3(0.1, 0.2, 0.4), max(0.0, rd.y));
    sky += pow(max(0.0, dot(rd, sunDir)), 120.0) * vec3(1.0, 0.9, 0.7);
    
    // 2. Island Math
    float t = -1.0;
    vec3 col = sky;
    
    // Ray-Plane Intersection for Sea Level
    float planeT = -ro.y / rd.y;
    if(planeT > 0.0) {
        vec3 p = ro + rd * planeT;
        float dist = length(p.xz);
        
        // Island Shape
        float island = smoothstep(5.0, 1.0, dist) * 2.5;
        island += noise(p.xz * 0.5) * 1.5; // Terrain detail

        if(p.y < island) {
            // WE HIT THE ISLAND / BEACH
            float beach = smoothstep(4.0, 3.5, dist);
            vec3 sand = vec3(0.8, 0.7, 0.5);
            vec3 grass = vec3(0.2, 0.5, 0.1);
            vec3 terrainCol = mix(sand, grass, beach);
            
            // Basic Shading
            float diff = max(0.2, dot(vec3(0,1,0), sunDir));
            col = terrainCol * diff;
        } else {
            // WE HIT THE WATER
            vec2 wUV = p.xz;
            float w = getWaves(wUV);
            
            // Water Normals
            vec3 n = normalize(vec3(getWaves(wUV + vec2(0.01,0)) - w, 0.1, getWaves(wUV + vec2(0,0.01)) - w));
            
            // Fresnel & Reflections
            float fresnel = pow(1.0 - max(0.0, dot(n, -rd)), 4.0);
            vec3 ref = mix(vec3(0.4, 0.6, 0.9), vec3(1.0), pow(max(0.0, dot(reflect(rd, n), sunDir)), 50.0));
            
            // Deep water vs Shallow (Beach transparency)
            float depth = smoothstep(4.0, 5.0, dist);
            vec3 waterBase = mix(vec3(0.2, 0.6, 0.7), vec3(0.05, 0.1, 0.3), depth);
            
            col = mix(waterBase, ref, fresnel + 0.1);
            
            // Add Building Silhouettes
            if(dist < 2.0 && noise(p.xz * 2.0) > 0.6) {
                col *= 0.5; // Shadow of buildings
            }
        }
    }

    gl_FragColor = vec4(pow(col, vec3(0.8)), 1.0);
}`;

function createProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.compileShader(s1); gl.compileShader(s2);
    gl.attachShader(p, s1); gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const prog = createProg(VERT, FRAG);
const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function loop(t) {
    gl.useProgram(prog);
    gl.viewport(0, 0, W, H);
    gl.uniform1f(gl.getUniformLocation(prog, "uTime"), t * 0.001);
    gl.uniform2f(gl.getUniformLocation(prog, "uRes"), W, H);
    const l = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l, 2, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
