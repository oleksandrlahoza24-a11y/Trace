<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultra Real Ocean Sim & Boat - iPad</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { 
    width:100%; height:100%; overflow:hidden; 
    background:#00050a; position: fixed; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  canvas { display:block; width:100vw; height:100vh; cursor:crosshair; }
  
  #ui-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  }
  
  #wheel-container {
    position: absolute; bottom: 50px; left: 50px;
    width: 200px; height: 200px;
    pointer-events: auto;
    background: rgba(10, 15, 20, 0.7);
    border: 3px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }

  #wheel {
    width: 170px; height: 170px;
    border: 12px solid #555;
    border-radius: 50%;
    position: relative;
    transition: transform 0.05s linear;
  }
  
  #wheel::before {
    content: ''; position: absolute; top: -15px; left: 50%;
    transform: translateX(-50%); width: 20px; height: 30px;
    background: #c00; border-radius: 5px;
  }

  #btn-spawn {
    position: absolute; top: 50px; right: 50px;
    padding: 18px 36px; background: rgba(0, 120, 220, 0.7);
    color: white; border: 1px solid rgba(255,255,255,0.4);
    border-radius: 35px; pointer-events: auto;
    font-weight: bold; font-size: 16px; backdrop-filter: blur(10px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    -webkit-appearance: none;
  }
  #btn-spawn:active { background: rgba(0, 100, 200, 0.9); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-layer">
  <button id="btn-spawn">SPAWN BOAT</button>
  <div id="wheel-container">
    <div id="wheel"></div>
  </div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false, depth: false });
const wheelEl = document.getElementById('wheel');
const btnSpawn = document.getElementById('btn-spawn');

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, CW, CH;
function resize() {
  CW = window.innerWidth; CH = window.innerHeight;
  W = Math.round(CW * DPR); H = Math.round(CH * DPR);
  canvas.width = W; canvas.height = H;
  canvas.style.width = CW + 'px'; canvas.style.height = CH + 'px';
}
window.addEventListener('resize', resize);
resize();

// ─── BOAT LOGIC ───────────────────────────────────────────
// state.z = velocity force, state.w = height displacement
let boat = { active: false, x: 0.5, y: 0.5, angle: Math.PI/2, speed: 0, targetSpeed: 0, angVel: 0 };
btnSpawn.addEventListener('touchstart', (e) => { 
    e.preventDefault(); boat.active = true; boat.x = 0.5; boat.y = 0.5; boat.speed = 0; boat.angle = Math.PI/2;
});

let isSteering = false;
document.getElementById('wheel-container').addEventListener('touchstart', (e) => {
    e.preventDefault(); isSteering = true; updateWheel(e.touches[0]);
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    if(!isSteering) return;
    e.preventDefault(); updateWheel(e.touches[0]);
}, {passive: false});

window.addEventListener('touchend', () => { isSteering = false; boat.targetSpeed = 0; boat.angVel = 0; });

function updateWheel(touch) {
    const rect = document.getElementById('wheel-container').getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const ang = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
    wheelEl.style.transform = `rotate(${ang + Math.PI/2}rad)`;
    
    // Smooth steering
    const diff = ang - boat.angle;
    boat.angVel = Math.atan2(Math.sin(diff), Math.cos(diff)) * 0.05;
    boat.targetSpeed = 0.003; // Target forward speed when steering
}

// ─── WebGL SETUP ──────────────────────────────────────────
const S = 512;
const extHalf = gl.getExtension('OES_texture_half_float');
const extHalfLin = gl.getExtension('OES_texture_half_float_linear');
const FTYPE = (extHalf && extHalfLin) ? extHalf.HALF_FLOAT_OES : gl.UNSIGNED_BYTE;

const VERT = `attribute vec2 aPos; varying vec2 vUV; void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0.,1.); }`;

// --- SIMULATION SHADER (Kelvin Wake Generation) ---
const SIM_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec4 uForce; // x, y, angle, speed
uniform float uTime;

float snoise(vec3 v) { return abs(fract(sin(v.x * 123.456 + v.y * 345.678) * 45678.9) * 2.0 - 1.0); }

void main() {
    vec4 state = texture2D(uState, vUV);
    // state.r = current height, state.g = prev height
    float h = state.r * 2.0 - 1.0;
    float hp = state.g * 2.0 - 1.0;

    // Standard Wave Equation (α=0.5 stable)
    float n = texture2D(uState, vUV + vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    float s = texture2D(uState, vUV - vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    float e = texture2D(uState, vUV + vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;
    float w = texture2D(uState, vUV - vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;

    float nextH = (n + s + e + w) * 0.5 - hp;
    nextH *= 0.995; // Damping

    // Optimized Wake Logic (Kelvin wake V-pattern approximation)
    float speed = uForce.w;
    if(speed > 0.0001) {
        vec2 bDir = vec2(cos(uForce.z), -sin(uForce.z));
        
        // 1. Bow Wave (Scaled to hull width 0.012)
        vec2 bowPos = uForce.xy + bDir * 0.035;
        float dBow = length(vUV - bowPos);
        nextH += smoothstep(0.024, 0.0, dBow) * speed * 12.0;

        // 2. Kelvin Footprint Displacement (Down under hull)
        vec2 hullRel = vUV - uForce.xy;
        float cosA = cos(-uForce.z); float sinA = sin(-uForce.z);
        vec2 hullRot = vec2(hullRel.x * cosA - hullRel.y * sinA, hullRel.x * sinA + hullRel.y * cosA);
        
        if(abs(hullRot.x) < 0.012 && abs(hullRot.y) < 0.035) {
            nextH -= speed * 1.5; // Scaled displacement
        }
        
        // 3. Turbulent Propwash ( Stern force)
        vec2 sternPos = uForce.xy - bDir * 0.035;
        float dStern = length(vUV - sternPos);
        float propWash = snoise(vec3(vUV * 10.0, uTime * 2.0)) * 0.5 + 0.5;
        nextH -= smoothstep(0.025, 0.0, dStern) * speed * 20.0 * propWash;
    }

    gl_FragColor = vec4(clamp(nextH * 0.5 + 0.5, 0.0, 1.0), state.r, 0.0, 1.0);
}`;

// --- RENDER SHADER (Raymarched 3D Hull + HDR Ocean Visual) ---
const REN_FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uWater;
uniform vec2 uTexel;
uniform float uAspect;
uniform vec4 uBoat; // x, y, angle, speed
uniform float uTime;

// Schlick's fresnel approx
float fresnel(float cosTheta, float f0) {
    return f0 + (1.0 - f0) * pow(1.0 - cosTheta, 5.0);
}

// 3D raymarched hull shape ( SDF approach within texture space )
float sdHull(vec3 p) {
    vec3 size = vec3(0.012, 0.04, 0.012);
    // Taper front (Bow pointing +y world / -angle simulation)
    p.z += smoothstep(size.y*0.2, size.y*1.0, p.y) * size.z * 1.2;
    vec3 d = abs(p) - size;
    return min(max(d.x,max(d.y,d.z)),0.0) + length(max(d,0.0));
}

void main() {
    float h = texture2D(uWater, vUV).r * 2.0 - 1.0;
    float hR = texture2D(uWater, vUV + vec2(uTexel.x, 0.0)).r * 2.0 - 1.0;
    float hU = texture2D(uWater, vUV + vec2(0.0, uTexel.y)).r * 2.0 - 1.0;
    
    vec3 normal = normalize(vec3(h - hR, h - hU, 0.12));
    
    // Advanced Reflection Model
    vec3 view = vec3(0.0, 0.0, 1.0);
    float cosI = max(0.0, dot(normal, view));
    float fr = fresnel(cosI, 0.02);
    
    // HDR OceanVisual ( Organically muted seabed + sky box reflection )
    vec3 waterTint = vec3(0.02, 0.2, 0.3);
    
    // Seabed: double refraction ( height + view wobble )
    vec2 refrUV = vUV + normal.xy * 0.05 + view.xy * 0.02;
    vec3 seabedCol = mix(vec3(0.1, 0.12, 0.05), waterTint, 0.7); 
    
    // Caustics shimmer (based on wave curvature)
    float curcaust = pow(texture2D(uWater, vUV + vec2(0.0, uTexel.y*2.0)).r - state.r, 2.0); // simple curvature
    caust += curcaust * 0.5;

    // SkyBox simulation
    vec3 lightDir = normalize(vec3(0.5, 0.3, 1.0));
    vec3 skyCol = mix(waterTint * 0.2, vec3(0.6, 0.8, 1.0), pow(normal.z, 2.0));
    
    // Ocean composition
    vec3 col = mix(seabedCol * (1.0 + caust), skyCol, fr);
    
    // Sundisk glint (HDR)
    float sunGlint = pow(max(0.0, dot(reflect(-lightDir, normal), view)), 80.0);
    col += sunGlint * vec3(1.0, 0.9, 0.7) * (1.0 + fresnel(dot(-lightDir, normal), 0.1) * 20.0);

    // ─── 3D Boat Hull ────────────────────────────────────────────────────────
    if(uBoat.w > 0.001) {
        vec2 bPos = vUV - uBoat.xy;
        float cosA = cos(-uBoat.z); float sinA = sin(-uBoat.z);
        // Transform view ray to local boat space
        vec2 rUV = vec2(bPos.x * cosA - bPos.y * sinA, bPos.x * sinA + bPos.y * cosA);
        
        // Raymarch hull intersection ( Simple height fetch from sdf )
        float bAngle = uBoat.z;
        
        // SDF Hull Footprint ( pointing along boat angle )
        vec2 hRel = vUV - uBoat.xy;
        float cosAR = cos(-bAngle); float sinAR = sin(-bAngle);
        vec2 hullRot = vec2(hRel.x * cosAR - hRel.y * sinAR, hRel.x * sinAR + hRel.y * cosAR);
        
        // Pointed Bow logic
        float absX = abs(hullRot.x);
        float hullTaper = absX * 0.8;
        if(hullRot.y > 0.02 && hullRot.y < 0.038) {
            float bowDiff = (hullRot.y - 0.02) * 0.1;
            hullTaper += bowDiff * (0.012 / 0.018); // scaled bow taper
        }

        // Hull Footprint check (organic hull width 0.012)
        if(hullRot.y > -0.04 && hullRot.y < 0.038 && absX < (0.012 - hullTaper)) {
            // Hull Normal Calculation (approximate volumetric shape)
            vec2 gradHull = vec2(hullRot.x * 2.0, (0.038 - hullRot.y) * 0.5);
            vec3 hullN = normalize(vec3(gradHull.x, gradHull.y, 0.2));
            
            // Re-rotate hull normal back to world space
            float cosR = cos(bAngle); float sinR = sin(bAngle);
            hullN.xy = vec2(hullN.x * cosR - hullN.y * sinR, hullN.x * sinR + hullN.y * cosR);

            // Lighting Hull (HDR Sun and soft occlusion near water)
            float hullDiff = max(0.0, dot(hullN, lightDir));
            float hullSpec = pow(max(0.0, dot(reflect(-lightDir, hullN), view)), 30.0);
            
            vec3 redTop = mix(vec3(0.6, 0.05, 0.01), vec3(0.9, 0.1, 0.05), hullDiff); // Matte Red top
            vec3 whiteBottom = mix(vec3(0.5, 0.5, 0.5), vec3(0.8, 0.8, 0.8), hullDiff); // Matte White bottom
            
            // Vertical split logic (red top, white bottom)
            float verticalSplit = smoothstep(-0.01, 0.01, hullRot.y);
            vec3 hullCol = mix(whiteBottom, redTop, verticalSplit);
            
            // Add Self-Shadowing and visual depth
            hullCol *= (0.7 + 0.3 * hullDiff);
            col = mix(col, hullCol, (smoothstep(-0.1, 0.1, h))); // integrate with ocean height
            col += hullSpec * 0.1 * vec3(1.0, 0.9, 0.8);
        }
    }

    gl_FragColor = vec4(pow(col, vec3(0.95)), 1.0);
}`;

// --- SETUP & LOOP ──────────────────────────────────────────
function mkProg(vs, fs) {
    const p = gl.createProgram();
    const s1 = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(s1, vs); gl.compileShader(s1);
    const s2 = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(s2, fs); gl.compileShader(s2);
    gl.attachShader(p, s1); gl.attachShader(p, s2); gl.linkProgram(p);
    return p;
}

const simProg = mkProg(VERT, SIM_FRAG);
const renProg = mkProg(VERT, REN_FRAG);
const uSim = { force: gl.getUniformLocation(simProg, 'uForce') };
const uRen = { water: gl.getUniformLocation(renProg, 'uWater'), aspect: gl.getUniformLocation(renProg, 'uAspect'), boat: gl.getUniformLocation(renProg, 'uBoat'), time: gl.getUniformLocation(renProg, 'uTime') };

function mkFBO() {
    const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
    return { t, f };
}
let fbo1 = mkFBO(), fbo2 = mkFBO();

const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function frame(t) {
    // Boat Physics (advected by fluid forces + steering)
    if(boat.active) {
        boat.speed = boat.speed * 0.98 + boat.targetSpeed * 0.02;
        boat.angle += boat.angVel;
        // Basic physics: state.r is height, simulate advection
        boat.x += Math.cos(boat.angle) * boat.speed * (CH/CW);
        boat.y -= Math.sin(boat.angle) * boat.speed;
        
        // Wrap edges
        if(boat.x < -0.1) boat.x = 1.1; if(boat.x > 1.1) boat.x = -0.1;
        if(boat.y < -0.1) boat.y = 1.1; if(boat.y > 1.1) boat.y = -0.1;
    }

    // Step Simulation
    gl.useProgram(simProg);
    gl.viewport(0, 0, S, S);
    const loc = gl.getAttribLocation(simProg, 'aPos');
    gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo2.f);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform1i(gl.getUniformLocation(simProg, 'uState'), 0);
    gl.uniform2f(gl.getUniformLocation(simProg, 'uTexel'), 1/S, 1/S);
    gl.uniform4f(uSim.force, boat.x, boat.y, boat.angle, boat.speed);
    gl.uniform1f(gl.getUniformLocation(simProg, 'uTime'), t * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    let tmp = fbo1; fbo1 = fbo2; fbo2 = tmp;

    // Render Ocean & Boat
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, W, H);
    gl.useProgram(renProg);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, fbo1.t);
    gl.uniform1i(uRen.water, 0);
    gl.uniform2f(gl.getUniformLocation(renProg, 'uTexel'), 1/S, 1/S);
    gl.uniform1f(uRen.aspect, CW/CH);
    gl.uniform4f(uRen.boat, boat.x, boat.y, boat.angle, boat.active ? 1.0 : 0.0);
    gl.uniform1f(uRen.time, t * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Disable iPad gestures
document.addEventListener('gesturestart', (e) => e.preventDefault());
</script>
</body>
</html>
