<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reproducing Box</title>
    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: sans-serif;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            user-select: none;
            transition: transform 0.1s ease, background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .box:hover {
            background-color: #ee5253;
            transform: scale(1.05);
        }

        .box:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="box" onclick="reproduce(this)">Click Me</div>

    <script>
        function reproduce(element) {
            // 1. Create a new div element
            const newBox = document.createElement('div');
            
            // 2. Give it the same class and text
            newBox.className = 'box';
            newBox.innerText = 'Click Me';
            
            // 3. Make sure the new box can also reproduce
            newBox.onclick = function() {
                reproduce(newBox);
            };

            // 4. Add a random color just for fun
            const randomHue = Math.floor(Math.random() * 360);
            newBox.style.backgroundColor = `hsl(${randomHue}, 70%, 60%)`;

            // 5. Place it into the body
            document.body.appendChild(newBox);
        }
    </script>
</body>
</html>
