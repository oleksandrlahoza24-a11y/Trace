<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fluid Dynamics Fire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#020000; touch-action:none;
    -webkit-user-select:none; user-select:none; }
  canvas { display:block; position:fixed; top:0; left:0; touch-action:none; cursor:crosshair; }
  #ui {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    color:rgba(255, 100, 50, 0.6); font-family:'Share Tech Mono',monospace; font-size:11px;
    letter-spacing:5px; text-transform:uppercase; pointer-events:none;
    transition:opacity 2.5s; white-space:nowrap;
    text-shadow:0 0 18px rgba(255, 50, 0, 0.8);
  }
  #ui.fade { opacity:0; }
  #badge {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    color:rgba(255, 100, 50, 0.4); font-family:'Share Tech Mono',monospace;
    font-size:10px; letter-spacing:7px; pointer-events:none; white-space:nowrap;
    text-shadow:0 0 12px rgba(255, 50, 0, 0.5);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="badge">THERMODYNAMIC · FLUID SIMULATION</div>
<div id="ui">drag to ignite</div>
<script>
'use strict';

const canvas = document.getElementById('c');
const ui     = document.getElementById('ui');
const DPR    = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0, CW = 0, CH = 0;

function resize() {
  CW = window.innerWidth; CH = window.innerHeight;
  W  = Math.round(CW * DPR); H = Math.round(CH * DPR);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
}
resize(); window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl', {antialias:false, alpha:false, powerPreference:'high-performance'})
        || canvas.getContext('experimental-webgl', {antialias:false, alpha:false});
if(!gl) { document.body.innerHTML = '<p style="color:#f44;font-family:monospace;padding:40px">WebGL unavailable</p>'; throw 0; }

// Extensions for float textures (crucial for fluid simulation math)
const extFloat = gl.getExtension('OES_texture_float');
const extHalfF = gl.getExtension('OES_texture_half_float');
const extFL    = gl.getExtension('OES_texture_float_linear');
const extHL    = gl.getExtension('OES_texture_half_float_linear');

function canRT(type){
  const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 4, 4, 0, gl.RGBA, type, null);
  const f = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.deleteFramebuffer(f); gl.deleteTexture(t); gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return ok;
}

let FTYPE, ULIN, UINT8;
if(extFloat && canRT(gl.FLOAT))                       { FTYPE=gl.FLOAT;                ULIN=!!extFL; UINT8=false; }
else if(extHalfF && canRT(extHalfF.HALF_FLOAT_OES))   { FTYPE=extHalfF.HALF_FLOAT_OES; ULIN=!!extHL; UINT8=false; }
else                                                  { FTYPE=gl.UNSIGNED_BYTE;        ULIN=true;    UINT8=true;  }

// Resolution of the fluid grid (lower = blockier but faster, 512 is a good balance)
const S = 512; 

const VERT = `attribute vec2 aPos; varying vec2 vUV;
void main(){ vUV = aPos*.5+.5; gl_Position = vec4(aPos,0.,1.); }`;

// ═════════════════════════════════════════════════════════════════════════════
// SIMULATION SHADER — Curl Noise Fluid Advection & Thermodynamics
// FBO State: R = Fuel/Density, G = Temperature, B = Velocity X, A = Velocity Y
// ═════════════════════════════════════════════════════════════════════════════
const SIM_SRC = (UINT8 ? '#define U8\n' : '') + `
precision highp float;
varying vec2 vUV;
uniform sampler2D uS;
uniform vec2  uTx;
uniform float uTime;
uniform vec2  uM;
uniform vec2  uMv;
uniform float uMDown;
uniform float uAspect;

// 3D Simplex Noise for procedural fluid turbulence
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
  const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
  const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy) );
  vec3 x0 = v - i + dot(i, C.xxx) ;
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min( g.xyz, l.zxy );
  vec3 i2 = max( g.xyz, l.zxy );
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute( permute( permute(
             i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
           + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
  float n_ = 0.142857142857;
  vec3  ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_ );
  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4( x.xy, y.xy );
  vec4 b1 = vec4( x.zw, y.zw );
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
  vec3 p0 = vec3(a0.xy,h.x);
  vec3 p1 = vec3(a0.zw,h.y);
  vec3 p2 = vec3(a1.xy,h.z);
  vec3 p3 = vec3(a1.zw,h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m; return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
}

// Incompressible fluid motion via Curl of simplex noise
vec2 curlNoise(vec2 uv, float t) {
    float e = 0.01;
    vec3 p = vec3(uv * 4.0, t * 0.4);
    float n1 = snoise(p + vec3(0.0, e, 0.0));
    float n2 = snoise(p - vec3(0.0, e, 0.0));
    float n3 = snoise(p + vec3(e, 0.0, 0.0));
    float n4 = snoise(p - vec3(e, 0.0, 0.0));
    float x = (n1 - n2) / (2.0 * e);
    float y = (n3 - n4) / (2.0 * e);
    return vec2(-x, y); // Orthogonal to gradient
}

void main() {
  vec2 uv = vUV;
  float dt = 0.016;

  // 1. Read current local velocity and temperature
  vec4 state = texture2D(uS, uv);
  float temp = state.g;

  // 2. Calculate fluid turbulence (Curl Noise) + Buoyancy based on temperature
  vec2 turbulence = curlNoise(uv * vec2(uAspect, 1.0), uTime) * 0.04;
  vec2 buoyancy = vec2(0.0, temp * 0.15 + 0.05); // Hotter = rises faster
  vec2 velocity = turbulence + buoyancy;

  // 3. Advection (look backward along the velocity field to find previous state)
  vec2 prevUV = uv - velocity * dt;
  vec4 advected = texture2D(uS, prevUV);

  // 4. Thermodynamics: Cooling and Dissipation over time
  advected.r *= 0.95; // Fuel burns away
  advected.g *= 0.97; // Heat dissipates

  // 5. Fire Base Emitter (bottom of screen)
  float baseEmitter = smoothstep(0.1, 0.0, uv.y) * smoothstep(0.4, 0.0, abs(uv.x - 0.5));
  float ignitionNoise = snoise(vec3(uv.x * 15.0, uTime * 2.0, 0.0)) * 0.5 + 0.5;
  if(uv.y < 0.05) {
      advected.r += baseEmitter * ignitionNoise * 1.5; // Inject fuel
      advected.g += baseEmitter * ignitionNoise * 1.5; // Inject heat
  }

  // 6. Mouse Interaction
  float dist = length((uv - uM) * vec2(uAspect, 1.0));
  float mouseGlow = exp(-dist * 40.0) * uMDown;
  advected.r += mouseGlow * 2.0; // Add fuel on click
  advected.g += mouseGlow * 2.0; // Add heat on click
  
  // Push the fluid with the mouse
  velocity += uMv * mouseGlow * 50.0; 

  gl_FragColor = clamp(advected, 0.0, 5.0);
}`;

// ═════════════════════════════════════════════════════════════════════════════
// RENDER SHADER — Blackbody Radiation Mapping
// ═════════════════════════════════════════════════════════════════════════════
const RENDER_SRC = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uW;
uniform vec2  uTx;
uniform float uAspect;

// Maps temperature [0, 1+] to physical fire colors
vec3 blackbody(float temp) {
    vec3 col = vec3(0.0);
    // Dark smoke / edge
    col += mix(vec3(0.0, 0.0, 0.0), vec3(0.2, 0.0, 0.0), smoothstep(0.0, 0.2, temp));
    // Deep Red
    col += mix(vec3(0.0), vec3(0.8, 0.1, 0.0), smoothstep(0.2, 0.4, temp));
    // Orange / Yellow
    col += mix(vec3(0.0), vec3(1.0, 0.6, 0.1), smoothstep(0.4, 0.7, temp));
    // Bright Yellow
    col += mix(vec3(0.0), vec3(1.0, 0.9, 0.4), smoothstep(0.7, 0.9, temp));
    // Blinding White Core
    col += mix(vec3(0.0), vec3(0.8, 0.9, 1.0), smoothstep(0.9, 1.5, temp));
    return col;
}

void main() {
  vec2 uv = vUV;
  
  // Sample local state and neighboring states for a slight bloom/blur effect
  vec4 state = texture2D(uW, uv);
  float heat = state.g;
  
  heat += texture2D(uW, uv + vec2(uTx.x*2., 0.0)).g * 0.1;
  heat += texture2D(uW, uv - vec2(uTx.x*2., 0.0)).g * 0.1;
  heat += texture2D(uW, uv + vec2(0.0, uTx.y*2.)).g * 0.1;
  heat += texture2D(uW, uv - vec2(0.0, uTx.y*2.)).g * 0.1;
  heat *= 0.71; // Normalize back

  // Apply color mapping
  vec3 fireColor = blackbody(heat * 1.2); // boost visual intensity
  
  // Background gradient (ambient glow)
  vec3 bg = mix(vec3(0.08, 0.02, 0.01), vec3(0.0, 0.0, 0.0), uv.y);

  // Composite fire over background
  vec3 finalColor = bg + fireColor;

  // Vignette
  vec2 vd = (uv * 2.0 - 1.0) * vec2(uAspect, 1.0);
  finalColor *= clamp(1.0 - dot(vd,vd)*0.15, 0.0, 1.0);

  // Tone mapping (ACES approx)
  finalColor = (finalColor*(2.51*finalColor+0.03))/(finalColor*(2.43*finalColor+0.59)+0.14);

  gl_FragColor = vec4(finalColor, 1.0);
}`;

// ─── WebGL Compilation & Setup ────────────────────────────────────────────
function mkSh(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(fsrc){
  const p = gl.createProgram();
  gl.attachShader(p, mkSh(gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, mkSh(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  const u = {}, n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for(let i=0;i<n;i++){ const x=gl.getActiveUniform(p,i); u[x.name]=gl.getUniformLocation(p,x.name); }
  return {p, u};
}

let simP, renP;
try {
  simP  = mkProg(SIM_SRC);
  renP  = mkProg(RENDER_SRC);
} catch(e) {
  document.body.innerHTML = `<pre style="color:#f44;padding:20px;font-size:11px;white-space:pre-wrap">${e.message}</pre>`;
  throw e;
}

const qb = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
function bindQ(prog){
  gl.bindBuffer(gl.ARRAY_BUFFER, qb);
  const loc = gl.getAttribLocation(prog.p, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

function mkFBO(){
  const n   = S * S * 4;
  const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex);
  const emptyData = UINT8 ? new Uint8Array(n)
                  : (FTYPE === gl.FLOAT ? new Float32Array(n) : new Uint16Array(n));
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, S, S, 0, gl.RGBA, FTYPE, emptyData);
  const filt = ULIN ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filt);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return {tex, fbo};
}
let fboA = mkFBO(), fboB = mkFBO();

// ─── Input Handling ───────────────────────────────────────────────────────
const ptr = {x:-1, y:-1, vx:0, vy:0, down:0};
let gone = false;
function toUV(cx,cy){ return {x:cx/CW, y:1.-cy/CH}; }
function dismiss(){ if(gone)return; gone=true; ui.classList.add('fade'); setTimeout(()=>ui.style.display='none',3000); }

function onDown(e){
  const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY);
  ptr.x=uv.x; ptr.y=uv.y; ptr.vx=0; ptr.vy=0; ptr.down=1; dismiss();
}
function onMove(e){
  if(!ptr.down) return;
  const t=e.touches?e.touches[0]:e, uv=toUV(t.clientX,t.clientY);
  ptr.vx = uv.x - ptr.x;
  ptr.vy = uv.y - ptr.y;
  ptr.x = uv.x; 
  ptr.y = uv.y;
}
function onUp(){ ptr.down=0; ptr.vx=0; ptr.vy=0; }

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();onUp();  },{passive:false});

// ─── Main Rendering Loop ──────────────────────────────────────────────────
let time = 0;

function simulate(src, dst){
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.viewport(0, 0, S, S);
  gl.useProgram(simP.p);
  bindQ(simP);
  const u = simP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(u.uS,   0);
  gl.uniform2f(u.uTx,  1./S, 1./S);
  gl.uniform1f(u.uTime, time);
  gl.uniform2f(u.uM,   ptr.x, ptr.y);
  gl.uniform2f(u.uMv,  ptr.vx, ptr.vy);
  gl.uniform1f(u.uMDown, ptr.down);
  gl.uniform1f(u.uAspect, W/H);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  
  // Damping mouse velocity so it doesn't streak infinitely if you stop moving but hold click
  ptr.vx *= 0.5;
  ptr.vy *= 0.5;
}

function render(src){
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(renP.p);
  bindQ(renP);
  const u = renP.u;
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex);
  gl.uniform1i(u.uW,      0);
  gl.uniform2f(u.uTx,     1./S, 1./S);
  gl.uniform1f(u.uAspect, W/H);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function frame(now){
  requestAnimationFrame(frame);
  time = now * 0.001;
  
  // Run physics step
  simulate(fboA, fboB);
  
  // Swap buffers
  const tmp = fboA; fboA = fboB; fboB = tmp;
  
  // Render to screen
  render(fboA);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
