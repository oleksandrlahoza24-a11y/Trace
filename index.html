<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELLDIVERS: OMNI-COMMAND</title>
    <style>
        :root {
            --super-yellow: #fbff00;
            --super-cyan: #00ffff;
            --super-red: #ff3300;
            --super-green: #44ff44;
            --ui-bg: rgba(5, 10, 5, 0.92);
            --ui-border: 1px solid rgba(251, 255, 0, 0.4);
            --font-main: 'Arial Black', Gadget, sans-serif;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #020202; color: var(--super-yellow);
            font-family: var(--font-main);
            touch-action: none; -webkit-user-select: none;
        }

        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 10px solid rgba(251, 255, 0, 0.05); box-sizing: border-box; }

        /* --- ADVANCED UI PANELS --- */
        .ui-panel {
            position: absolute; background: var(--ui-bg); border: var(--ui-border);
            pointer-events: auto; backdrop-filter: blur(8px);
            box-shadow: inset 0 0 15px rgba(251, 255, 0, 0.1);
        }

        #stratagem-deck { top: 20px; left: 20px; width: 260px; padding: 12px; }
        #combo-input {
            font-size: 32px; height: 45px; line-height: 45px; text-align: center;
            background: rgba(0,0,0,0.5); margin-bottom: 10px; border-radius: 4px;
            color: var(--super-cyan); text-shadow: 0 0 10px var(--super-cyan);
        }

        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .d-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--super-yellow);
            color: var(--super-yellow); height: 55px; font-size: 28px; border-radius: 8px;
        }
        .d-btn:active { background: var(--super-yellow); color: #000; }

        #vitals-deck { top: 20px; right: 20px; width: 280px; padding: 15px; }
        .status-bar { width: 100%; height: 12px; background: #222; border: 1px solid #444; margin: 5px 0 15px 0; position: relative; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #aa0000, #ff3300); width: 100%; transition: 0.2s; }
        #stamina-bar { height: 100%; background: linear-gradient(90deg, #0088aa, #00ffff); width: 100%; }

        #stratagem-list { font-size: 10px; color: #aaa; margin-top: 10px; text-transform: uppercase; }
        .list-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 2px 0; }

        /* --- TACTICAL LOG --- */
        #comms-log {
            position: absolute; left: 20px; bottom: 220px; width: 300px;
            height: 120px; font-size: 11px; color: var(--super-green);
            overflow: hidden; pointer-events: none; text-shadow: 1px 1px #000;
        }

        /* --- CONTROLS --- */
        .stick-base {
            position: absolute; width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(251, 255, 0, 0.1) 0%, rgba(0,0,0,0) 70%);
            border: 2px solid rgba(251, 255, 0, 0.2); border-radius: 50%;
            bottom: 40px; pointer-events: auto;
        }
        #stick-left { left: 40px; }
        #stick-right { right: 40px; }
        .stick-knob {
            position: absolute; width: 70px; height: 70px;
            background: var(--super-yellow); border-radius: 50%;
            top: 45px; left: 45px; box-shadow: 0 0 20px var(--super-yellow);
        }

        #mission-timer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 24px; color: white; }
    </style>
</head>
<body>

<div id="hud">
    <div id="mission-timer">40:00</div>

    <div id="stratagem-deck" class="ui-panel">
        <div id="combo-input">READY</div>
        <div class="dpad">
            <div></div><button class="d-btn" onpointerdown="uiInput('U')">▲</button><div></div>
            <button class="d-btn" onpointerdown="uiInput('L')">◀</button>
            <button class="d-btn" onpointerdown="uiInput('D')">▼</button>
            <button class="d-btn" onpointerdown="uiInput('R')">▶</button>
        </div>
        <div id="stratagem-list">
            <div class="list-item"><span>500KG BOMB</span><span>U R D D D</span></div>
            <div class="list-item"><span>GATLING SENTRY</span><span>D U R L</span></div>
            <div class="list-item"><span>GAS STRIKE</span><span>R R D R</span></div>
            <div class="list-item"><span>REINFORCE</span><span>U D R L U</span></div>
        </div>
    </div>

    <div id="vitals-deck" class="ui-panel">
        <div style="font-size: 14px;">HELLDIVER ID: 0824-S</div>
        <div style="font-size: 10px; margin-top:10px;">HEALTH CAPACITY</div>
        <div class="status-bar"><div id="hp-bar"></div></div>
        <div style="font-size: 10px;">STAMINA SYNC</div>
        <div class="status-bar"><div id="stamina-bar"></div></div>
        <div id="weapon-info" style="color: var(--super-cyan);">WEAPON: LIBERATOR [30/∞]</div>
        <div id="kill-count" style="margin-top: 10px; font-size: 12px;">CONFIRMED KILLS: 0</div>
    </div>

    <div id="comms-log"></div>

    <div id="stick-left" class="stick-base"><div id="knob-left" class="stick-knob"></div></div>
    <div id="stick-right" class="stick-base"><div id="knob-right" class="stick-knob"></div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- GAME ENGINE CONSTANTS ---
    const SETTINGS = {
        MAX_ENEMIES: 35,
        PLAYER_SPEED: 0.18,
        SENTRY_RANGE: 15,
        BULLET_LIMIT: 50,
        COLORS: { bug: 0x44ff00, gas: 0x88ff00, explosion: 0xffaa00, beam: 0x00ffff }
    };

    const STRAT_DB = {
        "URDDD": { name: "500KG BOMB", type: "ORBITAL", color: 0xff6600 },
        "DURL":  { name: "GATLING SENTRY", type: "SENTRY", color: 0xaaaaaa },
        "RRDR":  { name: "GAS STRIKE", type: "GAS", color: 0x88ff00 },
        "UDRLU": { name: "REINFORCE", type: "LIFE", color: 0xffffff }
    };

    // --- INITIALIZATION ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050805);
    scene.fog = new THREE.FogExp2(0x050805, 0.04);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio > 1.5 ? 1.5 : window.devicePixelRatio); // iPad Optimization
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING ---
    const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
    dirLight.position.set(40, 80, 40);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -60; dirLight.shadow.camera.right = 60;
    dirLight.shadow.camera.top = 60; dirLight.shadow.camera.bottom = -60;
    scene.add(dirLight);
    scene.add(new THREE.AmbientLight(0x223344, 0.8));

    // --- WORLD OBJECTS ---
    const groundGeo = new THREE.PlaneGeometry(500, 500, 40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x151812, roughness: 1, metalness: 0 });
    const floor = new THREE.Mesh(groundGeo, groundMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Player Helldiver
    const player = new THREE.Group();
    const armor = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 8, 12), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.9}));
    const helmet = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
    helmet.position.set(0, 0.6, 0.3);
    const capeGeo = new THREE.PlaneGeometry(0.8, 1.4);
    const capeMat = new THREE.MeshStandardMaterial({color: 0xffff00, side: THREE.DoubleSide});
    const cape = new THREE.Mesh(capeGeo, capeMat);
    cape.position.set(0, 0.1, -0.3); cape.rotation.x = 0.2;
    player.add(armor, helmet, cape);
    player.position.y = 0.9;
    player.castShadow = true;
    scene.add(player);

    // --- GAME STATE ---
    let enemies = [];
    let bullets = [];
    let sentries = [];
    let particles = [];
    let ammo = 30;
    let hp = 100;
    let kills = 0;
    let combo = "";
    let isReloading = false;

    // --- LOGIC: ENEMIES ---
    function spawnBug() {
        const bug = new THREE.Group();
        const body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 0), new THREE.MeshStandardMaterial({color: 0x33ff00}));
        body.castShadow = true;
        bug.add(body);
        
        const dist = 40 + Math.random() * 20;
        const ang = Math.random() * Math.PI * 2;
        bug.position.set(Math.cos(ang)*dist, 0.7, Math.sin(ang)*dist);
        bug.userData = { hp: 3, speed: 0.04 + Math.random()*0.04 };
        scene.add(bug);
        enemies.push(bug);
    }
    for(let i=0; i<SETTINGS.MAX_ENEMIES; i++) spawnBug();

    // --- LOGIC: CONTROLS ---
    const inputMove = { x: 0, y: 0, active: false };
    const inputAim = { x: 0, y: 0, active: false };

    function initJoystick(id, knobId, data) {
        const base = document.getElementById(id);
        const knob = document.getElementById(knobId);
        const rect = base.getBoundingClientRect();
        const center = { x: rect.left + 80, y: rect.top + 80 };

        const move = (e) => {
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            const dx = t.clientX - center.x;
            const dy = t.clientY - center.y;
            const d = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
            const a = Math.atan2(dy, dx);
            data.x = (Math.cos(a)*d)/60;
            data.y = (Math.sin(a)*d)/60;
            knob.style.transform = `translate(${data.x*60}px, ${data.y*60}px)`;
            data.active = true;
        };

        const stop = () => {
            knob.style.transform = `translate(0,0)`;
            data.x = 0; data.y = 0; data.active = false;
        };

        base.addEventListener('touchstart', move);
        base.addEventListener('touchmove', move);
        base.addEventListener('touchend', stop);
    }
    initJoystick('stick-left', 'knob-left', inputMove);
    initJoystick('stick-right', 'knob-right', inputAim);

    // --- LOGIC: STRATAGEMS ---
    window.uiInput = (dir) => {
        combo += dir;
        document.getElementById('combo-input').innerText = combo;
        logMsg("UPLINK KEY: " + dir);

        if(STRAT_DB[combo]) {
            deployStratagem(STRAT_DB[combo]);
            combo = "";
            setTimeout(() => document.getElementById('combo-input').innerText = "READY", 1000);
        } else if(combo.length > 5) {
            combo = "";
            document.getElementById('combo-input').innerText = "FAILED";
        }
    }

    function logMsg(m) {
        const log = document.getElementById('comms-log');
        log.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}<br>` + log.innerHTML;
    }

    function deployStratagem(s) {
        logMsg(`CALLING: ${s.name}`);
        const target = player.position.clone().add(new THREE.Vector3(Math.sin(player.rotation.y)*6, 0, Math.cos(player.rotation.y)*6));
        
        const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 200), new THREE.MeshBasicMaterial({color: s.color, transparent: true, opacity: 0.7}));
        beam.position.set(target.x, 100, target.z);
        scene.add(beam);

        setTimeout(() => {
            scene.remove(beam);
            if(s.type === "ORBITAL") triggerExplosion(target, 12, 100);
            if(s.type === "GAS") triggerGas(target);
            if(s.type === "SENTRY") spawnSentry(target);
            if(s.type === "LIFE") { hp = 100; logMsg("REINFORCEMENT ARRIVED"); }
        }, 1500);
    }

    function triggerExplosion(pos, rad, dmg) {
        const boom = new THREE.Mesh(new THREE.SphereGeometry(rad, 16, 16), new THREE.MeshBasicMaterial({color: 0xffaa00, wireframe: true}));
        boom.position.copy(pos);
        scene.add(boom);
        setTimeout(() => scene.remove(boom), 300);

        enemies.forEach(b => {
            if(b.position.distanceTo(pos) < rad) {
                b.userData.hp -= 10;
                kills++;
            }
        });
        updateHUD();
    }

    function triggerGas(pos) {
        const cloud = new THREE.Mesh(new THREE.SphereGeometry(8, 16, 16), new THREE.MeshStandardMaterial({color: 0x88ff00, transparent: true, opacity: 0.4}));
        cloud.position.copy(pos);
        scene.add(cloud);
        
        let ticks = 0;
        const interval = setInterval(() => {
            enemies.forEach(b => {
                if(b.position.distanceTo(pos) < 8) b.userData.hp -= 1;
            });
            ticks++;
            if(ticks > 20) { scene.remove(cloud); clearInterval(interval); }
        }, 500);
    }

    function spawnSentry(pos) {
        const turret = new THREE.Group();
        const base = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x333333}));
        const head = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1, 8), new THREE.MeshStandardMaterial({color: 0x555555}));
        head.position.y = 0.7; head.rotation.z = Math.PI/2;
        turret.add(base, head);
        turret.position.copy(pos);
        turret.userData = { lastFire: 0 };
        scene.add(turret);
        sentries.push(turret);
        logMsg("SENTRY ACTIVE");
    }

    // --- LOGIC: COMBAT ---
    function fireBullet(from, angle, isPlayer = true) {
        if(isPlayer && (isReloading || ammo <= 0)) return;
        if(isPlayer) ammo--;

        const b = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
        b.position.copy(from);
        b.userData = { 
            vel: new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle)).multiplyScalar(1.2),
            age: 0,
            isPlayer: isPlayer
        };
        scene.add(b);
        bullets.push(b);
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('hp-bar').style.width = hp + "%";
        document.getElementById('weapon-info').innerText = `WEAPON: LIBERATOR [${ammo}/∞]`;
        document.getElementById('kill-count').innerText = `CONFIRMED KILLS: ${kills}`;
    }

    // --- MAIN LOOP ---
    function animate(time) {
        requestAnimationFrame(animate);

        // Player Move
        if(inputMove.active) {
            player.position.x += inputMove.x * SETTINGS.PLAYER_SPEED;
            player.position.z += inputMove.y * SETTINGS.PLAYER_SPEED;
            cape.rotation.x = 0.2 + (Math.sin(time*0.01)*0.2);
        }

        // Player Aim
        if(inputAim.active) {
            player.rotation.y = Math.atan2(inputAim.x, inputAim.y);
            if(time % 150 < 20) fireBullet(player.position, player.rotation.y);
        }

        // Bullets
        for(let i=bullets.length-1; i>=0; i--) {
            const b = bullets[i];
            b.position.add(b.userData.vel);
            b.userData.age++;

            enemies.forEach(bug => {
                if(bug.position.distanceTo(b.position) < 1.2) {
                    bug.userData.hp -= 1;
                    b.userData.age = 200;
                }
            });

            if(b.userData.age > 60) {
                scene.remove(b);
                bullets.splice(i, 1);
            }
        }

        // Enemies
        enemies.forEach(bug => {
            const dir = new THREE.Vector3().subVectors(player.position, bug.position).normalize();
            bug.position.addScaledVector(dir, bug.userData.speed);
            
            if(bug.position.distanceTo(player.position) < 1.1) {
                hp -= 0.2;
                updateHUD();
            }

            if(bug.userData.hp <= 0) {
                bug.position.set(Math.random()*100-50, 0.7, Math.random()*100-50);
                bug.userData.hp = 3;
                kills++;
            }
        });

        // Sentries
        sentries.forEach(s => {
            let nearest = null;
            let minDist = SETTINGS.SENTRY_RANGE;
            enemies.forEach(bug => {
                const d = bug.position.distanceTo(s.position);
                if(d < minDist) { minDist = d; nearest = bug; }
            });

            if(nearest && time - s.userData.lastFire > 200) {
                const ang = Math.atan2(nearest.position.x - s.position.x, nearest.position.z - s.position.z);
                fireBullet(s.position, ang, false);
                s.userData.lastFire = time;
                s.children[1].rotation.y = ang;
            }
        });

        // Camera
        camera.position.lerp(new THREE.Vector3(player.position.x, 25, player.position.z + 20), 0.1);
        camera.lookAt(player.position);

        renderer.render(scene, camera);
    }

    animate(0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
