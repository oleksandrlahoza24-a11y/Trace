<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survival Horror Framework</title>
    <style>
        body { margin: 0; background: #000; color: #f00; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* The Office View */
        #office { width: 80%; height: 70%; border: 5px solid #333; position: relative; background: #1a1a1a; transition: background 0.2s; }
        .door { position: absolute; top: 0; width: 10%; height: 100%; background: #444; display: flex; align-items: center; justify-content: center; color: white; }
        #door-left { left: 0; }
        #door-right { right: 0; }
        .door.closed { background: #111; height: 100%; top: 0; }

        /* UI Elements */
        #ui-layer { position: absolute; bottom: 20px; width: 90%; display: flex; justify-content: space-between; font-size: 24px; }
        .btn { padding: 10px 20px; background: #222; border: 2px solid #555; color: #fff; cursor: pointer; }
        .btn:active { background: #444; }

        /* Camera Overlay */
        #camera-monitor { display: none; position: absolute; top: 5%; left: 5%; width: 90%; height: 80%; background: #050505; border: 10px solid #222; z-index: 10; }
        #cam-feed { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #0f0; }
        .static { background: url('https://media.giphy.com/media/oEI9uWUicG5I4/giphy.gif'); opacity: 0.1; position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;}
    </style>
</head>
<body>

<div id="game-container">
    <div id="office">
        <div id="door-left" class="door">LEFT</div>
        <div id="door-right" class="door">RIGHT</div>
        <div style="text-align: center; margin-top: 20%;">OFFICE VIEW</div>
    </div>

    <div id="ui-layer">
        <div>Power: <span id="power">100</span>%</div>
        <button class="btn" onclick="toggleCams()">CAMERAS</button>
        <div id="clock">12 AM</div>
    </div>

    <div id="camera-monitor">
        <div class="static"></div>
        <div id="cam-feed">CAM 01: MAIN HALL</div>
        <div style="position:absolute; bottom:10px; left:10px;">
            <button onclick="changeCam('01')">CAM 1</button>
            <button onclick="changeCam('02')">CAM 2</button>
            <button onclick="toggleCams()" style="background:red; color:white;">CLOSE</button>
        </div>
    </div>
</div>

<script>
    let power = 100;
    let hour = 0;
    let camOpen = false;
    let leftDoorClosed = false;
    let rightDoorClosed = false;

    // Power Drain Logic
    setInterval(() => {
        let drain = 0.1;
        if(camOpen) drain += 0.2;
        if(leftDoorClosed) drain += 0.3;
        if(rightDoorClosed) drain += 0.3;
        
        power = Math.max(0, power - drain);
        document.getElementById('power').innerText = Math.floor(power);
        
        if(power <= 0) gameOver("Out of Power!");
    }, 1000);

    // Time Logic
    setInterval(() => {
        hour++;
        if(hour > 6) alert("You Survived!");
        document.getElementById('clock').innerText = hour + " AM";
    }, 45000); // 45 seconds per hour

    function toggleCams() {
        camOpen = !camOpen;
        document.getElementById('camera-monitor').style.display = camOpen ? 'block' : 'none';
    }

    function changeCam(id) {
        document.getElementById('cam-feed').innerText = "CAM " + id + ": LOADING...";
        setTimeout(() => {
            document.getElementById('cam-feed').innerText = "CAM " + id + (id === '01' ? ": HALLWAY" : ": KITCHEN");
        }, 300);
    }

    // Key listeners for doors
    window.addEventListener('keydown', (e) => {
        if(e.key === 'a') {
            leftDoorClosed = !leftDoorClosed;
            document.getElementById('door-left').style.background = leftDoorClosed ? '#111' : '#444';
        }
        if(e.key === 'd') {
            rightDoorClosed = !rightDoorClosed;
            document.getElementById('door-right').style.background = rightDoorClosed ? '#111' : '#444';
        }
    });

    function gameOver(reason) {
        alert("GAME OVER: " + reason);
        location.reload();
    }
</script>

</body>
</html>
