<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELLDIVERS: TOTAL LIBERATION</title>
    <style>
        :root {
            --yellow: #fbff00; --cyan: #00ffff; --red: #ff3300;
            --bg: rgba(5, 10, 5, 0.95); --glow: 0 0 15px rgba(251, 255, 0, 0.4);
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: var(--yellow); }
        .panel { position: absolute; background: var(--bg); border: 1px solid #445544; pointer-events: auto; backdrop-filter: blur(8px); }

        /* STRATAGEM SYSTEM */
        #strat-panel { top: 15px; left: 15px; width: 240px; padding: 12px; border-left: 4px solid var(--yellow); }
        #combo-view { font-size: 32px; height: 40px; text-align: center; margin: 10px 0; color: var(--cyan); text-shadow: var(--glow); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid var(--yellow); color: var(--yellow); height: 55px; font-size: 28px; border-radius: 4px; }
        .btn:active { background: var(--yellow); color: #000; }

        /* STATUS & LOGS */
        #status-panel { top: 15px; right: 15px; width: 280px; padding: 12px; border-right: 4px solid var(--yellow); text-align: right; }
        .stat-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
        #log { height: 120px; overflow: hidden; font-size: 11px; color: #aaa; border-top: 1px solid #333; margin-top: 10px; text-align: left; line-height: 1.4; }
        
        /* BARS */
        .bar-bg { width: 100%; height: 8px; background: #222; margin: 4px 0; border: 1px solid #444; }
        #hp-bar { height: 100%; background: var(--red); width: 100%; transition: 0.2s; }
        #ammo-bar { height: 100%; background: var(--cyan); width: 100%; }

        /* JOYSTICKS */
        .joy { position: absolute; width: 160px; height: 160px; background: rgba(255,255,255,0.03); border: 2px solid rgba(251, 255, 0, 0.2); border-radius: 50%; bottom: 40px; pointer-events: auto; }
        #move-joy { left: 40px; } #aim-joy { right: 40px; }
        .knob { position: absolute; width: 70px; height: 70px; background: var(--yellow); border-radius: 50%; top: 45px; left: 45px; box-shadow: var(--glow); }

        #score-msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 40px; opacity: 0; transition: 0.5s; pointer-events: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div id="strat-panel" class="panel">
        <div style="font-size: 10px; opacity: 0.7;">ORBITAL UPLINK ESTABLISHED</div>
        <div id="combo-view">----</div>
        <div class="grid">
            <div></div><button class="btn" onpointerdown="input('U')">▲</button><div></div>
            <button class="btn" onpointerdown="input('L')">◀</button>
            <button class="btn" onpointerdown="input('D')">▼</button>
            <button class="btn" onpointerdown="input('R')">▶</button>
        </div>
        <div id="active-strat" style="font-size: 10px; margin-top: 8px; color: var(--cyan);">READY FOR ORDERS</div>
    </div>

    <div id="status-panel" class="panel">
        <div class="stat-row"><span>OPERATIVE</span><span>SES LIBERTY</span></div>
        <div class="bar-bg"><div id="hp-bar"></div></div>
        <div class="stat-row"><span>MAGAZINE</span><span id="ammo-txt">30/30</span></div>
        <div class="bar-bg"><div id="ammo-bar"></div></div>
        <div id="log">>> DROP SUCCESSFUL<br>>> MISSION: EXTERMINATION</div>
    </div>

    <div id="score-msg">STIM PACK USED!</div>

    <div id="move-joy" class="joy"><div id="move-knob" class="knob"></div></div>
    <div id="aim-joy" class="joy"><div id="aim-knob" class="knob"></div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- GAME DATA ---
    const STRATS = {
        "UDRL":  { n: "500KG BOMB", c: "#00ffff", type: "bomb" },
        "DDUUR": { n: "GATLING SENTRY", c: "#fbff00", type: "sentry" },
        "RRLLD": { n: "ORBITAL LASER", c: "#ff0000", type: "laser" },
        "UUDR":  { n: "STIM PACK", c: "#00ff00", type: "heal" },
        "DDLL":  { n: "RESUPPLY", c: "#ffffff", type: "ammo" }
    };

    const state = {
        hp: 100, ammo: 30, reloading: false, score: 0,
        move: { x: 0, y: 0 }, aim: { x: 0, y: 0, active: false },
        buffer: "", lastFire: 0, shaking: 0
    };

    // --- ENGINE SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050a05, 0.04);
    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTS ---
    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(20, 50, 20);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x1a2a1a, 0.8));

    // --- WORLD ---
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshStandardMaterial({ color: 0x111511, roughness: 1 })
    );
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Decor: Cracks
    for(let i=0; i<40; i++) {
        const crack = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.1), new THREE.MeshBasicMaterial({color: 0x221100}));
        crack.position.set(Math.random()*200-100, 0.01, Math.random()*200-100);
        crack.rotation.x = -Math.PI/2;
        crack.rotation.z = Math.random()*Math.PI;
        scene.add(crack);
    }

    // --- PLAYER & ENTITIES ---
    const player = new THREE.Group();
    const pMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8), new THREE.MeshStandardMaterial({color:0x111111, metalness:0.9}));
    pMesh.castShadow = true;
    const cape = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 1.3), new THREE.MeshStandardMaterial({color:0xfbff00, side:2}));
    cape.position.set(0, 0.1, -0.3);
    player.add(pMesh, cape);
    player.position.y = 1;
    scene.add(player);

    const bugs = [];
    const bullets = [];
    const sentries = [];
    const particles = [];

    function spawnBug(isHeavy = false) {
        const size = isHeavy ? 1.5 : 0.6;
        const bug = new THREE.Mesh(
            new THREE.SphereGeometry(size, 8, 8),
            new THREE.MeshStandardMaterial({ color: isHeavy ? 0xcc5500 : 0x44ff00 })
        );
        const a = Math.random()*6.28;
        bug.position.set(Math.cos(a)*50, size, Math.sin(a)*50);
        bug.hp = isHeavy ? 15 : 3;
        bug.isHeavy = isHeavy;
        scene.add(bug);
        bugs.push(bug);
    }
    for(let i=0; i<20; i++) spawnBug(i > 17);

    // --- INPUT LOGIC ---
    function setupJoy(id, data) {
        const el = document.getElementById(id);
        const knob = el.querySelector('.knob');
        const rect = el.getBoundingClientRect();
        const center = { x: rect.left + 80, y: rect.top + 80 };

        const move = (e) => {
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            const dx = t.clientX - center.x;
            const dy = t.clientY - center.y;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
            const ang = Math.atan2(dy, dx);
            data.x = (Math.cos(ang)*dist)/60;
            data.y = (Math.sin(ang)*dist)/60;
            data.active = true;
            knob.style.transform = `translate(${data.x*60}px, ${data.y*60}px)`;
        };
        const end = () => { data.x = 0; data.y = 0; data.active = false; knob.style.transform = `translate(0,0)`; };
        el.addEventListener('touchstart', move); el.addEventListener('touchmove', move); el.addEventListener('touchend', end);
    }
    setupJoy('move-joy', state.move);
    setupJoy('aim-joy', state.aim);

    window.input = (dir) => {
        state.buffer += dir;
        document.getElementById('combo-view').innerText = state.buffer;
        if(STRATS[state.buffer]) {
            exec(STRATS[state.buffer]);
            state.buffer = "";
        } else if(state.buffer.length > 5) state.buffer = "";
    };

    function log(m) {
        const l = document.getElementById('log');
        l.innerHTML = ">> " + m + "<br>" + l.innerHTML;
    }

    // --- ACTIONS ---
    function exec(s) {
        log("CALLED: " + s.n);
        document.getElementById('active-strat').innerText = s.n;
        const target = player.position.clone().add(new THREE.Vector3(Math.sin(player.rotation.y)*6, 0, Math.cos(player.rotation.y)*6));

        if(s.type === "bomb") {
            const beam = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 300), new THREE.MeshBasicMaterial({color:0x00ffff, transparent:true, opacity:0.6}));
            beam.position.set(target.x, 150, target.z);
            scene.add(beam);
            setTimeout(() => { scene.remove(beam); explode(target, 15, 20); }, 1200);
        } 
        else if(s.type === "sentry") {
            const turret = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color:0x444444}));
            turret.position.set(target.x, 0.6, target.z);
            turret.lastFire = 0;
            scene.add(turret);
            sentries.push(turret);
            log("SENTRY DEPLOYED");
        }
        else if(s.type === "laser") {
            orbitalLaser(target);
        }
        else if(s.type === "heal") {
            state.hp = Math.min(100, state.hp + 50);
            flashMsg("STIM PACK USED!");
        }
        else if(s.type === "ammo") {
            state.ammo = 30;
            log("RESUPPLIED");
        }
    }

    function orbitalLaser(pos) {
        const laser = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 400), new THREE.MeshBasicMaterial({color:0xff0000}));
        laser.position.set(pos.x, 200, pos.z);
        scene.add(laser);
        let life = 300;
        const interval = setInterval(() => {
            const closest = findClosest(laser.position, 20);
            if(closest) {
                const dir = new THREE.Vector3().subVectors(closest.position, laser.position).normalize();
                laser.position.x += dir.x * 0.2;
                laser.position.z += dir.z * 0.2;
                closest.hp -= 0.5;
            }
            life--;
            if(life <= 0) { scene.remove(laser); clearInterval(interval); }
        }, 16);
    }

    function explode(pos, rad, dmg) {
        state.shaking = 20;
        log("DETONATION SUCCESS");
        bugs.forEach(b => {
            if(b.position.distanceTo(pos) < rad) b.hp -= dmg;
        });
        for(let i=0; i<40; i++) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), new THREE.MeshBasicMaterial({color:0xff6600, transparent:true}));
            p.position.copy(pos);
            p.vel = new THREE.Vector3(Math.random()-0.5, Math.random(), Math.random()-0.5).multiplyScalar(0.8);
            p.life = 1.0;
            scene.add(p);
            particles.push(p);
        }
    }

    function flashMsg(t) {
        const m = document.getElementById('score-msg');
        m.innerText = t; m.style.opacity = 1;
        setTimeout(() => m.style.opacity = 0, 1000);
    }

    function findClosest(pos, range) {
        let nearest = null, d = range;
        bugs.forEach(b => {
            const dist = b.position.distanceTo(pos);
            if(dist < d) { d = dist; nearest = b; }
        });
        return nearest;
    }

    // --- MAIN LOOP ---
    function loop(now) {
        requestAnimationFrame(loop);

        // Movement
        player.position.x += state.move.x * 0.2;
        player.position.z += state.move.y * 0.2;
        if(state.aim.active) {
            player.rotation.y = -Math.atan2(state.aim.y, state.aim.x) + Math.PI/2;
            if(now - state.lastFire > 120 && state.ammo > 0 && !state.reloading) {
                fire(player.position, player.rotation.y);
                state.lastFire = now;
            }
        }

        // Camera & Shake
        const camPos = new THREE.Vector3(player.position.x, 22, player.position.z + 18);
        if(state.shaking > 0) {
            camPos.x += (Math.random()-0.5);
            camPos.z += (Math.random()-0.5);
            state.shaking--;
        }
        camera.position.lerp(camPos, 0.1);
        camera.lookAt(player.position);

        // Sentries
        sentries.forEach(s => {
            const target = findClosest(s.position, 25);
            if(target && now - s.lastFire > 200) {
                fire(s.position, Math.atan2(target.position.x - s.position.x, target.position.z - s.position.z));
                s.lastFire = now;
            }
        });

        // Bullets
        for(let i=bullets.length-1; i>=0; i--) {
            const b = bullets[i];
            b.position.add(b.vel);
            if(b.position.distanceTo(player.position) > 60) { scene.remove(b); bullets.splice(i,1); continue; }
            bugs.forEach(bug => {
                if(bug.position.distanceTo(b.position) < 1.5) {
                    bug.hp -= 1;
                    bug.scale.setScalar(1.2);
                    setTimeout(() => bug.scale.setScalar(1), 50);
                    scene.remove(b); bullets.splice(i,1);
                }
            });
        }

        // Bugs
        bugs.forEach(bug => {
            if(bug.hp <= 0) {
                state.score++;
                spawnBug(state.score % 10 === 0);
                bug.position.set(1000,0,0); // Out of bounds
                return;
            }
            const d = new THREE.Vector3().subVectors(player.position, bug.position).normalize();
            bug.position.addScaledVector(d, bug.isHeavy ? 0.04 : 0.08);
            if(bug.position.distanceTo(player.position) < 1.2) {
                state.hp -= 0.3;
                if(state.hp <= 0) { log("REINFORCING..."); state.hp = 100; player.position.set(0,1,0); }
            }
        });

        // Particles
        for(let i=particles.length-1; i>=0; i--) {
            const p = particles[i];
            p.position.add(p.vel); p.life -= 0.02;
            p.material.opacity = p.life;
            if(p.life <= 0) { scene.remove(p); particles.splice(i,1); }
        }

        // UI
        document.getElementById('hp-bar').style.width = state.hp + "%";
        document.getElementById('ammo-bar').style.width = (state.ammo/30)*100 + "%";
        document.getElementById('ammo-txt').innerText = state.ammo + "/30";

        renderer.render(scene, camera);
    }

    function fire(pos, rot) {
        if(pos === player.position) state.ammo--;
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color:0xffff00}));
        b.position.copy(pos);
        b.vel = new THREE.Vector3(Math.sin(rot), 0, Math.cos(rot)).multiplyScalar(1.2);
        scene.add(b);
        bullets.push(b);
        if(state.ammo <= 0 && pos === player.position) {
            state.reloading = true;
            setTimeout(() => { state.ammo = 30; state.reloading = false; }, 1500);
        }
    }

    loop(0);
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
