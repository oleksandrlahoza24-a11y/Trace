<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Horror Engine</title>
    <style>
        :root {
            --bg-color: #050505;
            --ui-green: #00ff41;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--ui-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #333;
            background: #111;
            overflow: hidden;
        }

        /* Office View */
        #office {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a1a1a, #000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        /* UI Elements */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        #cam-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 50, 0, 0.2);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            animation: move 4s linear infinite;
        }

        @keyframes move {
            from { top: 0; }
            to { top: 100%; }
        }

        .btn-panel {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            background: #222;
            color: var(--ui-green);
            border: 1px solid var(--ui-green);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--ui-green);
            color: #000;
        }

        #static {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWU9zOQ48/giphy.gif');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="static"></div>
    <div class="scanline"></div>
    
    <div class="hud">
        <div>POWER: <span id="power">100</span>%</div>
        <div>TIME: <span id="time">12</span> AM</div>
    </div>

    <div id="office">
        <h2>SECURITY OFFICE</h2>
        <p>Watching the hallways...</p>
    </div>

    <div id="cam-overlay">
        <h1 style="color: white; text-shadow: 2px 2px red;">CAM 01 - MAIN HALL</h1>
    </div>

    <div class="btn-panel">
        <button onclick="toggleCams()">Toggle Cameras</button>
        <button onclick="toggleLights()">Light</button>
    </div>
</div>

<script>
    let power = 100;
    let time = 0;
    let camOpen = false;

    // Power Drain Logic
    setInterval(() => {
        if (power > 0) {
            power -= (camOpen ? 2 : 1);
            document.getElementById('power').innerText = Math.max(0, power);
        } else {
            document.getElementById('office').style.background = "black";
            document.getElementById('office').innerHTML = "<h1>POWER OUTAGE</h1>";
        }
    }, 3000);

    // Time Clock Logic
    setInterval(() => {
        time++;
        if (time <= 6) {
            document.getElementById('time').innerText = time;
        }
        if (time === 6) {
            alert("6 AM - YOU SURVIVED");
            location.reload();
        }
    }, 45000);

    function toggleCams() {
        if (power <= 0) return;
        camOpen = !camOpen;
        document.getElementById('cam-overlay').style.display = camOpen ? 'flex' : 'none';
    }

    function toggleLights() {
        if (power <= 0) return;
        const office = document.getElementById('office');
        office.style.background = office.style.background === 'white' ? 'linear-gradient(to bottom, #1a1a1a, #000)' : 'white';
        setTimeout(() => {
            office.style.background = 'linear-gradient(to bottom, #1a1a1a, #000)';
        }, 500);
    }
</script>

</body>
</html>
