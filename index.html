<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Engine Pro</title>
    <style>
    /* Add 'pointer-events: none' to overlay and 'touch-action: none' everywhere */
    * { touch-action: none; -webkit-user-select: none; } 
    body, html { margin: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }
    #overlay { pointer-events: none; z-index: 5; position: absolute; width: 100%; height: 100%; }
    #joystick-zone { 
        position: absolute; bottom: 60px; left: 60px; width: 120px; height: 120px; 
        z-index: 100; pointer-events: auto; /* Only the joystick allows touch */
    }
</style>
</head>
<body>
    <div id="overlay"></div>
    <div id="stats">LATITUDE: 44.2<br>LONGITUDE: 12.8<br>ENGINE: WEBGL_v2</div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import { GraphicsEngine } from './graphics.js';
        import { CharacterController } from './character.js';

        const graphics = new GraphicsEngine();
        const character = new CharacterController(graphics.scene, graphics.camera);

        function frame() {
            requestAnimationFrame(frame);
            const delta = graphics.clock.getDelta();
            character.update(graphics.getTerrainHeight.bind(graphics), delta);
            graphics.render();
        }
        frame();
    </script>
</body>
</html>
