<!DOCTYPE html>
<html>
<head>
    <title>HELLDIVERS: WEB EDITION</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fbff00; font-family: sans-serif; overflow: hidden; }
        #hud { position: absolute; bottom: 20px; left: 20px; text-transform: uppercase; }
        .key { display: inline-block; width: 30px; height: 30px; border: 2px solid #fbff00; text-align: center; line-height: 30px; margin: 2px; }
        #terminal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none;}
    </style>
</head>
<body>
    <div id="hud">
        <div>Health: [||||||||||] 100%</div>
        <div id="stratagem-display">Next Stratagem: ⬆️ ➡️ ⬇️ ⬇️ ⬇️</div>
    </div>
    <div id="terminal">
        <h1 style="font-size: 50px;">REINFORCING...</h1>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // 1. Scene & Environment
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. The "Helldiver" (Player)
        const playerGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        scene.add(player);

        // 3. Lighting (Atmospheric)
        const light = new THREE.PointLight(0xffffff, 50, 100);
        light.position.set(0, 10, 0);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        // 4. Stratagem Logic
        const code = ['ArrowUp', 'ArrowRight', 'ArrowDown', 'ArrowDown', 'ArrowDown'];
        let inputBuffer = [];

        window.addEventListener('keydown', (e) => {
            // Player Movement
            if(e.key === 'w') player.position.z -= 0.2;
            if(e.key === 's') player.position.z += 0.2;
            if(e.key === 'a') player.position.x -= 0.2;
            if(e.key === 'd') player.position.x += 0.2;

            // Stratagem Inputs
            if(e.key.includes('Arrow')) {
                inputBuffer.push(e.key);
                if(inputBuffer.join('') === code.join('')) {
                    triggerOrbitalStrike();
                    inputBuffer = [];
                }
            }
        });

        function triggerOrbitalStrike() {
            const beamGeo = new THREE.CylinderGeometry(0.2, 0.2, 100, 12);
            const beamMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
            const beam = new THREE.Mesh(beamGeo, beamMat);
            beam.position.set(player.position.x, 50, player.position.z - 5);
            scene.add(beam);
            
            setTimeout(() => scene.remove(beam), 500);
            console.log("500KG BOMB DELIVERED");
        }

        camera.position.set(0, 10, 15);
        camera.lookAt(player.position);

        function animate() {
            requestAnimationFrame(animate);
            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 8, player.position.z + 12), 0.1);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
