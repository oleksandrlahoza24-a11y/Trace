<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Procedural Universe</h1>
        <p>Scroll to Zoom | Drag to Rotate</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 50, 150);
        controls.update();

        // --- Lights ---
        const sunLight = new THREE.PointLight(0xffffff, 2, 1000);
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        // --- Starfield (Background) ---
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff });
        const starVertices = [];
        for (let i = 0; i < 10000; i++) {
            const x = (Math.random() - 0.5) * 2000;
            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starVertices.push(x, y, z);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- The Sun ---
        const sunGeo = new THREE.SphereGeometry(10, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // --- Procedural Planets ---
        const planets = [];
        const planetCount = 6 + Math.floor(Math.random() * 5); // 6 to 10 planets

        for (let i = 0; i < planetCount; i++) {
            // Randomize properties
            const radius = Math.random() * 4 + 1;
            const distance = (i + 1) * 25 + (Math.random() * 10);
            const speed = (Math.random() * 0.02) + 0.005;
            const color = new THREE.Color().setHSL(Math.random(), 0.7, 0.5);

            // Create Planet Mesh
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 });
            const planet = new THREE.Mesh(geometry, material);

            // Orbit Group (to handle rotation easily)
            const orbitGroup = new THREE.Group();
            scene.add(orbitGroup);
            orbitGroup.add(planet);
            planet.position.set(distance, 0, 0);

            // Add an orbit ring
            const ringGeo = new THREE.RingGeometry(distance - 0.1, distance + 0.1, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);

            planets.push({ mesh: planet, group: orbitGroup, speed: speed });
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Rotate Sun
            sun.rotation.y += 0.005;

            // Orbit Planets
            planets.forEach(p => {
                p.group.rotation.y += p.speed;
                p.mesh.rotation.y += 0.01;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
