<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stable WebGL Island</title>
    <style>
        /* CRITICAL: touch-action: none prevents the iPad from trying to zoom or select text */
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; -webkit-user-select: none; }
        #joystick-zone { 
            position: absolute; 
            bottom: 50px; 
            left: 50px; 
            width: 150px; 
            height: 150px; 
            z-index: 100;
            touch-action: none; 
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            pointer-events: none; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">IPAD ENGINE: ACTIVE <br> Walk to explore the island</div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        let scene, camera, renderer, water, player;
        let moveForward = 0, moveRight = 0;
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            
            // Camera Far plane set to 20,000 to ensure the horizon doesn't cut out
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 20000);
            
            player = new THREE.Group();
            player.position.set(100, 20, 100); 
            player.add(camera);
            scene.add(player);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for iPad performance
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(100, 100, 100);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 1.0));

            // Skybox
            const sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);
            const sun = new THREE.Vector3();
            sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(85), THREE.MathUtils.degToRad(180));
            sky.material.uniforms['sunPosition'].value.copy(sun);

            // Water Shader
            const waterGeo = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(waterGeo, {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => {
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: sun,
                sunColor: 0xffffff,
                waterColor: 0x001e0f,
                distortionScale: 3.7,
            });
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // Island Mesh
            const terrainGeo = new THREE.PlaneGeometry(2500, 2500, 64, 64);
            const pos = terrainGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let y = pos.getY(i);
                let d = Math.sqrt(x*x + y*y);
                let h = Math.max(-5, 180 * Math.exp(-d/400) - 25);
                pos.setZ(i, h);
            }
            terrainGeo.computeVertexNormals();
            const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshStandardMaterial({ color: 0x345e34, flatShading: true }));
            terrain.rotation.x = -Math.PI / 2;
            scene.add(terrain);

            // Joystick with iPad Fixes
            const joy = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '75px', bottom: '75px' },
                color: 'white'
            });

            joy.on('move', (evt, data) => {
                // Safeguard: If data or vector is missing, don't update movement
                if (!data || !data.vector) return;
                
                moveForward = data.vector.y || 0;
                moveRight = data.vector.x || 0;
                
                // Only rotate if angle data is valid to prevent "jumping" to 0
                if (data.angle && data.angle.rad) {
                    player.rotation.y = -data.angle.rad + Math.PI/2;
                }
            });

            joy.on('end', () => {
                moveForward = 0;
                moveRight = 0;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            // Ensure width/height are never 0 to prevent black screen
            const width = window.innerWidth || 1;
            const height = window.innerHeight || 1;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function getTerrainHeight(x, z) {
            let d = Math.sqrt(x*x + z*z);
            return Math.max(-5, 180 * Math.exp(-d/400) - 25);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Apply Movement
            const moveSpeed = 3.5;
            player.translateZ(-moveForward * moveSpeed);
            player.translateX(moveRight * moveSpeed);

            // Lock to ground
            const groundY = getTerrainHeight(player.position.x, player.position.z);
            player.position.y = groundY + 12;

            water.material.uniforms['time'].value += 1.0 / 60.0;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
