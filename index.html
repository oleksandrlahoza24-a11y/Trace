<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Action Movie</title>
    <style>
        body { background: #222; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { background: #fff; border: 4px solid #555; cursor: crosshair; }
        .controls { width: 800px; background: #333; padding: 15px; border-radius: 0 0 10px 10px; display: flex; flex-direction: column; gap: 10px; }
        .timeline-container { position: relative; width: 100%; height: 20px; background: #555; cursor: pointer; }
        #timeline { width: 100%; cursor: pointer; }
        .buttons { display: flex; gap: 10px; align-items: center; }
        button { padding: 8px 15px; cursor: pointer; background: #e74c3c; border: none; color: white; font-weight: bold; border-radius: 4px; }
        button:hover { background: #c0392b; }
        span { font-size: 14px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">Stickman: The Last Shell</h2>
    <canvas id="movieCanvas" width="800" height="450"></canvas>

    <div class="controls">
        <div class="timeline-container">
            <input type="range" id="timeline" min="0" max="600" value="0">
        </div>
        <div class="buttons">
            <button id="playPauseBtn">Play</button>
            <span id="timeDisplay">00:00 / 10:00</span>
        </div>
    </div>

<script>
    const canvas = document.getElementById('movieCanvas');
    const ctx = canvas.getContext('2d');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const timeline = document.getElementById('timeline');
    const timeDisplay = document.getElementById('timeDisplay');

    let isPlaying = false;
    let currentTime = 0; // in seconds
    const totalDuration = 600; // 10 minutes

    // --- Actor: Stickman ---
    const stickman = {
        x: 100,
        y: 350,
        draw(frameTime) {
            // Slight bobbing animation
            const bob = Math.sin(frameTime * 5) * 5;
            
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.beginPath();
            
            // Head
            ctx.arc(this.x, this.y - 60 + bob, 15, 0, Math.PI * 2);
            // Body
            ctx.moveTo(this.x, this.y - 45 + bob);
            ctx.lineTo(this.x, this.y + bob);
            // Arms (holding gun)
            ctx.moveTo(this.x, this.y - 30 + bob);
            ctx.lineTo(this.x + 30, this.y - 20 + bob);
            // Legs
            ctx.moveTo(this.x, this.y + bob);
            ctx.lineTo(this.x - 15, this.y + 40 + bob);
            ctx.moveTo(this.x, this.y + bob);
            ctx.lineTo(this.x + 15, this.y + 40 + bob);
            
            ctx.stroke();

            // The Gun
            ctx.fillStyle = "#333";
            ctx.fillRect(this.x + 25, this.y - 30 + bob, 30, 10); 
            ctx.fillRect(this.x + 25, this.y - 25 + bob, 8, 15);
        }
    };

    function render() {
        // Clear screen
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Environment
        ctx.fillStyle = "#7cfc00"; // Grass
        ctx.fillRect(0, 390, canvas.width, 60);

        // Dynamic Scenes based on time
        if (currentTime < 10) {
            ctx.fillStyle = "black";
            ctx.font = "20px Arial";
            ctx.fillText("Scene 1: The Arrival", 320, 200);
            stickman.x = 100 + (currentTime * 20);
        } else if (currentTime < 20) {
            ctx.fillStyle = "red";
            ctx.font = "20px Arial";
            ctx.fillText("Scene 2: Target Spotted", 320, 200);
            // Flash bullet every second
            if (Math.floor(Date.now() / 100) % 5 === 0) {
                ctx.fillStyle = "orange";
                ctx.fillRect(stickman.x + 60, 325, 10, 5);
            }
        }

        stickman.draw(currentTime);
        updateUI();
    }

    function updateUI() {
        timeline.value = currentTime;
        let mins = Math.floor(currentTime / 60);
        let secs = Math.floor(currentTime % 60);
        timeDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')} / 10:00`;
    }

    // --- Core Engine ---
    function loop() {
        if (isPlaying && currentTime < totalDuration) {
            currentTime += 0.016; // Approx 60fps
            render();
        }
        requestAnimationFrame(loop);
    }

    playPauseBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playPauseBtn.innerText = isPlaying ? "Pause" : "Play";
    });

    timeline.addEventListener('input', (e) => {
        currentTime = parseFloat(e.target.value);
        render();
    });

    render(); // Initial draw
    loop();
</script>
</body>
</html>
