<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Super Earth</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fbff00;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        .crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #fbff00;
            transform: translate(-50%, -50%); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>HELLPOD STATUS: DEPLOYING</h1>
        <p>OBJECTIVE: SPREAD MANAGED DEMOCRACY</p>
        <p>ALTITUDE: <span id="alt">5000</span>m</p>
    </div>
    <div class="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- PLANET SURFACE ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x442211 }); // Dusty red
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- THE HELLPOD (Simple Placeholder) ---
        const podGeo = new THREE.CylinderGeometry(0.5, 0.3, 2, 8);
        const podMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
        const hellpod = new THREE.Mesh(podGeo, podMat);
        hellpod.position.y = 50; 
        scene.add(hellpod);

        // --- CAMERA LOGIC ---
        camera.position.set(0, 5, 10);
        camera.lookAt(hellpod.position);

        let altitude = 5000;

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Simulate Descent
            if (hellpod.position.y > 1) {
                hellpod.position.y -= 0.2;
                altitude -= 20;
                document.getElementById('alt').innerText = Math.max(0, altitude);
                
                // Camera follows pod
                camera.position.y = hellpod.position.y + 5;
                camera.lookAt(hellpod.position);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
