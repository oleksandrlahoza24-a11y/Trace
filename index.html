<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Island Explorer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a1628;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        }

        canvas { display: block; }

        #hud {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        #title {
            position: absolute;
            top: 22px; left: 24px;
        }
        #title h1 {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255,255,255,0.92);
            letter-spacing: 0.04em;
            text-shadow: 0 1px 8px rgba(0,0,0,0.55);
        }
        #title p {
            font-size: 12px;
            color: rgba(255,255,255,0.48);
            letter-spacing: 0.02em;
            margin-top: 2px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        .zone-wrap {
            position: absolute;
            bottom: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        #lz { left: 50px; }
        #rz { right: 50px; }

        .zone-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zone-ring svg {
            opacity: 0.35;
            width: 28px; height: 28px;
        }
        .zone-label {
            font-size: 11px;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        #joystick-knob {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.22);
            border: 1.5px solid rgba(255,255,255,0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            transition: opacity 0.1s;
            box-shadow: 0 0 14px rgba(255,255,255,0.12);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #0a1628;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }
        #loading.fade {
            opacity: 0;
            pointer-events: none;
        }
        #loading h2 {
            color: rgba(255,255,255,0.85);
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.08em;
            margin-bottom: 18px;
        }
        #loading-bar-wrap {
            width: 180px;
            height: 2px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            height: 100%;
            width: 0%;
            background: rgba(255,255,255,0.7);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <div id="loading">
        <h2>Island Explorer</h2>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    </div>

    <div id="hud">
        <div id="title">
            <h1>Island Explorer</h1>
            <p>Left drag · Move &nbsp;|&nbsp; Right drag · Look</p>
        </div>

        <div class="zone-wrap" id="lz">
            <div class="zone-ring">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 8v8M8 12h8"/>
                </svg>
            </div>
            <span class="zone-label">Move</span>
        </div>

        <div class="zone-wrap" id="rz">
            <div class="zone-ring">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M9 9l6 6M15 9l-6 6"/>
                </svg>
            </div>
            <span class="zone-label">Look</span>
        </div>
    </div>

    <div id="joystick-knob"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="models.js"></script>
    <script src="graphics.js"></script>

    <script>
        const bar   = document.getElementById('loading-bar');
        const cover = document.getElementById('loading');
        let prog = 0;
        const tick = setInterval(() => {
            prog = Math.min(prog + Math.random() * 18, 92);
            bar.style.width = prog + '%';
        }, 120);
        window.addEventListener('load', () => {
            clearInterval(tick);
            bar.style.width = '100%';
            setTimeout(() => cover.classList.add('fade'), 400);
            setTimeout(() => cover.remove(), 1300);
        });

        const knob = document.getElementById('joystick-knob');
        window.addEventListener('touchstart', e => {
            for (const t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    knob.style.display = 'block';
                    knob.style.left = t.clientX + 'px';
                    knob.style.top  = t.clientY + 'px';
                }
            }
        }, { passive: true });
        window.addEventListener('touchmove', e => {
            for (const t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    knob.style.left = t.clientX + 'px';
                    knob.style.top  = t.clientY + 'px';
                }
            }
        }, { passive: true });
        window.addEventListener('touchend', e => {
            for (const t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    knob.style.display = 'none';
                }
            }
        }, { passive: true });
    </script>
</body>
</html>
