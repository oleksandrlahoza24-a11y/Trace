<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Fixed WebGL Island</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 20; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">SYSTEM: ONLINE | WALK TO EXPLORE</div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        let scene, camera, renderer, water, terrain, player;
        let moveForward = 0, moveRight = 0;
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            // Increased FAR plane to 50,000 to prevent black-out clipping
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 50000);
            
            player = new THREE.Group();
            player.position.set(200, 50, 200); // Spawn further out and higher
            player.add(camera);
            scene.add(player);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Switched tone mapping to be more stable on mobile
            renderer.toneMapping = THREE.LinearToneMapping; 
            document.body.appendChild(renderer.domElement);

            // Lighting (Prevents total darkness)
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            // Sky
            const sky = new Sky();
            sky.scale.setScalar(450000);
            scene.add(sky);

            const sun = new THREE.Vector3();
            const skyUniforms = sky.material.uniforms;
            skyUniforms['turbidity'].value = 10;
            skyUniforms['rayleigh'].value = 3;
            skyUniforms['mieCoefficient'].value = 0.005;
            skyUniforms['mieDirectionalG'].value = 0.7;

            const phi = THREE.MathUtils.degToRad(85);
            const theta = THREE.MathUtils.degToRad(180);
            sun.setFromSphericalCoords(1, phi, theta);
            skyUniforms['sunPosition'].value.copy(sun);

            // Water
            const waterGeo = new THREE.PlaneGeometry(20000, 20000);
            water = new Water(waterGeo, {
                textureWidth: 512,
                textureHeight: 512,
                waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', (t) => {
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                }),
                sunDirection: sun,
                sunColor: 0xffffff,
                waterColor: 0x004e5f,
                distortionScale: 4.0,
            });
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // Terrain Generation
            const terrainGeo = new THREE.PlaneGeometry(3000, 3000, 100, 100);
            const pos = terrainGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let y = pos.getY(i);
                let d = Math.sqrt(x*x + y*y);
                // Island shape: Tall in middle, flat at edges
                let h = Math.max(-10, 200 * Math.exp(-d/500) - 30);
                h += Math.sin(x/50) * Math.cos(y/50) * 10; // Small bumps
                pos.setZ(i, h);
            }
            terrainGeo.computeVertexNormals();
            
            const terrainMat = new THREE.MeshStandardMaterial({ 
                color: 0x446633, 
                flatShading: true 
            });
            terrain = new THREE.Mesh(terrainGeo, terrainMat);
            terrain.rotation.x = -Math.PI / 2;
            scene.add(terrain);

            // Joystick
            const joy = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '60px', bottom: '60px' },
                color: 'lime'
            });

            joy.on('move', (e, data) => {
                moveForward = data.vector.y;
                moveRight = data.vector.x;
                if (data.angle) player.rotation.y = -data.angle.rad + Math.PI/2;
            });
            joy.on('end', () => { moveForward = 0; moveRight = 0; });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function getTerrainHeight(x, z) {
            // Match the height formula used in the terrain generation
            let d = Math.sqrt(x*x + z*z);
            let h = Math.max(-10, 200 * Math.exp(-d/500) - 30);
            h += Math.sin(x/50) * Math.cos(z/50) * 10;
            return h;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Movement
            const speed = 4.0;
            player.translateZ(-moveForward * speed);
            player.translateX(moveRight * speed);

            // GROUND SNAPPING: This keeps you from falling through the floor
            const currentH = getTerrainHeight(player.position.x, player.position.z);
            player.position.y = currentH + 15; // Stay 15 units above ground

            water.material.uniforms['time'].value += 1.0 / 60.0;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
